<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lisaany — Quran Norania</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1b2154;--indigo-deep:#141a44;--indigo-soft:#2a3270;--gold:#e8b62b;--gold-br:#ffd83a;--gold-deep:#b3842b;--paper:#f5f6fb;--card:#fff;--border:#e7e9f5;--dim:#5b6092;--green:#15803d;--green-bg:#e8f7ee;--red:#b3261e;--red-bg:#fdecea;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 120px;}
  .ar{font-family:'Amiri',serif;direction:rtl}
  .tpl{background:#fff;border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:12px;padding:10px 14px;font-size:14px;color:var(--dim);margin-bottom:16px;font-weight:600}
  .bar{background:linear-gradient(135deg,var(--navy),var(--indigo-soft));border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:13px;box-shadow:0 18px 40px -24px rgba(27,33,84,.6);position:relative;overflow:hidden}
  .bar>*{position:relative;z-index:1}
  .bar::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.16;background-image:url("data:image/svg+xml,%3Csvg width='28' height='49' viewBox='0 0 28 49' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill-rule='evenodd'%3E%3Cg fill='%23ffd83a'%3E%3Cpath d='M13.99 9.25l13 7.5v15l-13 7.5L1 31.75v-15l12.99-7.5zM3 17.9v12.7l11 6.34 11-6.35V17.9l-11-6.34L3 17.9zM0 15l12.98-7.5V0h-2v6.35L0 12.69v2.3zm0 18.5L12.98 41v8h-2v-6.85L0 35.81v-2.3zM15 0v7.5L27.99 15H28v-2.31h-.01L17 6.35V0h-2zm0 49v-8l12.99-7.5H28v2.31h-.01L17 42.15V49h-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");background-size:42px 73.5px;-webkit-mask-image:linear-gradient(90deg,transparent 26%,#000 100%);mask-image:linear-gradient(90deg,transparent 26%,#000 100%)}
  .qrlogo{width:40px;height:40px;border-radius:11px;background:rgba(255,216,58,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bar .t1{color:#fff;font-family:'Cinzel',serif;font-size:17px;font-weight:600;letter-spacing:.03em}
  .bar .t2{color:var(--gold-br);font-size:14px;margin-top:3px;font-weight:500}
  .bar .prog{margin-left:auto;text-align:right;color:#cfd5ee;font-size:14px;font-weight:600}
  .bar .prog b{color:var(--gold-br);font-size:15px;font-family:'Cinzel'}

  /* HOME */
  .grouphead{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--dim);letter-spacing:.04em;margin:24px 4px 12px;text-transform:uppercase}
  .lessons{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .lcard{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;transition:.16s;box-shadow:0 16px 40px -22px rgba(27,33,84,.3),0 3px 10px -6px rgba(27,33,84,.09);position:relative;text-align:center;direction:ltr}
  .lcard:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 18px 36px -20px rgba(232,182,43,.5)}
  .lcard.locked{opacity:.5;cursor:default}
  .lcard.locked:hover{transform:none;border-color:var(--border);box-shadow:0 10px 28px -20px rgba(27,33,84,.4)}
  .lcard.goldcard{background:linear-gradient(150deg,var(--gold-br),var(--gold));border-color:var(--gold-deep)}
  .lcard.goldcard:hover{border-color:var(--gold-deep);box-shadow:0 18px 38px -18px rgba(179,132,43,.6)}
  .lcard.goldcard .lar{color:var(--green)}
  .lcard.goldcard .lnm{color:var(--navy)}
  .lcard .lar{font-family:'Amiri',serif;font-size:54px;color:var(--gold-deep);line-height:1.1}
  .lcard .lnm{font-weight:700;font-size:14px;margin-top:4px}
  .lcard .lsnd{font-size:14px;color:var(--dim)}
  .lcard .done{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:900}
  .lcard .lock{position:absolute;top:10px;right:12px;color:var(--dim);font-size:14px}

  /* PLAYER */
  .steps{display:flex;gap:6px;margin:18px 0 6px}
  .step{flex:1;height:6px;border-radius:99px;background:#e3e6f2;transition:background .25s}
  .step.done{background:var(--gold)} .step.cur{background:var(--gold-br)}
  .topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .stepname{font-size:14px;color:var(--dim);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .exit{background:rgba(179,38,30,.08);border:1px solid rgba(179,38,30,.35);border-radius:999px;padding:5px 12px;color:var(--red);font-weight:800;font-size:14px;cursor:pointer;font-family:inherit}
  .exit:hover{background:rgba(179,38,30,.15);border-color:var(--red)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px 16px;box-shadow:0 20px 50px -26px rgba(27,33,84,.32),0 3px 10px -6px rgba(27,33,84,.08);min-height:300px}
  h2{font-family:'Cinzel',serif;font-size:20px;margin:0 0 4px;font-weight:600}
  .sub{color:var(--dim);font-size:14px;margin-bottom:18px}
  .bigletter{font-family:'Amiri',serif;font-size:78px;line-height:1.05;color:var(--gold-deep);text-align:center;margin:2px 0}
  .factrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .fact{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:9px 11px;text-align:center;min-width:84px}
  .fact .k{font-size:14px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .fact .v{font-size:18px;font-weight:700;margin-top:3px}
  .fact .v.ar{font-size:24px;color:var(--gold-deep)}
  .listen{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);border:none;font-family:inherit;font-weight:700;font-size:15px;padding:12px 22px;border-radius:12px;cursor:pointer;box-shadow:0 10px 22px -12px rgba(232,182,43,.8);transition:transform .14s}
  .listen:hover{transform:translateY(-1px)} .listen.sm{padding:8px 13px;font-size:14px}
  .center{text-align:center}
  .obj{background:#fff7e0;border:1px solid #f0dca0;border-radius:14px;padding:14px 16px;margin-bottom:18px}
  .obj h4{font-size:14px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 9px}
  .obj ul{margin:0;padding:0;list-style:none;display:grid;gap:7px}
  .obj li{display:flex;gap:9px;align-items:flex-start;font-size:14px;font-weight:600}
  .obj li::before{content:'✓';color:var(--green);font-weight:900;flex:none}
  .mkgrid{display:grid;gap:10px;margin-top:14px}
  .mkitem{display:flex;gap:12px;align-items:center;background:var(--paper);border:1px solid var(--border);border-radius:13px;padding:12px 14px}
  .mkitem .ko{font-size:14px;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:.06em;min-width:54px}
  .mkitem .vo{font-size:14px;font-weight:600;flex:1}
  .mkitem.bad2{background:var(--red-bg);border-color:#f3cfcb}
  .mkitem.bad2 .ko,.mkitem.bad2 .vo{color:var(--red)}
  .spot{display:flex;align-items:center;justify-content:center;gap:16px;background:var(--paper);border:1px dashed var(--gold);border-radius:14px;padding:14px;margin-top:16px}
  .spot .qw{font-family:'Amiri';font-size:38px;color:var(--gold-deep)}
  .spot .cap{font-size:14px;color:var(--dim);font-weight:600}
  .tiles{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
  .tile{font-family:'Amiri',serif;font-size:38px;width:70px;height:78px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--border);border-radius:16px;color:var(--navy);cursor:pointer;transition:.15s;box-shadow:0 8px 22px -16px rgba(27,33,84,.4)}
  .tile:hover{border-color:var(--gold);transform:translateY(-2px)}
  .tile.right{border-color:var(--green);background:var(--green-bg);color:var(--green)}
  .tile.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
  .tiles.latin{direction:ltr}
  .tiles.latin .tile{font-family:'Inter',sans-serif;font-size:21px!important;font-weight:700}
  .rows{display:grid;gap:9px;margin:8px 0}
  .rrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .cell{font-family:'Amiri',serif;font-size:29px;min-width:56px;padding:7px 9px;background:#fff;border:1.5px solid var(--border);border-radius:13px;color:var(--gold-deep);cursor:pointer;transition:.13s;text-align:center}
  .cell:hover{border-color:var(--gold);background:#fffdf5}
  .cell.lit{border-color:var(--gold);background:#fff;box-shadow:0 0 0 3px rgba(255,216,58,.28)}
  .note{background:var(--paper);border-radius:12px;padding:11px 13px;font-size:14px;margin:11px 0}
  .note b{color:var(--gold-deep)}
  .cmp{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:6px 0 4px}
  .cmpc{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;min-width:92px}
  .cmpc .ca{font-family:'Amiri';font-size:48px;color:var(--gold-deep);line-height:1}
  .cmpc .ck{font-size:14px;color:var(--dim);font-weight:700;margin-top:4px}
  .vocabhead{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin:4px 0 10px}
  .qword{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:10px}
  .qword .ar{font-size:30px;color:var(--gold-deep)}
  .qword .tx{font-size:14px;color:var(--dim);text-align:right}
  .qword .tx b{display:block;color:var(--navy);font-size:15px}
  .q{font-size:16px;font-weight:700;margin:4px 0 12px}
  .qcount{font-size:14px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .feedback{font-size:14px;font-weight:700;margin-top:14px;min-height:20px}
  .feedback.ok{color:var(--green)} .feedback.no{color:var(--red)}
  .ring{width:120px;height:120px;margin:6px auto 10px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel';font-weight:700;font-size:26px}
  .result{text-align:center} .result .big{font-family:'Cinzel';font-size:40px;font-weight:700}
  .navbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;gap:12px;max-width:680px;margin:0 auto}
  .btn{font-family:inherit;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:transform .14s}
  .btn-next{background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);box-shadow:0 10px 22px -12px rgba(232,182,43,.8)}
  .btn-next:hover{transform:translateY(-1px)}
  .btn-back{background:#fff;border:1px solid var(--border);color:var(--navy)}
  .btn-back:disabled{opacity:.4;cursor:default}
  .hide{display:none}

/* Arabic reads right-to-left: letters, combos, compare, tiles flow RTL */
.factrow,.rrow,.cmp,.tiles{direction:rtl}

/* chapter list */
.chintro{margin:8px 4px 18px}
.chintro-k{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-deep)}
.chintro-t{font-size:14px;color:var(--dim);margin-top:4px}
.chapters{display:flex;flex-direction:column;gap:11px}
.chcard{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;cursor:pointer;box-shadow:0 16px 44px -20px rgba(27,33,84,.30),0 3px 10px -6px rgba(27,33,84,.10);transition:transform .16s,border-color .16s,box-shadow .16s}
.chcard:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 24px 54px -18px rgba(232,182,43,.42),0 4px 12px -6px rgba(27,33,84,.12)}
.chcard .char{width:48px;height:48px;border-radius:14px;background:linear-gradient(140deg,var(--indigo-soft),var(--navy));color:var(--gold-br);font-family:'Amiri',serif;font-size:26px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;box-shadow:inset 0 0 0 1px rgba(255,216,58,.28)}
.chmid{flex:1;min-width:0}
.chkick{font-size:14px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-deep)}
.chnm{font-family:'Cinzel',serif;font-weight:700;color:var(--navy);font-size:16px;margin-top:2px;line-height:1.15}
.chbar{height:5px;border-radius:99px;background:#eceef7;margin-top:9px;overflow:hidden}
.chbar span{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-br));transition:width .45s ease}
.chstat{flex-shrink:0;min-width:40px;text-align:right;font-family:'Cinzel',serif;font-weight:700;color:var(--navy);font-size:17px}
.chstat i{color:var(--dim);font-style:normal;font-size:14px;font-weight:600}
.chcard.full{border-color:#dcebd6;background:linear-gradient(180deg,#fff,#f6fbf4)}
.chcard.full .char{box-shadow:inset 0 0 0 1px rgba(21,128,61,.4)}
.chk{display:inline-flex;width:27px;height:27px;border-radius:50%;background:var(--green);color:#fff;align-items:center;justify-content:center;font-size:14px;font-weight:900}
.chback{display:flex;align-items:center;gap:14px;cursor:pointer;margin:2px 0 16px;user-select:none}
.chback .bk{width:46px;height:46px;border-radius:50%;flex:0 0 46px;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,var(--indigo-soft),var(--navy) 82%);border:1.5px solid var(--gold-deep);color:var(--gold-br);font-size:20px;line-height:1;box-shadow:inset 0 1px 1px rgba(255,255,255,.10),0 5px 14px -7px rgba(20,26,68,.65);transition:transform .15s,box-shadow .15s,border-color .15s}
.chback .bt{font-family:'Cinzel',serif;font-weight:700;font-size:19px;letter-spacing:.06em;color:var(--navy)}
.chback:hover .bk{transform:translateX(-2px);border-color:var(--gold);box-shadow:inset 0 1px 1px rgba(255,255,255,.12),0 8px 18px -7px rgba(20,26,68,.7)}

.spellrow{margin:14px 0;padding:18px 12px 16px;background:var(--paper);border:1px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;gap:8px}
.rrow.sp{gap:8px;margin:0;justify-content:center;flex-wrap:nowrap;align-items:stretch}
.scell{font-family:'Amiri',serif;font-size:30px;line-height:1;color:var(--navy);background:#fff;border:1px solid var(--border);border-radius:11px;height:58px;min-width:48px;padding:0 9px;display:inline-flex;align-items:center;justify-content:center;overflow:visible}
.sarrow{color:var(--gold-deep);font-size:17px;line-height:1;opacity:.75}
.joined{font-family:'Amiri',serif;font-size:46px;line-height:1.5;color:var(--gold-deep);background:none;border:none;cursor:pointer;padding:4px 10px;border-radius:12px}
.joined:hover{background:rgba(232,182,43,.10)}

.lno{position:absolute;top:10px;left:10px;width:24px;height:24px;border-radius:50%;background:linear-gradient(150deg,var(--navy),var(--indigo-deep));border:1px solid var(--gold-deep);color:var(--gold-br);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center}

.hp{display:inline-block;vertical-align:-3px}
</style>
</head>
<body>
<div class="wrap">
  <div class="tpl">🧪 Norania — foundational course (32 lessons). 🎧 = placeholder voice (record later). Quran words reviewed by teacher; final Uthmānī text to be set from <b>Quran.com</b>. Draft — not yet wired to login.</div>

  <div class="bar">
    <div class="qrlogo"><svg viewBox="0 0 100 130" aria-hidden="true" style="width:64%;height:64%"><defs><linearGradient id="gmixn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe98a"/><stop offset=".55" stop-color="#ffd83a"/><stop offset="1" stop-color="#e8b62b"/></linearGradient></defs><path d="M50 10 C45 24 31 42 31 64 C31 79 40 88 50 88 C60 88 69 79 69 64 C69 42 55 24 50 10 Z M48.6 18 L51.4 18 L50.8 54 L49.2 54 Z M44.5 60 A5.5 5.5 0 1 1 55.5 60 A5.5 5.5 0 1 1 44.5 60 Z M41 94 Q41 89 50 89 Q59 89 59 94 L59 99 L41 99 Z M37 103 Q37 101 39 101 L61 101 Q63 101 63 103 L63 113 Q63 115 61 115 L39 115 Q37 115 37 113 Z" fill="url(#gmixn)" fill-rule="evenodd"/></svg></div>
    <div><div class="t1">Quran Norania</div><div class="t2">Read the Quran — foundational course</div></div>
    <div class="prog" id="prog"></div>
  </div>

  <div id="home"></div>

  <div id="player" class="hide">
    <div class="steps" id="steps"></div>
    <div class="topline"><span class="stepname" id="stepname"></span><button class="exit" onclick="goHome()">✕ Exit lesson</button></div>
    <div class="card" id="card"></div>
  </div>
</div>

<div class="navbar hide" id="navbar">
  <button class="btn btn-back" id="backBtn">← Back</button>
  <button class="btn btn-next" id="nextBtn">Next →</button>
</div>

/* ===== HOME ===== */
/* set UNLOCK_ALL=false to make students progress in order */
const UNLOCK_ALL=true;
const parts=['The Arabic Letters','Short Vowels','Joining Letters','Suk\u016Bn','Madd','Tanw\u012Bn','Shaddah','Reading Rules','Reading the Qur\u02be\u0101n','Bonus \u00b7 Tajw\u012Bd'];
let curChapter=null;
function partIdxs(p){const a=[];LESSONS.forEach((L,i)=>{if(L.part===p)a.push(i);});return a;}
const CHICON=['\u0628','\u0628\u064E','\u0628\u0640','\u0628\u0652','\u0628\u064E\u0627','\u0628\u064B\u0627','\u0628\u0651','\u0627\u0644','\u0642','\u0646'];
function renderChapters(){
 curChapter=null;
 const ndone=Object.keys(done).length;
 $('prog').innerHTML='<b>'+ndone+'</b> / '+LESSONS.length+' lessons';
 let html='<div class="chintro"><div class="chintro-k">Read the Qur\u02be\u0101n</div><div class="chintro-t">From the letters to your first \u0101yah, one chapter at a time.</div></div><div class="chapters">';
 parts.forEach((p,ci)=>{
  const idxs=partIdxs(p);const dn=idxs.filter(i=>done[i]).length;const tot=idxs.length;const pct=tot?Math.round(dn/tot*100):0;const full=tot>0&&dn===tot;
  html+='<div class="chcard'+(full?' full':'')+'" onclick="openChapter('+ci+')">'
   +'<div class="char">'+CHICON[ci]+'</div>'
   +'<div class="chmid"><div class="chkick">Chapter '+(ci+1)+' \u00b7 '+tot+' lesson'+(tot>1?'s':'')+'</div>'
   +'<div class="chnm">'+p+'</div>'
   +'<div class="chbar"><span style="width:'+pct+'%"></span></div></div>'
   +'<div class="chstat">'+(full?'<span class="chk">\u2713</span>':dn+'<i>/'+tot+'</i>')+'</div></div>';
 });
 html+='</div>';
 $('home').innerHTML=html;window.scrollTo(0,0);
}
function openChapter(ci){
 const p=parts[ci];curChapter=ci;const idxs=partIdxs(p);
 if(idxs.length===1){openLesson(idxs[0]);return;}
 let html='<div class="chback" onclick="renderChapters()"><span class="bk">\u2190</span><span class="bt">All Chapters</span></div><div class="grouphead">'+p+'</div><div class="lessons">';
 idxs.forEach(i=>{const L=LESSONS[i];const isDone=done[i],locked=UNLOCK_ALL?false:(i>0&&!done[i-1]&&!isDone);const gold=L.type==='letterdrill'||L.type==='madddrill';
  html+='<div class="lcard '+(gold?'goldcard ':'')+(locked?'locked':'')+'" '+(locked?'':'onclick="openLesson('+i+')"')+'>'
   +'<div class="lno">'+(i+1)+'</div>'
   +(isDone?'<div class="done">\u2713</div>':(locked?'<div class="lock">\uD83D\uDD12</div>':''))
   +'<div class="lar">'+L.icon+'</div><div class="lnm" style="font-size:14px">'+L.title+'</div></div>';
 });
 html+='</div>';
 $('home').innerHTML=html;window.scrollTo(0,0);
}
function goHome(){$('player').classList.add('hide');$('navbar').classList.add('hide');$('home').classList.remove('hide');if(curChapter!==null&&partIdxs(parts[curChapter]).length>1)openChapter(curChapter);else renderChapters();window.scrollTo(0,0);}

/* ===== PLAYER ===== */
let L=null,Li=0,stages=[],cur=0;
function openLesson(i){Li=i;L=LESSONS[i];curChapter=parts.indexOf(L.part);stages=buildStages(L);cur=0;$('home').classList.add('hide');$('player').classList.remove('hide');$('navbar').classList.remove('hide');go(0);}
function drawSteps(){$('steps').innerHTML=stages.map((s,i)=>'<div class="step '+(i<cur?'done':'')+' '+(i===cur?'cur':'')+'"></div>').join('');$('stepname').textContent=(cur+1)+' / '+stages.length+' \u00b7 '+stages[cur].name;}
function go(i){cur=Math.max(0,Math.min(stages.length-1,i));drawSteps();stages[cur].render();$('backBtn').disabled=false;$('backBtn').textContent=cur===0?'\u2190 Lessons':'\u2190 Back';$('nextBtn').textContent=cur===stages.length-1?'Finish':'Next \u2192';window.scrollTo(0,0);}
$('nextBtn').onclick=()=>{ if(cur===stages.length-1){ if(L.type==='placeholder'||L.type==='words'){done[Li]=true;saveDone();} goHome(); } else go(cur+1); };
$('backBtn').onclick=()=>{if(cur===0){goHome();}else{go(cur-1);}};
function lit(el){document.querySelectorAll('.cell.lit').forEach(x=>x.classList.remove('lit'));el.classList.add('lit');}
function cells(arr){return '<div class="rrow">'+arr.map(x=>'<button class="cell" onclick="lit(this);playAudio(\''+x+'\')">'+x+'</button>').join('')+'</div>';}
function rows(arr,per){return '<div class="rows">'+chunk(arr,per||3).map(r=>cells(r)).join('')+'</div>';}
function spell(w){const out=[];let cur='';for(const ch of w){const c=ch.codePointAt(0);if(c===0x0640)continue;const comb=(c>=0x064B&&c<=0x0655)||c===0x0670;if(comb){cur+=ch;}else{if(cur)out.push(cur);cur=ch;}}if(cur)out.push(cur);for(let i=out.length-1;i>0;i--){if(out[i]==='\u0627'&&out[i-1].indexOf('\u064B')>=0){out[i-1]+='\u0627';out.splice(i,1);}}for(let i=out.length-1;i>=0;i--){const u=out[i];if(u.indexOf('\u0651')>=0){const base=u[0];const rest=u.slice(1).replace('\u0651','');out.splice(i,1,base+'\u0652',base+rest);}}return out;}
function spellOne(w){return '<div class="spellrow"><div class="rrow sp">'+spell(w).map(u=>'<span class="scell">'+u+'</span>').join('')+'</div><div class="sarrow">\u2193</div><button class="joined" onclick="playAudio(\''+w+'\')">'+w+'</button></div>';}
function S_spellread(words,title,sub){return {name:title||'Spell & read',render:()=>{$('card').innerHTML='<h2>'+(title||'Spell, then read')+'</h2><p class="sub">'+(sub||'Read the letters, then blend them into the word. Tap the word to hear it.')+'</p>'+words.map(spellOne).join('')+'<div class="note" style="font-size:14px;color:var(--dim)">From the book.</div>';}};}
function quizTiles(bx,fb,opts,ans,cb){$(bx).innerHTML=opts.map(o=>'<button class="tile" style="font-size:30px;width:auto;min-width:84px;padding:0 12px">'+o+'</button>').join('');let an=false;Array.from($(bx).children).forEach(b=>{b.onclick=()=>{if(an)return;an=true;if(b.textContent===ans){b.classList.add('right');$(fb).textContent='\u2713 Correct';$(fb).className='feedback ok';}else{b.classList.add('wrong');Array.from($(bx).children).forEach(x=>{if(x.textContent===ans)x.classList.add('right');});$(fb).textContent='The answer is highlighted in green.';$(fb).className='feedback no';}if(cb)setTimeout(()=>cb(b.textContent===ans),1000);};});}

/* ===== STAGE BUILDERS BY TYPE ===== */
function buildStages(L){
 if(L.type==='rule') return ruleStages(L);
 if(L.type==='letterdrill') return letterDrillStages(L);
 if(L.type==='madd') return maddStages(L);
 if(L.type==='madddrill') return maddDrillStages(L);
 if(L.type==='sentences') return sentenceStages(L);
 if(L.type==='surah') return surahStages(L);
 if(L.type==='shapes') return shapeStages(L);
 if(L.type==='stopping') return stoppingStages(L);
 if(L.type==='shaddah') return shaddahStages(L);
 if(L.type==='tanwin') return tanwinStages(L);
 if(L.type==='joining') return joiningStages(L);
 let st;
 if(L.type==='letters') st=lettersStages(L);
 else if(L.type==='movement') st=movementStages(L);
 else if(L.type==='longvowel') st=longvowelStages(L);
 else if(L.type==='reading') st=readingStages(L);
 else if(L.type==='words') st=wordsStages(L);
 else if(L.type==='placeholder') return placeholderStages(L);
 else return [];
 if(L.sp) st.splice(st.length-1,0,S_spotlight(L));
 return st;
}
function S_spotlight(L){return {name:'Quran',render:()=>{
 const w=(L.sp&&L.sp.w)||[];
 const deco=x=>{if(!L.al||x.indexOf('\u0627\u0644')!==0)return x;const n=(x[2]==='\u0652')?3:2;const col=L.al==='moon'?'var(--red)':'#9aa3c4';return '<span style="color:'+col+'">'+x.slice(0,n)+'</span>'+x.slice(n);};
 const decoT=(t)=>{if(!t)return'';if(!L.al)return t;const k=t.indexOf('-')+1;const col=L.al==='moon'?'var(--red)':'#9aa3c4';return '<span style="color:'+col+';font-weight:800">'+t.slice(0,k)+'</span>'+t.slice(k);};
 const row=(x,xi)=>'<div class="qword"><span class="ar">'+deco(x)+'</span><span class="tx">'+decoT((L.sp&&L.sp.tx&&L.sp.tx[xi])||'')+'</span><button class="listen sm" onclick="playAudio(\''+x+'\')"><svg class="hp" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg></button></div>';
 $('card').innerHTML='<h2>Find it in the Quran</h2><p class="sub">'+((L.sp&&L.sp.intro)||'These Quran words use what you just learned.')+'</p>'
  +(w.length?w.map(row).join(''):'<div class="note">Quran words to add from your source site.</div>')
  +'<div class="note" style="margin-top:10px"><b>Mission:</b> '+((L.sp&&L.sp.mission)||'Find what you learned in these words.')+'</div>'
  +'<div class="note" style="font-size:14px">Reviewed by teacher \u00b7 final Uthm\u0101n\u012B text to be pulled from Quran.com.</div>';
}};}
function S_alConnect(L){return {name:'Connecting',render:()=>{
 const moon=L.al==='moon';
 const w1='\u0627\u0644\u0644\u064e\u0651\u0648\u0652\u0646\u064f';
 const w2=moon?'\u0627\u0644\u0652\u0623\u064e\u062d\u0652\u0645\u064e\u0631\u064f':'\u0627\u0644\u0633\u064e\u0651\u0627\u0628\u0650\u0642\u064f';
 const g=moon?1:2, r=moon?3:5;
 const grey='#9aa3c4', red='var(--red)', gold='var(--gold-deep)';
 const phrase=w1+' '+w2;
 const fromC='\u0646\u064f', toC=moon?'\u0644\u0652':'\u0633\u064e\u0651';
 const toLab=moon?'l\u0101m with suk\u016Bn':'s\u012Bn with shaddah';
 const skipLab=moon?'skip the silent alif':'skip alif + l\u0101m';
 const tr=moon
  ?'al-lawnu <span style="color:'+red+';font-weight:800">l</span>-a\u1E25maru'
  :'al-lawnu <span style="color:'+red+';font-weight:800">s</span>-s\u0101biqu';
 const svg='<svg id="alcSvg" viewBox="0 0 640 250" style="width:100%;max-width:560px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">'
  +'<defs><marker id="alcArr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="'+gold+'"/></marker><marker id="alcArrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="'+grey+'"/></marker></defs>'
  +'<path id="alcP1" d="" fill="none" stroke="'+gold+'" stroke-width="3" stroke-linecap="round" marker-end="url(#alcArr)"/>'
  +'<text id="alcL1" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="800" fill="'+gold+'">connects</text>'
  +'<text id="alcW1" x="470" y="135" text-anchor="middle" font-family="Amiri,serif" font-size="50" fill="var(--gold-deep)" direction="rtl">'+w1+'</text>'
  +'<text id="alcW2" x="200" y="135" text-anchor="middle" font-family="Amiri,serif" font-size="50" direction="rtl">'
   +'<tspan fill="'+grey+'">'+w2.slice(0,g)+'</tspan><tspan fill="var(--red)">'+w2.slice(g,r)+'</tspan><tspan fill="var(--gold-deep)">'+w2.slice(r)+'</tspan></text>'
  +'<path id="alcP2" d="" fill="none" stroke="'+grey+'" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 7" marker-end="url(#alcArrG)"/>'
  +'<text id="alcL2" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="800" fill="'+grey+'">'+skipLab+'</text>'
  +'</svg>';
 $('card').innerHTML='<h2>Connecting two words</h2><p class="sub">'+(moon?'When you read on from the word before, the first alif goes silent \u2014 but the \u0644 still sounds.':'When you read on from the word before, BOTH the alif and the \u0644 go silent \u2014 you land straight on the doubled letter.')+'</p>'
 +'<button class="cell" style="display:block;width:100%;border:none;background:none;padding:0" onclick="playAudio(\''+phrase+'\')">'+svg+'</button>'
 +'<p class="sub center" style="font-size:16px;margin-top:4px">'+tr+' \u00b7 tap the diagram to hear</p>'
 +'<div class="cmp" style="align-items:center;direction:ltr"><div class="cmpc"><div class="ca">'+fromC+'</div><div class="ck">n\u016Bn with \u1E0Damma</div></div><div style="text-align:center;min-width:120px"><div style="font-size:13px;font-weight:800;color:var(--gold-deep);letter-spacing:.04em">'+skipLab+'</div><div style="color:var(--gold-deep);font-size:24px;line-height:1">\u2192</div></div><div class="cmpc"><div class="ca">'+toC+'</div><div class="ck">'+toLab+'</div></div></div>'
 +'<div class="note"><span style="color:'+grey+';font-weight:800">Grey</span> = skipped \u00b7 <span style="color:'+red+';font-weight:800">Red</span> = what you actually say. The skipped alif is the Hamzatul Wasl you already learned.</div>';
 const place=()=>{try{
  const t1=document.getElementById('alcW1'),t2=document.getElementById('alcW2');
  if(!t1||!t1.isConnected||!t2.getExtentOfChar)return;
  const seg=(t,a,b)=>{let x1=1e9,x2=-1e9,y1=1e9,y2=-1e9;for(let i=a;i<b;i++){const e=t.getExtentOfChar(i);if(!e.width&&!e.height)continue;x1=Math.min(x1,e.x);x2=Math.max(x2,e.x+e.width);y1=Math.min(y1,e.y);y2=Math.max(y2,e.y+e.height);}return {cx:(x1+x2)/2,top:y1,bot:y2,x1:x1,x2:x2};};
  const redS=seg(t2,g,r), greyS=seg(t2,0,g);
  const b1=t1.getBBox(); const sx=b1.x+8, sy=b1.y+6;
  const ex=redS.cx, ey=redS.top-26;
  document.getElementById('alcP1').setAttribute('d','M '+sx+' '+sy+' C '+(sx-50)+' '+(sy-48)+', '+(ex+60)+' '+(ey-34)+', '+ex+' '+(ey+16));
  const l1=document.getElementById('alcL1'); l1.setAttribute('x',(sx+ex)/2); l1.setAttribute('y',Math.min(sy,ey)-44);
  const gx=greyS.cx, gy=Math.min(greyS.bot+4,205);
  document.getElementById('alcP2').setAttribute('d','M '+gx+' '+gy+' C '+gx+' '+(gy+26)+', '+(gx-26)+' '+(gy+34)+', '+(gx-44)+' '+(gy+30));
  const l2=document.getElementById('alcL2'); l2.setAttribute('x',gx-52); l2.setAttribute('y',gy+52);
 }catch(e){}};
 if(document.fonts&&document.fonts.ready){document.fonts.ready.then(()=>requestAnimationFrame(place));}
 setTimeout(place,400);
}};}
function ruleStages(L){
 const learn={name:'Learn',render:()=>{
  let exhtml='';
  if(L.al&&L.sp&&L.sp.w&&L.sp.w.length){
   const x=L.sp.w[0];const n=(x[2]==='\u0652')?3:2;const col=L.al==='moon'?'var(--red)':'#9aa3c4';
   const t=(L.sp.tx&&L.sp.tx[0])||'';const k=t.indexOf('-')+1;
   exhtml='<div class="bigletter" style="font-size:58px"><button class="cell" style="font-size:58px;border:none;background:none;padding:0" onclick="playAudio(\''+x+'\')"><span style="color:'+col+'">'+x.slice(0,n)+'</span>'+x.slice(n)+'</button></div>'
    +(t?'<p class="sub center" style="margin-top:2px;font-size:16px"><span style="color:'+col+';font-weight:800">'+t.slice(0,k)+'</span>'+t.slice(k)+'</p>':'')
    +'<div class="note" style="font-size:14px">'+(L.al==='moon'?'<b style="color:var(--red)">Red</b> = the \u0644 is pronounced.':'<span style="color:#9aa3c4;font-weight:800">Grey</span> = the \u0644 is written but silent \u2014 the next letter doubles.')+'</div>';
  } else if(L.ex){exhtml='<div class="bigletter" style="font-size:64px">'+L.ex+'</div>'+(L.ref?'<p class="sub center">'+L.ref+'</p>':'');}
  $('card').innerHTML='<h2>'+L.title+'</h2><div class="note" style="font-size:15px">'+L.blurb+'</div>'+exhtml;
 }};
 const st=[learn];
 if(L.al)st.push(S_alConnect(L));
 st.push(S_spotlight(L));
 const w=(L.sp&&L.sp.w)||[];
 if(w.length>=3){
  st.push({name:'Mastery',render:()=>{const all=shuffle(w);const q=[];for(let i=0;i<10;i++){const a=all[i%all.length];q.push({audio:a,q:'Which did you hear?',opts:shuffle([a,all[(i+1)%all.length],all[(i+2)%all.length]]),a:a});}runQuiz(q);}});
 } else {
  st.push({name:'Done',render:()=>{done[Li]=true;saveDone();$('card').innerHTML='<div class="result"><div class="bigletter" style="font-size:60px">\u{1F4D6}</div><div class="big" style="font-family:Cinzel;font-size:28px;font-weight:700">Lesson complete</div><p class="sub">Remember: verify the Quran examples with your reviewer.</p></div>';drawSteps();}});
 }
 return st;
}

function S_masteryLetters(L){return {name:'Mastery',render:()=>{

function S_words(L,name){return {name:name||'Words',render:()=>{
 if(!L.words||!L.words.length){$('card').innerHTML='<h2>Words</h2><div class="note">Example words for this lesson are to be added with your reviewer.</div>';return;}
 const row=w=>'<div class="qword"><span class="ar">'+w.ar+'</span><span class="tx">'+(w.v?'':'')+'</span><button class="listen sm" onclick="playAudio(\''+w.ar+'\')"><svg class="hp" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg></button></div>';
 $('card').innerHTML='<h2>Read real words</h2><p class="sub">Tap to hear. Reviewed by teacher \u2014 confirm final text on Quran.com.</p>'+L.words.map(row).join('');
}};}
const MARKINFO={'\u064E':{nm:'fat\u1E25a',snd:'a'},'\u0650':{nm:'kasra',snd:'i'},'\u064F':{nm:'\u1E0Damma',snd:'u'},'\u0652':{nm:'suk\u016Bn',snd:''}};
function S_masteryMark(L){return {name:'Mastery',render:()=>{
 const a=L.mark||(L.marks&&L.marks[0])||F;
 const info=MARKINFO[a]||MARKINFO[F];
 const others=[F,K,D].filter(x=>x!==a);
 let _last=null;const pick=()=>{let c;do{c=SAMPLE[Math.floor(Math.random()*SAMPLE.length)];}while(c===_last);_last=c;return c;};
 const sndOf=(c,mk)=>{const s=M[c].s;const mi=MARKINFO[mk];return mk==='\u0652'?s:s+(mi?mi.snd:'a');};
 const q=[];
 if(a==='\u0652'){
  // Suk\u016Bn drill \u00b7 spot the word with the silent letter, then decode closed syllables
  const SW=['\u0645\u0650\u0646\u0652','\u0642\u064F\u0644\u0652','\u0647\u064E\u0644\u0652','\u0644\u064E\u0645\u0652','\u0643\u064E\u0645\u0652','\u0628\u064E\u0644\u0652'];
  const NW=['\u0643\u064E\u062A\u064E\u0628\u064E','\u0630\u064E\u0647\u064E\u0628\u064E','\u0639\u064E\u0644\u0650\u0645\u064E','\u0631\u064E\u062D\u0650\u0645\u064E','\u062C\u064E\u0639\u064E\u0644\u064E','\u0631\u064F\u0633\u064F\u0644\u064F','\u0647\u064F\u0648\u064E','\u0634\u064E\u0631\u0650\u0628\u064E'];
  const sw=shuffle(SW),nw=shuffle(NW);
  for(let i=0;i<5;i++){const ans=sw[i%sw.length];q.push({q:'Tap the word with the <b>silent</b> (suk\u016Bn) letter.',opts:shuffle([ans,nw[(i*2)%nw.length],nw[(i*2+1)%nw.length]]),a:ans});}
  for(let i=0;i<5;i++){const c=pick();const w='\u0623'+F+c+a;q.push({q:'What does this say?',big:w,latin:true,opts:shuffle(['a'+M[c].s,M[c].s+'a','a'+M[c].s+'i']),a:'a'+M[c].s});}
  runQuiz(q);return;
 }
 // Rung 1 \u00b7 spot the mark (shape recognition)
 for(let i=0;i<3;i++){const c=pick();q.push({q:'Tap the letter with the <b>'+info.nm+'</b>.',opts:shuffle([c+a,c+others[0],c+others[1]]),a:c+a});}
 // Rung 2 \u00b7 tap the sound (read the mark)
 for(let i=0;i<3;i++){const c=pick();q.push({q:'Tap the one that says \u201C<b>'+sndOf(c,a)+'</b>\u201D.',opts:shuffle([c+a,c+others[0],c+others[1]]),a:c+a});}
 // Rung 3 \u00b7 pure decode (read the syllable)
 for(let i=0;i<4;i++){const c=pick();const mks=shuffle([a,others[0],others[1]]);q.push({q:'What does this say?',big:c+a,latin:true,opts:mks.map(mk=>sndOf(c,mk)),a:sndOf(c,a)});}
 runQuiz(q);
}};}
function movementStages(L){
 const S0='\u0652';
 let listenItems, sukRead=null;
 if(L.mark===S0){
  const T='\u062A\u064E',Y='\u064A\u064E';
  const drillable=ALLL.filter(c=>c!=='\u0627');           // every letter takes sukūn except alif
  const picks=shuffle(drillable).slice(0,16).map((c,i)=>(Math.random()<.5?T:Y)+c+S0);
  listenItems=picks.slice(0,8);
  const rest=picks.slice(8);
  sukRead={name:'Read',render:()=>{$('card').innerHTML='<h2>Read with the suk\u016Bn</h2><p class="sub">A vowelled letter first, then the silent letter \u2014 the syllable closes. Tap to hear.</p>'+rows(rest,4)+'<div class="note" style="font-size:14px;color:var(--dim)">Book-style drill (\u062A\u064E \u00b7 \u064A\u064E + silent letter).</div>';}};
 } else {
  listenItems=SAMPLE.slice(0,6).map(c=>c+(L.marks?L.marks[0]:L.mark));
 }
 const st=[S_learnMark(L),S_listen(listenItems),sukRead||S_markRead(L)];
 if(L.words&&L.words.length){
  const w=L.words.map(x=>x.ar||x);
  w.forEach((x,i)=>st.push({name:'Word '+(i+1)+'/'+w.length,render:()=>{$('card').innerHTML='<h2>Read a real word \u00b7 '+(i+1)+' of '+w.length+'</h2><p class="sub">Read each letter, then blend them into the word. Tap the word to hear it.</p>'+spellOne(x);}}));
 } else {
  st.push(S_markPractice(L));
 }
 st.push(S_masteryMark(L));
 return st;
}

function longvowelStages(L){

  ['\u0633\u064E\u0628\u0650\u064A\u0644\u064F','\u0643\u064E\u0631\u0650\u064A\u0645\u064F','\u0639\u064E\u0638\u0650\u064A\u0645\u064F','\u0642\u0650\u064A\u0644\u064E'],
  ['\u0631\u064E\u0633\u064F\u0648\u0644\u064F','\u064A\u064E\u0642\u064F\u0648\u0644\u064F','\u063A\u064E\u0641\u064F\u0648\u0631\u064F','\u0634\u064E\u0643\u064F\u0648\u0631\u064F']
 ];
 const labels=TYPES.map(t=>t[0]);
 const mast={name:'Mastery',render:()=>{
   const q=[];let last=null;
   for(let i=0;i<10;i++){
     let ti;do{ti=Math.floor(Math.random()*3);}while(false);
     let wd;do{wd=pools[ti][Math.floor(Math.random()*pools[ti].length)];}while(wd===last);last=wd;
     q.push({q:'Which madd is in this word?',big:wd,latin:true,opts:labels.slice(),a:labels[ti]});
   }
   runQuiz(q);
 }};
 return [mast];
}
function letterDrillStages(L){
 const mk=(pool,n)=>{const p=shuffle(pool).slice(0,n);return p.map(t=>({audio:M[t].n,q:'You hear the name \u2014 tap the letter.',opts:shuffle([t].concat(shuffle(pool.filter(x=>x!==t)).slice(0,3))),a:t}));};
 const r1={name:'Drill 1',render:()=>{runQuiz(mk(G[0].concat(G[1]),7));}};
 const r2={name:'Drill 2',render:()=>{runQuiz(mk(G[2].concat(G[3]),7));}};
 const mast={name:'Mastery',render:()=>{runQuiz(mk(ALLL,10));}};
 return [r1,r2,mast];
}
/* ===== quiz runner ===== */
let qz=[],qi=0,score=0;
function runQuiz(arr){qz=arr;qi=0;score=0;renderQ();}
function renderQ(){
 if(qi>=qz.length)return renderResult();
 const it=qz[qi];
 $('card').innerHTML='<div class="qcount">Check \u00b7 '+(qi+1)+' of '+qz.length+'</div><div class="q">'+it.q+' '+(it.audio?'<button class="listen sm" onclick="playAudio(\''+it.audio+'\')"><svg class="hp" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5 6 9H3v6h3l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M18.5 5.5a9 9 0 0 1 0 13"/></svg> Play</button>':'')+'</div>'+(it.big?'<div class="bigletter" style="font-size:64px">'+it.big+'</div>':'')+'<div class="tiles'+(it.latin?' latin':'')+'" id="qT"></div><div class="feedback" id="qF"></div>';
 quizTiles('qT','qF',it.opts,it.a,ok=>{if(ok)score++;qi++;renderQ();});
}
function renderResult(){
 const pct=Math.round(score/qz.length*100),pass=pct>=80,off=314-(314*pct/100);
 if(pass){done[Li]=true;saveDone();}
 $('card').innerHTML='<div class="result"><div class="ring"><svg width="120" height="120"><circle cx="60" cy="60" r="50" stroke="#eef0fb" stroke-width="12" fill="none"/><circle cx="60" cy="60" r="50" stroke="'+(pass?'#15803d':'#b3261e')+'" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="'+off+'"/></svg><span class="pct" style="color:'+(pass?'#15803d':'#b3261e')+'">'+pct+'%</span></div><div class="big" style="font-family:Cinzel;font-size:36px;font-weight:700;color:'+(pass?'#15803d':'#b3261e')+'">'+(pass?'Passed':'Almost!')+'</div><p class="sub">'+(pass?'Next lesson unlocked.':'You need 80%. Review and try again.')+'</p><button class="listen" onclick="go(cur)">\u21BB Try again</button></div>';
 drawSteps();
}

renderChapters();
