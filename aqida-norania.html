<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lisaany — Quran Norania</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1b2154;--indigo-deep:#141a44;--indigo-soft:#2a3270;--gold:#e8b62b;--gold-br:#ffd83a;--gold-deep:#b3842b;--paper:#f5f6fb;--card:#fff;--border:#e7e9f5;--dim:#5b6092;--green:#15803d;--green-bg:#e8f7ee;--red:#b3261e;--red-bg:#fdecea;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:680px;margin:0 auto;padding:18px 16px 120px;}
  .ar{font-family:'Amiri',serif;direction:rtl}
  .tpl{background:#fff7e0;border:1px solid #f0dca0;border-radius:12px;padding:10px 14px;font-size:12.5px;color:#7a5c12;margin-bottom:16px;font-weight:600}
  .bar{background:linear-gradient(135deg,var(--navy),var(--indigo-soft));border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:13px;box-shadow:0 18px 40px -24px rgba(27,33,84,.6);position:relative;overflow:hidden}
  .bar>*{position:relative;z-index:1}
  .bar::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.16;background-image:url("data:image/svg+xml,%3Csvg width='28' height='49' viewBox='0 0 28 49' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill-rule='evenodd'%3E%3Cg fill='%23ffd83a'%3E%3Cpath d='M13.99 9.25l13 7.5v15l-13 7.5L1 31.75v-15l12.99-7.5zM3 17.9v12.7l11 6.34 11-6.35V17.9l-11-6.34L3 17.9zM0 15l12.98-7.5V0h-2v6.35L0 12.69v2.3zm0 18.5L12.98 41v8h-2v-6.85L0 35.81v-2.3zM15 0v7.5L27.99 15H28v-2.31h-.01L17 6.35V0h-2zm0 49v-8l12.99-7.5H28v2.31h-.01L17 42.15V49h-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");background-size:42px 73.5px;-webkit-mask-image:linear-gradient(90deg,transparent 26%,#000 100%);mask-image:linear-gradient(90deg,transparent 26%,#000 100%)}
  .qrlogo{width:40px;height:40px;border-radius:11px;background:rgba(255,216,58,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .bar .t1{color:#fff;font-family:'Cinzel',serif;font-size:17px;font-weight:600;letter-spacing:.03em}
  .bar .t2{color:var(--gold-br);font-size:12px;margin-top:3px;font-weight:500}
  .bar .prog{margin-left:auto;text-align:right;color:#cfd5ee;font-size:12px;font-weight:600}
  .bar .prog b{color:var(--gold-br);font-size:15px;font-family:'Cinzel'}

  /* HOME */
  .grouphead{font-family:'Cinzel',serif;font-size:14px;font-weight:600;color:var(--dim);letter-spacing:.04em;margin:24px 4px 12px;text-transform:uppercase}
  .lessons{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
  .lcard{background:#fff;border:1px solid var(--border);border-radius:18px;padding:18px;cursor:pointer;transition:.16s;box-shadow:0 10px 28px -20px rgba(27,33,84,.4);position:relative;text-align:center}
  .lcard:hover{transform:translateY(-4px);border-color:var(--gold);box-shadow:0 18px 36px -20px rgba(232,182,43,.5)}
  .lcard.locked{opacity:.5;cursor:default}
  .lcard.locked:hover{transform:none;border-color:var(--border);box-shadow:0 10px 28px -20px rgba(27,33,84,.4)}
  .lcard .lar{font-family:'Amiri',serif;font-size:54px;color:var(--gold-deep);line-height:1.1}
  .lcard .lnm{font-weight:700;font-size:14px;margin-top:4px}
  .lcard .lsnd{font-size:12px;color:var(--dim)}
  .lcard .done{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:50%;background:var(--green);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:900}
  .lcard .lock{position:absolute;top:10px;right:12px;color:var(--dim);font-size:14px}

  /* PLAYER */
  .steps{display:flex;gap:6px;margin:18px 0 6px}
  .step{flex:1;height:6px;border-radius:99px;background:#e3e6f2;transition:background .25s}
  .step.done{background:var(--gold)} .step.cur{background:var(--gold-br)}
  .topline{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .stepname{font-size:12px;color:var(--dim);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .exit{background:none;border:none;color:var(--dim);font-weight:700;font-size:13px;cursor:pointer;font-family:inherit}
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px 16px;box-shadow:0 14px 36px -26px rgba(27,33,84,.4);min-height:300px}
  h2{font-family:'Cinzel',serif;font-size:20px;margin:0 0 4px;font-weight:600}
  .sub{color:var(--dim);font-size:14px;margin-bottom:18px}
  .bigletter{font-family:'Amiri',serif;font-size:78px;line-height:1.05;color:var(--gold-deep);text-align:center;margin:2px 0}
  .factrow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
  .fact{background:var(--paper);border:1px solid var(--border);border-radius:12px;padding:9px 11px;text-align:center;min-width:84px}
  .fact .k{font-size:11px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
  .fact .v{font-size:18px;font-weight:700;margin-top:3px}
  .fact .v.ar{font-size:24px;color:var(--gold-deep)}
  .listen{display:inline-flex;align-items:center;gap:9px;background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);border:none;font-family:inherit;font-weight:700;font-size:15px;padding:12px 22px;border-radius:12px;cursor:pointer;box-shadow:0 10px 22px -12px rgba(232,182,43,.8);transition:transform .14s}
  .listen:hover{transform:translateY(-1px)} .listen.sm{padding:8px 13px;font-size:13px}
  .center{text-align:center}
  .obj{background:#fff7e0;border:1px solid #f0dca0;border-radius:14px;padding:14px 16px;margin-bottom:18px}
  .obj h4{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--gold-deep);margin:0 0 9px}
  .obj ul{margin:0;padding:0;list-style:none;display:grid;gap:7px}
  .obj li{display:flex;gap:9px;align-items:flex-start;font-size:14px;font-weight:600}
  .obj li::before{content:'✓';color:var(--green);font-weight:900;flex:none}
  .mkgrid{display:grid;gap:10px;margin-top:14px}
  .mkitem{display:flex;gap:12px;align-items:center;background:var(--paper);border:1px solid var(--border);border-radius:13px;padding:12px 14px}
  .mkitem .ko{font-size:11px;color:var(--dim);font-weight:800;text-transform:uppercase;letter-spacing:.06em;min-width:54px}
  .mkitem .vo{font-size:14px;font-weight:600;flex:1}
  .mkitem.bad2{background:var(--red-bg);border-color:#f3cfcb}
  .mkitem.bad2 .ko,.mkitem.bad2 .vo{color:var(--red)}
  .spot{display:flex;align-items:center;justify-content:center;gap:16px;background:var(--paper);border:1px dashed var(--gold);border-radius:14px;padding:14px;margin-top:16px}
  .spot .qw{font-family:'Amiri';font-size:38px;color:var(--gold-deep)}
  .spot .cap{font-size:13px;color:var(--dim);font-weight:600}
  .tiles{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:12px 0}
  .tile{font-family:'Amiri',serif;font-size:38px;width:70px;height:78px;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--border);border-radius:16px;color:var(--navy);cursor:pointer;transition:.15s;box-shadow:0 8px 22px -16px rgba(27,33,84,.4)}
  .tile:hover{border-color:var(--gold);transform:translateY(-2px)}
  .tile.right{border-color:var(--green);background:var(--green-bg);color:var(--green)}
  .tile.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
  .rows{display:grid;gap:9px;margin:8px 0}
  .rrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .cell{font-family:'Amiri',serif;font-size:29px;min-width:56px;padding:7px 9px;background:#fff;border:1.5px solid var(--border);border-radius:13px;color:var(--gold-deep);cursor:pointer;transition:.13s;text-align:center}
  .cell:hover{border-color:var(--gold);background:#fffdf5}
  .cell.lit{border-color:var(--gold);background:#fff7e0}
  .note{background:var(--paper);border-radius:12px;padding:11px 13px;font-size:13.5px;margin:11px 0}
  .note b{color:var(--gold-deep)}
  .cmp{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:6px 0 4px}
  .cmpc{background:var(--paper);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;min-width:92px}
  .cmpc .ca{font-family:'Amiri';font-size:48px;color:var(--gold-deep);line-height:1}
  .cmpc .ck{font-size:11px;color:var(--dim);font-weight:700;margin-top:4px}
  .vocabhead{font-family:'Cinzel',serif;font-size:15px;font-weight:600;margin:4px 0 10px}
  .qword{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#fff;border:1px solid var(--border);border-radius:14px;padding:12px 16px;margin-bottom:10px}
  .qword .ar{font-size:30px;color:var(--gold-deep)}
  .qword .tx{font-size:13px;color:var(--dim);text-align:right}
  .qword .tx b{display:block;color:var(--navy);font-size:15px}
  .q{font-size:16px;font-weight:700;margin:4px 0 12px}
  .qcount{font-size:12px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
  .feedback{font-size:14px;font-weight:700;margin-top:14px;min-height:20px}
  .feedback.ok{color:var(--green)} .feedback.no{color:var(--red)}
  .ring{width:120px;height:120px;margin:6px auto 10px;position:relative}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel';font-weight:700;font-size:26px}
  .result{text-align:center} .result .big{font-family:'Cinzel';font-size:40px;font-weight:700}
  .navbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-top:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;gap:12px;max-width:680px;margin:0 auto}
  .btn{font-family:inherit;font-weight:700;font-size:15px;padding:13px 26px;border-radius:12px;cursor:pointer;border:none;transition:transform .14s}
  .btn-next{background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);box-shadow:0 10px 22px -12px rgba(232,182,43,.8)}
  .btn-next:hover{transform:translateY(-1px)}
  .btn-back{background:#fff;border:1px solid var(--border);color:var(--navy)}
  .btn-back:disabled{opacity:.4;cursor:default}
  .hide{display:none}

/* Arabic reads right-to-left: letters, combos, compare, tiles flow RTL */
.factrow,.rrow,.cmp,.tiles{direction:rtl}
</style>
</head>
<body>
<div class="wrap">
  <div class="tpl">🧪 Norania — foundational course (~26 lessons). 🎧 = placeholder voice (record later). Quran words reviewed by teacher; final Uthmānī text to be set from <b>Quran.com</b>. Draft — not yet wired to login.</div>

  <div class="bar">
    <div class="qrlogo"><svg viewBox="0 0 100 130" aria-hidden="true" style="width:64%;height:64%"><defs><linearGradient id="gmixn" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ffe98a"/><stop offset=".55" stop-color="#ffd83a"/><stop offset="1" stop-color="#e8b62b"/></linearGradient></defs><path d="M50 10 C45 24 31 42 31 64 C31 79 40 88 50 88 C60 88 69 79 69 64 C69 42 55 24 50 10 Z M48.6 18 L51.4 18 L50.8 54 L49.2 54 Z M44.5 60 A5.5 5.5 0 1 1 55.5 60 A5.5 5.5 0 1 1 44.5 60 Z M41 94 Q41 89 50 89 Q59 89 59 94 L59 99 L41 99 Z M37 103 Q37 101 39 101 L61 101 Q63 101 63 103 L63 113 Q63 115 61 115 L39 115 Q37 115 37 113 Z" fill="url(#gmixn)" fill-rule="evenodd"/></svg></div>
    <div><div class="t1">Quran Norania</div><div class="t2">Read the Quran — foundational course</div></div>
    <div class="prog" id="prog"></div>
  </div>

  <div id="home"></div>

  <div id="player" class="hide">
    <div class="steps" id="steps"></div>
    <div class="topline"><span class="stepname" id="stepname"></span><button class="exit" onclick="goHome()">✕ Exit lesson</button></div>
    <div class="card" id="card"></div>
  </div>
</div>

<div class="navbar hide" id="navbar">
  <button class="btn btn-back" id="backBtn">← Back</button>
  <button class="btn btn-next" id="nextBtn">Next →</button>
</div>

<script>
const $=id=>document.getElementById(id);
const F='\u064E',K='\u0650',D='\u064F',S='\u0652';            // fatha kasra damma sukun
const TF='\u064B',TK='\u064D',TD='\u064C',SH='\u0651';        // tanwin(fath/kasr/damm) shaddah
const ALIF='\u0627',WAW='\u0648',YA='\u064A';
function playAudio(t){try{if(!('speechSynthesis'in window))return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ar-SA';u.rate=.75;speechSynthesis.speak(u);}catch(e){}}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const M={
 '\u0627':{n:'\u0623\u064E\u0644\u0650\u0641',s:'a',d:'no dots'},
 '\u0628':{n:'\u0628\u064E\u0627\u0621',s:'b',d:'one dot below'},
 '\u062A':{n:'\u062A\u064E\u0627\u0621',s:'t',d:'two dots above'},
 '\u062B':{n:'\u062B\u064E\u0627\u0621',s:'th',d:'three dots above'},
 '\u062C':{n:'\u062C\u0650\u064A\u0645',s:'j',d:'one dot inside'},
 '\u062D':{n:'\u062D\u064E\u0627\u0621',s:'\u1E25',d:'no dots'},
 '\u062E':{n:'\u062E\u064E\u0627\u0621',s:'kh',d:'one dot above'},
 '\u062F':{n:'\u062F\u064E\u0627\u0644',s:'d',d:'no dots'},
 '\u0630':{n:'\u0630\u064E\u0627\u0644',s:'dh',d:'one dot above'},
 '\u0631':{n:'\u0631\u064E\u0627\u0621',s:'r',d:'no dots'},
 '\u0632':{n:'\u0632\u064E\u0627\u064A',s:'z',d:'one dot above'},
 '\u0633':{n:'\u0633\u0650\u064A\u0646',s:'s',d:'no dots'},
 '\u0634':{n:'\u0634\u0650\u064A\u0646',s:'sh',d:'three dots above'},
 '\u0635':{n:'\u0635\u064E\u0627\u062F',s:'\u1E63',d:'no dots'},
 '\u0636':{n:'\u0636\u064E\u0627\u062F',s:'\u1E0D',d:'one dot above'},
 '\u0637':{n:'\u0637\u064E\u0627\u0621',s:'\u1E6D',d:'no dots'},
 '\u0638':{n:'\u0638\u064E\u0627\u0621',s:'\u1E93',d:'one dot above'},
 '\u0639':{n:'\u0639\u064E\u064A\u0646',s:'\u02BF',d:'no dots'},
 '\u063A':{n:'\u063A\u064E\u064A\u0646',s:'gh',d:'one dot above'},
 '\u0641':{n:'\u0641\u064E\u0627\u0621',s:'f',d:'one dot above'},
 '\u0642':{n:'\u0642\u064E\u0627\u0641',s:'q',d:'two dots above'},
 '\u0643':{n:'\u0643\u064E\u0627\u0641',s:'k',d:'no dots'},
 '\u0644':{n:'\u0644\u064E\u0627\u0645',s:'l',d:'no dots'},
 '\u0645':{n:'\u0645\u0650\u064A\u0645',s:'m',d:'no dots'},
 '\u0646':{n:'\u0646\u064F\u0648\u0646',s:'n',d:'one dot above'},
 '\u0647':{n:'\u0647\u064E\u0627\u0621',s:'h',d:'no dots'},
 '\u0648':{n:'\u0648\u064E\u0627\u0648',s:'w',d:'no dots'},
 '\u064A':{n:'\u064A\u064E\u0627\u0621',s:'y',d:'two dots below'},
 '\u0621':{n:'\u0647\u064E\u0645\u0632\u0629',s:'\u02BE',d:'a small sign'}
};

const G=[
 ['\u0627','\u0628','\u062A','\u062B','\u0646','\u064A'],
 ['\u062C','\u062D','\u062E'],
 ['\u062F','\u0630','\u0631','\u0632'],
 ['\u0633','\u0634','\u0635','\u0636'],
 ['\u0637','\u0638','\u0639','\u063A','\u0641'],
 ['\u0642','\u0643','\u0644','\u0645','\u0647','\u0648','\u0621']
];
const ALLL=G.reduce((a,b)=>a.concat(b),[]);
const cum=[]; let acc=[]; G.forEach(g=>{acc=acc.concat(g);cum.push(acc.slice());});
const SAMPLE=['\u0628','\u062A','\u062C','\u062F','\u0631','\u0633','\u0639','\u0641','\u0642','\u0643','\u0644','\u0645','\u0646'];

function combos(pool,mark){const m=mark||F;const out=[];for(let i=0;i<pool.length;i++){out.push(pool[i]+m+pool[(i+1)%pool.length]+m);}for(let i=0;i+2<pool.length&&i<3;i++){out.push(pool[i]+m+pool[i+1]+m+pool[i+2]+m);}return out;}
function chunk(a,n){const o=[];for(let i=0;i<a.length;i+=n)o.push(a.slice(i,i+n));return o;}

/* ===== LESSON LIST (foundational ~26) ===== */
const LESSONS=[
 {part:'Letters',type:'letters',title:'Group 1 · the tooth-letters',icon:'\u0628',letters:G[0],pool:cum[0],sp:{intro:'These Quran words use letters from this group.',w:['\u0628\u0650\u0633\u0652\u0645\u0650','\u0627\u0644\u0646\u0651\u064E\u0627\u0633\u0650','\u0623\u064E\u0646\u0652\u062A\u064E','\u0627\u0644\u0652\u062D\u064E\u0645\u0652\u062F\u064F \u0644\u0650\u0644\u0651\u064E\u0647\u0650'],mission:'Find \u0628, \u062A, \u0646 \u2014 and meet al-\u1E25amdu lill\u0101h.'}},
 {part:'Letters',type:'letters',title:'Group 2 · J\u012Bm family',icon:'\u062C',letters:G[1],pool:cum[1]},
 {part:'Letters',type:'letters',title:'Group 3 · D\u0101l \u00b7 R\u0101',icon:'\u062F',letters:G[2],pool:cum[2]},
 {part:'Letters',type:'letters',title:'Group 4 · S\u012Bn \u00b7 \u1E62\u0101d',icon:'\u0633',letters:G[3],pool:cum[3]},
 {part:'Letters',type:'letters',title:'Group 5 · \u1E6C\u0101 \u00b7 \u02BFAyn \u00b7 F\u0101',icon:'\u0639',letters:G[4],pool:cum[4]},
 {part:'Letters',type:'letters',title:'Group 6 · Q\u0101f \u2192 Hamza',icon:'\u0642',letters:G[5],pool:cum[5]},
 {part:'Reading & movements',type:'reading',title:'Reading practice · all letters',icon:'\u{1F4D6}',pool:ALLL,mark:F},
 {part:'Reading & movements',type:'movement',title:'Fat\u1E25a \u2014 the "a" sound',icon:'\u064E',mark:F,ex:'\u0628'+F,blurb:'A small stroke above the letter says \u201ca\u201d.',sp:{w:['\u062E\u064E\u0644\u064E\u0642\u064E','\u062C\u064E\u0639\u064E\u0644\u064E'],mission:'Find every fat\u1E25a.'}},
 {part:'Reading & movements',type:'movement',title:'Kasra \u2014 the "i" sound',icon:'\u0650',mark:K,ex:'\u0628'+K,blurb:'A small stroke below the letter says \u201ci\u201d.',sp:{w:['\u0628\u0650\u0633\u0652\u0645\u0650','\u0641\u0650\u064A'],mission:'Point to every kasra.'}},
 {part:'Reading & movements',type:'movement',title:'\u1E0Camma \u2014 the "u" sound',icon:'\u064F',mark:D,ex:'\u0628'+D,blurb:'A small loop above the letter says \u201cu\u201d.',sp:{w:['\u0642\u064F\u0644\u0652','\u0647\u064F\u0648\u064E'],mission:'Read the \u1E0Damma sounds.'}},

/* ===== progress ===== */
let done={};try{done=JSON.parse(localStorage.getItem('norania-prog-lean')||'{}')||{};}catch(e){done={};}
function saveDone(){try{localStorage.setItem('norania-prog-lean',JSON.stringify(done));}catch(e){}}

/* ===== HOME ===== */
function renderHome(){
 const ndone=Object.keys(done).length;
 $('prog').innerHTML='<b>'+ndone+'</b> / '+LESSONS.length+' lessons';
 const parts=['Letters','Reading & movements','Reading rules','Toward the Quran','Bonus \u00b7 Tajw\u012Bd'];
 let html='';
 parts.forEach(p=>{
  html+='<div class="grouphead">'+p+'</div><div class="lessons">';
  LESSONS.forEach((L,i)=>{ if(L.part!==p)return;
   const isDone=done[i], locked=i>0&&!done[i-1]&&!isDone;
   html+='<div class="lcard '+(locked?'locked':'')+'" '+(locked?'':'onclick="openLesson('+i+')"')+'>'
    +(isDone?'<div class="done">\u2713</div>':(locked?'<div class="lock">\uD83D\uDD12</div>':''))
    +'<div class="lar">'+L.icon+'</div><div class="lnm" style="font-size:12.5px">'+L.title+'</div></div>';
  });
  html+='</div>';
 });
 $('home').innerHTML=html;
}
function goHome(){$('player').classList.add('hide');$('navbar').classList.add('hide');$('home').classList.remove('hide');renderHome();window.scrollTo(0,0);}

/* ===== PLAYER ===== */
let L=null,Li=0,stages=[],cur=0;
function openLesson(i){Li=i;L=LESSONS[i];stages=buildStages(L);cur=0;$('home').classList.add('hide');$('player').classList.remove('hide');$('navbar').classList.remove('hide');go(0);}
function drawSteps(){$('steps').innerHTML=stages.map((s,i)=>'<div class="step '+(i<cur?'done':'')+' '+(i===cur?'cur':'')+'"></div>').join('');$('stepname').textContent=(cur+1)+' / '+stages.length+' \u00b7 '+stages[cur].name;}
function go(i){cur=Math.max(0,Math.min(stages.length-1,i));drawSteps();stages[cur].render();$('backBtn').disabled=cur===0;$('nextBtn').textContent=cur===stages.length-1?'Finish':'Next \u2192';window.scrollTo(0,0);}
$('nextBtn').onclick=()=>{ if(cur===stages.length-1){ if(L.type==='placeholder'||L.type==='words'){done[Li]=true;saveDone();} goHome(); } else go(cur+1); };
$('backBtn').onclick=()=>go(cur-1);
function lit(el){document.querySelectorAll('.cell.lit').forEach(x=>x.classList.remove('lit'));el.classList.add('lit');}
function cells(arr){return '<div class="rrow">'+arr.map(x=>'<button class="cell" onclick="lit(this);playAudio(\''+x+'\')">'+x+'</button>').join('')+'</div>';}
function rows(arr,per){return '<div class="rows">'+chunk(arr,per||3).map(r=>cells(r)).join('')+'</div>';}
function quizTiles(bx,fb,opts,ans,cb){$(bx).innerHTML=opts.map(o=>'<button class="tile" style="font-size:30px;width:auto;min-width:84px;padding:0 12px">'+o+'</button>').join('');let an=false;Array.from($(bx).children).forEach(b=>{b.onclick=()=>{if(an)return;an=true;if(b.textContent===ans){b.classList.add('right');$(fb).textContent='\u2713 Correct';$(fb).className='feedback ok';}else{b.classList.add('wrong');Array.from($(bx).children).forEach(x=>{if(x.textContent===ans)x.classList.add('right');});$(fb).textContent='The answer is highlighted in green.';$(fb).className='feedback no';}if(cb)setTimeout(()=>cb(b.textContent===ans),1000);};});}

/* ===== STAGE BUILDERS BY TYPE ===== */
function buildStages(L){
 if(L.type==='rule') return ruleStages(L);
 let st;
 if(L.type==='letters') st=lettersStages(L);
 else if(L.type==='movement') st=movementStages(L);
 else if(L.type==='longvowel') st=longvowelStages(L);
 else if(L.type==='reading') st=readingStages(L);
 else if(L.type==='words') st=wordsStages(L);
 else if(L.type==='placeholder') return placeholderStages(L);
 else return [];
 if(L.sp) st.splice(st.length-1,0,S_spotlight(L));
 return st;
}
function S_spotlight(L){return {name:'Quran',render:()=>{
 const w=(L.sp&&L.sp.w)||[];
 const row=x=>'<div class="qword"><span class="ar">'+x+'</span><span class="tx"></span><button class="listen sm" onclick="playAudio(\''+x+'\')">\uD83C\uDFA7</button></div>';
 $('card').innerHTML='<h2>Find it in the Quran</h2><p class="sub">'+((L.sp&&L.sp.intro)||'These Quran words use what you just learned.')+'</p>'
  +(w.length?w.map(row).join(''):'<div class="note">Quran words to add from your source site.</div>')
  +'<div class="note" style="margin-top:10px"><b>Mission:</b> '+((L.sp&&L.sp.mission)||'Find what you learned in these words.')+'</div>'
  +'<div class="note" style="font-size:12px">Reviewed by teacher \u00b7 final Uthm\u0101n\u012B text to be pulled from Quran.com.</div>';
}};}
function ruleStages(L){
 const learn={name:'Learn',render:()=>{$('card').innerHTML='<h2>'+L.title+'</h2>'+(L.ex?'<div class="bigletter" style="font-size:64px">'+L.ex+'</div>':'')+'<div class="note" style="font-size:15px">'+L.blurb+'</div>';}};
 const st=[learn,S_spotlight(L)];
 const w=(L.sp&&L.sp.w)||[];
 if(w.length>=3){
  st.push({name:'Mastery',render:()=>{const q=w.slice(0,4).map((x,i)=>({audio:x,q:'Which did you hear?',opts:shuffle([x,w[(i+1)%w.length],w[(i+2)%w.length]]),a:x}));runQuiz(q);}});
 } else {
  st.push({name:'Done',render:()=>{done[Li]=true;saveDone();$('card').innerHTML='<div class="result"><div class="bigletter" style="font-size:60px">\u{1F4D6}</div><div class="big" style="font-family:Cinzel;font-size:28px;font-weight:700">Lesson complete</div><p class="sub">Remember: verify the Quran examples with your reviewer.</p></div>';drawSteps();}});
 }
 return st;
}

function S_learnLetters(L){return {name:'Learn',render:()=>{
 $('card').innerHTML='<h2>Meet the letters</h2><p class="sub">Tap each letter to hear it.</p>'
 +'<div class="factrow">'+L.letters.map(c=>'<div class="fact" style="cursor:pointer;min-width:62px;padding:12px 10px" onclick="playAudio(\''+c+'\')"><div class="v ar" style="font-size:46px">'+c+'</div><div style="font-size:13px;color:var(--gold-deep);margin-top:2px">\uD83C\uDFA7</div></div>').join('')+'</div>'
 +'<div class="note" style="margin-top:16px"><b>The win:</b> once you know these, you can already read short combinations \u2014 you\u2019ll do it in this lesson.</div>';
}};}
function S_listen(items,all){return {name:'Listen',render:()=>{
 $('card').innerHTML='<h2>Listen</h2><p class="sub">Tap each to hear it.</p>'+rows(items,4)+'<div class="center" style="margin-top:8px"><button class="listen" onclick="playAudio(\''+(all||items.join(' '))+'\')">\uD83C\uDFA7 Listen to all</button></div>';
}};}
function S_recognize(L){return {name:'Recognize',render:()=>{
 const t=L.letters[Math.min(1,L.letters.length-1)];const opts=shuffle(L.letters.slice(0,Math.min(4,L.letters.length)));
 $('card').innerHTML='<h2>Find the letter</h2><p class="sub">Listen, then tap the letter you hear. <button class="listen sm" onclick="playAudio(\''+t+'\')">\uD83C\uDFA7 Play</button></p><div class="tiles" id="rT"></div><div class="feedback" id="rF"></div>';
 quizTiles('rT','rF',opts,t);
}};}
function S_compare(L){return {name:'Compare',render:()=>{
 const set=L.letters.slice(0,Math.min(4,L.letters.length));
 $('card').innerHTML='<h2>Tell them apart</h2><p class="sub">Same family \u2014 the dots differ.</p>'
 +'<div class="cmp">'+set.map(c=>'<div class="cmpc"><div class="ca">'+c+'</div><div class="ck">'+M[c].d+'</div></div>').join('')+'</div>'
 +'<p class="sub center" style="margin-top:14px">Which did you hear? <button class="listen sm" onclick="playAudio(\''+set[0]+'\')">\uD83C\uDFA7 Play</button></p><div class="tiles" id="cT"></div><div class="feedback" id="cF"></div>';
 quizTiles('cT','cF',shuffle(set),set[0]);
}};}
function S_read(pool,mark,title){return {name:'Read',render:()=>{
 const cs=combos(pool,mark==='mix'?F:(mark||F));
 $('card').innerHTML='<h2>'+(title||'Read along')+'</h2><p class="sub">Tap each to hear, then read aloud.</p>'+rows(cs.slice(0,6),3);
}};}
function S_practice(pool,mark){return {name:'Practice',render:()=>{
 const cs=combos(pool.slice().reverse(),mark==='mix'?K:(mark||F));
 $('card').innerHTML='<h2>Keep reading</h2><p class="sub">More patterns. Tap, then read.</p>'+rows(cs.slice(0,6),3);
}};}
function S_masteryLetters(L){return {name:'Mastery',render:()=>{
 const set=L.letters.slice(0,Math.min(4,L.letters.length));
 const cs=combos(L.pool,F);
 const q=[];
 set.slice(0,3).forEach(t=>q.push({audio:t,q:'You hear it \u2014 which letter?',opts:shuffle(set),a:t}));
 const c=cs[0],c2=cs[2]||cs[1];
 q.push({audio:c,q:'Which did you hear?',opts:shuffle([c,c2,cs[4]||cs[1]]),a:c});
 if(q.length<5)q.push({audio:cs[1],q:'Which did you hear?',opts:shuffle([cs[1],cs[3]||cs[0],cs[5]||cs[2]]),a:cs[1]});
 runQuiz(q.slice(0,5));
}};}

function lettersStages(L){const forms=L.letters.map(c=>c+F);return [S_learnLetters(L),S_listen(forms),S_recognize(L),S_compare(L),S_read(L.pool,F),S_masteryLetters(L)];}

function S_learnMark(L){return {name:'Learn',render:()=>{

function S_words(L,name){return {name:name||'Words',render:()=>{

 const row=w=>'<div class="qword"><span class="ar">'+w.ar+'</span><span class="tx">'+(w.v?'':'')+'</span><button class="listen sm" onclick="playAudio(\''+w.ar+'\')">\uD83C\uDFA7</button></div>';

function S_masteryMark(L){return {name:'Mastery',render:()=>{
 const a=L.mark||(L.marks&&L.marks[0])||F;

 const q=[
  {audio:b1+a,q:'You hear it. Which mark?',opts:shuffle([b1+F,b1+K,b1+D].concat(L.marks?[b1+TF]:[])).slice(0,3),a:b1+a},
  {audio:t1+a,q:'You hear it. Which one?',opts:shuffle([t1+F,t1+K,t1+D]),a:t1+a},
  {audio:b1+a,q:'Which did you hear?',opts:shuffle([b1+a,t1+a,'\u062C'+a]),a:b1+a},
  {audio:'\u062F'+a,q:'Which did you hear?',opts:shuffle(['\u062F'+a,'\u0631'+a,'\u0633'+a]),a:'\u062F'+a},
  {audio:'\u0645'+a,q:'Which did you hear?',opts:shuffle(['\u0645'+a,'\u0646'+a,'\u0644'+a]),a:'\u0645'+a}
 ];

}};}
function movementStages(L){
 const st=[S_learnMark(L),S_listen(SAMPLE.slice(0,6).map(c=>c+(L.marks?L.marks[0]:L.mark))),S_markRead(L),S_markPractice(L)];

   +'<div class="rows"><div class="rrow">'+forms('\u0628').map(x=>'<button class="cell" onclick="lit(this);playAudio(\''+x+'\')">'+x+'</button>').join('')+'</div></div>'

 const read={name:'Read',render:()=>{const cs=combos(L.pool,mark);$('card').innerHTML='<h2>Reading practice</h2><p class="sub">Read each row aloud. Tap to check.</p>'+rows(cs.slice(0,6),3);}};
 const prac={name:'Practice',render:()=>{const cs=combos(L.pool.slice().reverse(),L.mark==='mix'?F:mark);$('card').innerHTML='<h2>Keep going</h2><p class="sub">More rows. Read out loud.</p>'+rows(cs.slice(0,6),3);}};
 const mast={name:'Mastery',render:()=>{const cs=combos(L.pool,mark);const q=[];for(let i=0;i<5;i++){const a=cs[i%cs.length];const b=cs[(i+2)%cs.length];const c=cs[(i+4)%cs.length];q.push({audio:a,q:'Which did you hear?',opts:shuffle([a,b,c]),a:a});}runQuiz(q);}};
 return [read,prac,mast];
}

function wordsStages(L){
 const learn=S_words(L,'Read');
 const mast={name:'Mastery',render:()=>{const w=L.words;const q=w.slice(0,5).map((x,i)=>({audio:x.ar,q:'Which did you hear?',opts:shuffle([x.ar,w[(i+1)%w.length].ar,w[(i+2)%w.length].ar]),a:x.ar}));runQuiz(q);}};
 return [learn,mast];
}

function placeholderStages(L){
 return [{name:'Lesson',render:()=>{done[Li]=true;saveDone();$('card').innerHTML='<h2>'+L.title+'</h2>'+(L.ex?'<div class="bigletter" style="font-size:38px;line-height:1.6">'+L.ex+'</div>'+(L.ref?'<p class="sub center" style="margin-top:-2px">'+L.ref+'</p>':''):'<div class="center" style="margin-top:10px"><div class="bigletter" style="font-size:54px">\u{1F4D6}</div></div>')+'<div class="note" style="font-size:14px">'+L.note+'</div>';}}];
}

/* ===== quiz runner ===== */
let qz=[],qi=0,score=0;
function runQuiz(arr){qz=arr;qi=0;score=0;renderQ();}
function renderQ(){
 if(qi>=qz.length)return renderResult();
 const it=qz[qi];
 $('card').innerHTML='<div class="qcount">Check \u00b7 '+(qi+1)+' of '+qz.length+'</div><div class="q">'+it.q+' '+(it.audio?'<button class="listen sm" onclick="playAudio(\''+it.audio+'\')">\uD83C\uDFA7 Play</button>':'')+'</div><div class="tiles" id="qT"></div><div class="feedback" id="qF"></div>';
 quizTiles('qT','qF',it.opts,it.a,ok=>{if(ok)score++;qi++;renderQ();});
}
function renderResult(){
 const pct=Math.round(score/qz.length*100),pass=pct>=80,off=314-(314*pct/100);
 if(pass){done[Li]=true;saveDone();}
 $('card').innerHTML='<div class="result"><div class="ring"><svg width="120" height="120"><circle cx="60" cy="60" r="50" stroke="#eef0fb" stroke-width="12" fill="none"/><circle cx="60" cy="60" r="50" stroke="'+(pass?'#15803d':'#b3261e')+'" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="'+off+'"/></svg><span class="pct" style="color:'+(pass?'#15803d':'#b3261e')+'">'+pct+'%</span></div><div class="big" style="font-family:Cinzel;font-size:36px;font-weight:700;color:'+(pass?'#15803d':'#b3261e')+'">'+(pass?'Passed':'Almost!')+'</div><p class="sub">'+(pass?'Next lesson unlocked.':'You need 80%. Review and try again.')+'</p><button class="listen" onclick="go(cur)">\u21BB Try again</button></div>';
 drawSteps();
}

renderHome();
</script>
