<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="google" content="notranslate">
<title>Lisaany — Arabic Language Path</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="session.js" defer></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060e1b;--s1:#0a1421;--s2:#111927;--s3:#18212f;--s4:#212b3a;--s5:#2a3548;
  --gold:#f2be62;--gold2:#d4a34a;--green:#a7d1a6;--red:#e07070;--blue:#7a9cc8;--purple:#9c7ab8;
  --text:#dae3f6;--dim:#bbc6db;--faint:rgba(255,255,255,.05);
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.14);--on-gold:#3a2400;
  /* Extended design tokens for new layouts */
  --card:#132040;--card-elev:rgba(20,32,64,.95);--card-hover:#1b2d54;
  --gold-soft:#d4a34a;--gold-deep:#8a6420;
  --gold-glow:rgba(242,190,98,.18);
  --green-soft:rgba(127,201,156,.10);
  --border-strong:rgba(255,255,255,.14);
  --r-sm:12px;--r-md:16px;--r-lg:22px;
}
html,body{height:100%;background:#060e1b;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
#app{position:fixed;top:80px;left:0;right:0;bottom:0;display:flex;flex-direction:column;}
@media(max-width:980px){#app{top:68px;}}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(10,9,6,.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,163,74,.2);z-index:10;}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-ar{font-family:'Amiri',serif;font-size:22px;background:linear-gradient(135deg,#f2be62,#d4a34a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-en{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);}
.logo-tag{font-size:13px;color:var(--dim);background:var(--faint);padding:3px 10px;border-radius:999px;border:1px solid var(--border);}
.xp-chip{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:var(--faint);border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--gold);}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 20px 100px;}
.scroll::-webkit-scrollbar{width:0;}
.bottom-nav{flex-shrink:0;display:flex;align-items:center;justify-content:space-around;padding:12px 16px 20px;background:rgba(8,16,28,.7);backdrop-filter:blur(24px);border-top:1px solid var(--border);border-radius:28px 28px 0 0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.3);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'Inter',sans-serif;transition:all .2s;}
.nav-btn.active{color:var(--gold);}
.nav-btn .ms{font-family:'Material Symbols Outlined';font-size:24px;line-height:1;}

.bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 20%,rgba(19,32,50,.8) 0%,transparent 65%);}
.scroll,.topbar,.bottom-nav{position:relative;z-index:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:999px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;transition:all .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--gold);color:var(--on-gold);box-shadow:0 0 18px rgba(212,163,74,.25);}
.btn-primary:hover{box-shadow:0 0 30px rgba(212,163,74,.45);}
.btn-ghost{background:var(--faint);color:var(--text);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,.09);}
.btn-block{width:100%;}
.btn-sm{padding:8px 14px;font-size:12px;}
.action-row{display:flex;gap:10px;width:100%;}
.action-row .btn{flex:1;}
.page-title{font-family:'Cinzel',serif;font-size:21px;font-weight:700;color:var(--text);line-height:1.2;}
.page-sub{font-size:12px;color:var(--dim);line-height:1.6;}
.stage{display:flex;flex-direction:column;gap:16px;max-width:920px;margin:0 auto;width:100%;}
.rule-card{background:var(--faint);border:1px solid var(--border);border-radius:14px;border-top:2px solid rgba(74,144,217,.3);padding:12px 16px;font-size:12px;color:var(--dim);line-height:1.7;}
.rule-card strong{color:var(--text);}
.phase-label{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);}
.phase-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}
/* HUB — Redesigned to match learnarabic preview */
.hub-header{
  text-align:center; padding:28px 0 36px;
  border-bottom:1px solid var(--border);
  margin-bottom:30px; position:relative;
}
.hub-header::before{
  content:''; position:absolute; left:50%; bottom:-1px;
  transform:translateX(-50%); width:80px; height:1px;
  background:linear-gradient(90deg, transparent, var(--gold), transparent);
}
.hub-eyebrow{
  display:inline-flex; align-items:center; gap:8px;
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  letter-spacing:.28em; text-transform:uppercase; color:var(--gold);
  margin-bottom:14px;
}
.hub-eyebrow::before, .hub-eyebrow::after{
  content:''; width:24px; height:1px;
  background:currentColor; opacity:.4;
}
.hub-title{
  font-family:'Cinzel',serif; font-size:34px; font-weight:600;
  color:#f5e8c5; line-height:1.2;
  margin-bottom:12px;
}
.hub-arabic{
  font-family:'Amiri',serif; font-size:24px;
  color:var(--gold); margin-bottom:14px;
}
.hub-sub{
  color:var(--dim); max-width:540px;
  margin:0 auto; font-size:13px; line-height:1.6;
}

/* Journey bar */
.journey-bar{
  background:linear-gradient(135deg, rgba(242,190,98,.08), rgba(242,190,98,.02));
  border:1px solid var(--gold-glow);
  border-radius:18px;
  padding:18px 22px;
  margin-bottom:18px;
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:20px;
}
.journey-bar-meta{
  font:600 10px/1 'Inter',sans-serif;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); margin-bottom:6px;
}
.journey-bar-num{
  font-family:'Cinzel',serif; font-size:20px; font-weight:600;
  color:var(--text);
}
.journey-bar-track{
  height:8px; background:rgba(255,255,255,.05);
  border-radius:99px; overflow:hidden; position:relative;
}
.journey-bar-fill{
  height:100%;
  background:linear-gradient(90deg, var(--gold-soft), var(--gold));
  border-radius:99px; box-shadow:0 0 12px var(--gold-glow);
  transition:width .4s ease;
}
.journey-bar-pct{
  font-family:'Cinzel',serif; font-size:18px;
  color:var(--gold); font-variant-numeric:tabular-nums;
}
@media (max-width:560px){
  .journey-bar{grid-template-columns:1fr;text-align:center;gap:10px;}
}

/* Continue card */
.continue-card{
  display:flex; align-items:center; gap:16px;
  background:linear-gradient(135deg, rgba(242,190,98,.12), rgba(242,190,98,.04));
  border:1px solid var(--gold-glow); border-radius:18px;
  padding:16px 20px; margin-bottom:30px;
  cursor:pointer; transition:all .2s;
  text-decoration:none; color:inherit;
}
.continue-card:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 24px var(--gold-glow);
  border-color:var(--gold);
}
.continue-card-icon{
  width:44px; height:44px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-soft));
  display:flex; align-items:center; justify-content:center;
  color:#3a2400; font-size:22px; flex-shrink:0;
}
.continue-card-body{flex:1;min-width:0;}
.continue-card-eyebrow{
  font:600 10px/1 'Inter',sans-serif;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); margin-bottom:5px;
}
.continue-card-title{
  font-family:'Cinzel',serif; font-size:16px; font-weight:500;
  color:var(--text); margin-bottom:3px;
}
.continue-card-meta{
  font:400 12px/1.3 'Inter',sans-serif; color:var(--dim);
  overflow:hidden; text-overflow:ellipsis;
}
.continue-card-arrow{
  color:var(--gold); font-size:22px;
  flex-shrink:0;
}

/* Section heading */
.section-heading{
  font-family:'Cinzel',serif; font-size:12px; font-weight:600;
  letter-spacing:.22em; text-transform:uppercase; color:var(--dim);
  margin:8px 0 16px; display:flex; align-items:center; gap:12px;
}
.section-heading::after{
  content:''; flex:1; height:1px;
  background:linear-gradient(90deg, var(--border), transparent);
}

/* Modules grid */
.modules-grid{
  display:flex; flex-direction:column; gap:10px;
}

/* Module card */
.module-card{
  display:grid; grid-template-columns:auto 1fr auto;
  gap:16px; align-items:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:16px;
  padding:16px 18px;
  cursor:pointer; transition:all .2s;
  text-decoration:none; color:inherit;
  position:relative; overflow:hidden;
}
.module-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:transparent; transition:background .2s;
}
.module-card:hover{
  border-color:var(--border-strong);
  transform:translateY(-1px);
  background:rgba(20,32,64,.85);
}
.module-card.completed::before{background:var(--green);}
.module-card.in-progress::before{background:var(--gold);}
.module-card.locked{opacity:.55; cursor:pointer;}

.module-icon{
  width:46px; height:46px; border-radius:13px;
  background:linear-gradient(135deg, rgba(242,190,98,.15), rgba(242,190,98,.05));
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:22px;
  flex-shrink:0;
}
.module-card.locked .module-icon{
  background:rgba(255,255,255,.03);
  border-color:var(--border);
  color:var(--dim);
}
.module-icon span{font-size:22px;}

.module-body{min-width:0;}
.module-num{
  font-family:'Cinzel',serif; font-size:13px; font-weight:600;
  letter-spacing:.22em; color:var(--gold-soft);
  margin-bottom:3px;
}
.module-card.locked .module-num{color:var(--dim);}
.module-title{
  font-family:'Cinzel',serif; font-size:15px; font-weight:500;
  color:var(--text); margin-bottom:6px;
}
.module-meta{
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  font:500 11px/1 'Inter',sans-serif;
  letter-spacing:.04em; color:var(--dim);
}
.module-meta-pill{
  padding:3px 8px; border-radius:99px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  font-weight:600;
}
.module-meta-pill.free{
  color:var(--green);
  border-color:rgba(127,201,156,.3);
  background:var(--green-soft);
}
.module-meta-pill.premium{
  color:var(--gold);
  border-color:var(--gold-glow);
  background:rgba(242,190,98,.05);
}

.module-status{
  display:flex; flex-direction:column;
  align-items:flex-end; gap:5px;
  flex-shrink:0;
}
.module-status-icon{
  width:28px; height:28px; border-radius:50%;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--dim);
}
.module-status-icon.done{
  background:var(--green-soft);
  border-color:var(--green);
  color:var(--green);
}
.module-status-icon.progress{
  background:rgba(242,190,98,.12);
  border-color:var(--gold);
  color:var(--gold);
}
.module-status-icon.locked{color:var(--dim);}
.module-progress-mini{
  font-family:'Cinzel',serif; font-size:13px;
  color:var(--gold); font-weight:600;
  font-variant-numeric:tabular-nums;
}
.module-card.locked .module-progress-mini{color:var(--dim);}

@media (max-width:560px){
  .hub-title{font-size:30px;}
  .hub-arabic{font-size:22px;}
  .hub-sub{font-size:14px;}
  .module-card{grid-template-columns:auto 1fr auto;gap:14px;padding:18px 16px;}
  .module-icon{width:52px;height:52px;border-radius:14px;}
  .module-icon span{font-size:26px;}
  .module-num{font-size:13px;}
  .module-title{font-size:17px;line-height:1.3;}
  .module-meta{font-size:12px;}
  .module-status-icon{width:34px;height:34px;font-size:16px;}
  .module-progress-mini{font-size:13px;}
  .journey-bar-num{font-size:18px;}
  .journey-bar-pct{font-size:20px;}
  .continue-card-title{font-size:17px;}
  .continue-card-meta{font-size:13px;}
  .section-heading{font-size:13px;}
}
/* /HUB */

/* MODULE VIEW (Units list inside a module) */
.module-hero{
  text-align:center; padding:30px 24px;
  background:linear-gradient(180deg, rgba(23,39,73,.7), rgba(19,32,64,.7));
  border:1px solid var(--gold-glow); border-radius:22px;
  margin-bottom:28px; position:relative; overflow:hidden;
}
.module-hero-icon{
  width:64px; height:64px; border-radius:18px; margin:0 auto 16px;
  background:linear-gradient(135deg, rgba(242,190,98,.2), rgba(242,190,98,.05));
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:32px;
}
.module-hero-icon span{font-size:32px;}
.module-hero-eyebrow{
  font:600 11px/1 'Inter',sans-serif;
  letter-spacing:.28em; text-transform:uppercase;
  color:var(--gold); margin-bottom:10px;
}
.module-hero-title{
  font-family:'Cinzel',serif;
  font-size:28px; font-weight:600;
  color:#f5e8c5; margin-bottom:8px; line-height:1.2;
}
.module-hero-arabic{
  font-family:'Amiri',serif;
  font-size:20px; color:var(--gold);
  margin-bottom:12px;
}
.module-hero-sub{
  color:var(--dim); max-width:540px;
  margin:0 auto; font-size:13px; line-height:1.5;
}

.units-list{
  display:flex; flex-direction:column; gap:10px;
}
.unit-card{
  display:grid; grid-template-columns:auto 1fr auto;
  gap:18px; align-items:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 20px;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
}
.unit-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:transparent; transition:background .2s;
}
.unit-card:hover{
  border-color:var(--border-strong);
  background:rgba(20,32,64,.85);
  transform:translateX(2px);
}
.unit-card.completed::before{background:var(--green);}
.unit-card.in-progress::before{background:var(--gold);}
.unit-card.locked{opacity:.55;}
.unit-id{
  font-family:'Cinzel',serif;
  font-size:14px; font-weight:600;
  color:var(--gold);
  width:36px; text-align:center;
  font-variant-numeric:tabular-nums;
}
.unit-card.locked .unit-id{color:var(--dim);}
.unit-title{
  font-family:'Cinzel',serif;
  font-size:15px; font-weight:500;
  color:var(--text); margin-bottom:3px;
}
.unit-blocks-count{
  font:600 10px/1 'Inter',sans-serif;
  letter-spacing:.16em; text-transform:uppercase;
  color:var(--gold-soft);
}
.unit-card.completed .unit-blocks-count{color:var(--green);}
.unit-card.locked .unit-blocks-count{color:var(--dim);}
.unit-icon-small{
  width:32px; height:32px; border-radius:10px;
  background:rgba(242,190,98,.08);
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:16px;
}
.unit-icon-small.done{
  background:var(--green-soft);
  border-color:var(--green);
  color:var(--green);
}
.unit-icon-small.progress{
  background:rgba(242,190,98,.15);
  border-color:var(--gold);
  color:var(--gold);
}

/* UNIT VIEW (Blocks list inside a unit) */
.unit-hero{
  padding:24px 22px;
  margin-bottom:24px;
  background:linear-gradient(180deg, rgba(23,39,73,.7), rgba(19,32,64,.7));
  border:1px solid var(--border);
  border-radius:22px;
}
.unit-hero-eyebrow{
  font:600 11px/1 'Inter',sans-serif;
  letter-spacing:.22em; text-transform:uppercase;
  color:var(--gold); margin-bottom:10px;
}
.unit-hero-title{
  font-family:'Cinzel',serif;
  font-size:24px; font-weight:600;
  color:#f5e8c5; margin-bottom:8px; line-height:1.2;
}
.unit-hero-arabic{
  font-family:'Amiri',serif;
  font-size:17px; color:var(--gold);
  margin-bottom:14px; direction:rtl;
}
.unit-objectives-list{
  margin-top:14px; padding-top:14px;
  border-top:1px dashed var(--border);
}
.unit-objectives-heading{
  font:600 11px/1 'Inter',sans-serif;
  letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold); margin:0 0 10px;
}
.unit-objectives-list ul{
  margin:0; padding-left:18px;
  color:var(--dim); font-size:13px;
  line-height:1.6;
}
.unit-objectives-list li{margin-bottom:4px;}

.blocks-list{
  display:flex; flex-direction:column; gap:10px;
}
.block-card{
  display:grid; grid-template-columns:auto 1fr auto;
  gap:14px; align-items:center;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
}
.block-card::before{
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:transparent; transition:background .2s;
}
.block-card:hover{
  border-color:var(--border-strong);
  background:rgba(20,32,64,.85);
  transform:translateX(2px);
}
.block-card.completed::before{background:var(--green);}
.block-card.active::before{background:var(--gold);}
.block-card.locked{opacity:.55;}
.block-icon{
  width:44px; height:44px; border-radius:12px;
  background:rgba(242,190,98,.08);
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:22px;
  flex-shrink:0;
}
.block-icon span{font-size:22px;}
.block-icon.done{
  background:var(--green-soft);
  border-color:rgba(127,201,156,.3);
  color:var(--green);
}
.block-type-tag{
  font:600 10px/1 'Inter',sans-serif;
  letter-spacing:.2em; text-transform:uppercase;
  color:var(--gold-soft); margin-bottom:4px;
}
.block-card.completed .block-type-tag{color:var(--green);}
.block-title{
  font-family:'Cinzel',serif;
  font-size:15px; font-weight:500;
  color:var(--text); margin-bottom:2px;
}
.block-desc{
  font:400 12px/1.4 'Inter',sans-serif;
  color:var(--dim); direction:rtl; text-align:left;
}
.block-status-icon{
  width:30px; height:30px; border-radius:50%;
  background:rgba(255,255,255,.03);
  border:1px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center;
  font-size:14px; color:var(--dim);
  flex-shrink:0;
}
.block-status-icon.done{
  background:var(--green-soft);
  border-color:var(--green);
  color:var(--green);
}
.block-status-icon.active{
  background:rgba(242,190,98,.12);
  border-color:var(--gold);
  color:var(--gold);
}

@media (max-width:560px){
  .module-hero{padding:24px 18px;}
  .module-hero-title{font-size:24px;}
  .module-hero-arabic{font-size:18px;}
  .unit-card{padding:14px 16px;gap:12px;}
  .unit-id{width:30px;font-size:13px;}
  .unit-title{font-size:14px;}
  .unit-hero{padding:20px 18px;}
  .unit-hero-title{font-size:21px;}
  .unit-hero-arabic{font-size:15px;}
  .block-card{padding:12px 14px;gap:12px;}
  .block-icon{width:40px;height:40px;}
  .block-title{font-size:14px;}
  .block-desc{font-size:13px;}
}
/* /UNIT VIEW */

/* LESSON HEADER (used by dialogue, vocab, grammar, clutter, possessive) */
.lesson-hdr{
  background:linear-gradient(180deg, var(--card-elev), var(--card));
  border:1px solid var(--border);
  border-radius:22px;
  padding:22px 24px;
  margin-bottom:22px;
  display:flex; align-items:center; gap:18px;
}
.lesson-hdr-icon{
  width:48px; height:48px; border-radius:14px;
  background:rgba(242,190,98,.1);
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold); font-size:24px;
  flex-shrink:0;
}
.lesson-hdr-icon span{font-size:24px;}
.lesson-hdr-body{flex:1;min-width:0;}
.lesson-hdr-eyebrow{
  font:600 11px/1 'Inter',sans-serif;
  letter-spacing:.22em; text-transform:uppercase;
  color:var(--gold); margin-bottom:6px;
}
.lesson-hdr-title{
  font-family:'Cinzel',serif;
  font-size:21px; font-weight:500;
  color:#f5e8c5; margin-bottom:4px;
}
.lesson-hdr-arabic{
  font-family:'Amiri',serif;
  font-size:15px; color:var(--gold-soft);
  direction:rtl; text-align:left;
}
@media (max-width:560px){
  .lesson-hdr{padding:18px 18px;gap:14px;}
  .lesson-hdr-icon{width:42px;height:42px;}
  .lesson-hdr-title{font-size:18px;}
}
/* /LESSON HEADER */

/* COMPLETE */
.complete-wrap{
  display:flex; flex-direction:column;
  align-items:center; gap:18px;
  text-align:center; padding:30px 16px;
  max-width:600px; margin:0 auto;
}
.complete-medal{
  width:108px; height:108px; border-radius:50%;
  background:linear-gradient(135deg, var(--gold), var(--gold-deep));
  display:flex; align-items:center; justify-content:center;
  font-size:56px; color:#3a2400;
  box-shadow:0 0 60px var(--gold-glow), inset 0 4px 16px rgba(255,255,255,.2);
}
.complete-medal span{font-size:56px;}
.complete-eyebrow{
  font-family:'Cinzel',serif;
  font-size:13px; font-weight:600;
  letter-spacing:.28em; text-transform:uppercase;
  color:var(--gold);
}
.complete-title{
  font-family:'Cinzel',serif;
  font-size:32px; font-weight:600;
  color:#f5e8c5; line-height:1.2;
}
.complete-sub{
  color:var(--dim); font-size:14px; line-height:1.6;
}
.complete-stats{
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:12px; width:100%; margin-top:6px;
}
.complete-stat{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px; text-align:center;
}
.complete-stat-num{
  font-family:'Cinzel',serif;
  font-size:24px; font-weight:600;
  color:var(--gold); line-height:1; margin-bottom:6px;
}
.complete-stat-label{
  font:500 10px/1 'Inter',sans-serif;
  letter-spacing:.16em; text-transform:uppercase;
  color:var(--dim);
}

/* UPGRADE */
.upgrade-wrap{
  display:flex; flex-direction:column;
  align-items:center; gap:20px;
  text-align:center; padding:30px 16px;
  max-width:520px; margin:0 auto;
}
.upgrade-lock{
  width:80px; height:80px; border-radius:50%;
  background:linear-gradient(135deg, rgba(242,190,98,.2), rgba(242,190,98,.05));
  border:1px solid var(--gold-glow);
  display:flex; align-items:center; justify-content:center;
  color:var(--gold);
}
.upgrade-lock span{font-size:42px;}
.upgrade-eyebrow{
  font-family:'Cinzel',serif;
  font-size:13px; font-weight:600;
  letter-spacing:.28em; text-transform:uppercase;
  color:var(--gold);
}
.upgrade-title{
  font-family:'Cinzel',serif;
  font-size:28px; font-weight:600;
  color:#f5e8c5; line-height:1.2;
}
.upgrade-sub{
  color:var(--dim); max-width:420px;
  font-size:14px; line-height:1.6;
}
.upgrade-features{
  display:flex; flex-direction:column; gap:10px;
  width:100%;
  background:rgba(255,255,255,.02);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 20px;
  text-align:left;
}
.upgrade-feature{
  display:flex; align-items:center; gap:12px;
  font:400 14px/1.4 'Inter',sans-serif;
  color:var(--text);
}
.upgrade-feature .check-ic{
  color:var(--green); font-size:18px; flex-shrink:0;
}
.upgrade-price{
  font-family:'Cinzel',serif;
  font-size:36px; color:var(--gold);
  font-weight:600; margin:6px 0;
}
.upgrade-price-sub{
  font:400 13px/1 'Inter',sans-serif;
  color:var(--dim);
}
/* /COMPLETE + UPGRADE */
/* UNITS */
.uc{border-radius:18px;overflow:hidden;border:1px solid var(--border);background:rgba(17,25,39,.6);cursor:pointer;transition:all .2s;margin-bottom:9px;}
.uc:hover:not(.uc-lk){border-color:rgba(242,190,98,.3);}
.uc.uc-lk{opacity:.45;cursor:not-allowed;}
.uc.uc-on{border-color:var(--gold);}
.uc-inner{padding:14px 16px;display:flex;align-items:center;gap:12px;}
.uc-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:20px;font-variation-settings:'FILL' 1;flex-shrink:0;}
.uc-txt{flex:1;}
.uc-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px;}
.uc-desc{font-size:13px;color:var(--dim);line-height:1.4;}
.uc-dots{display:flex;gap:4px;margin-top:7px;}
.uc-dot{width:18px;height:3px;border-radius:999px;background:var(--s4);}
.uc-dot.done{background:var(--green);}
.uc-dot.act{background:var(--gold);}
/* BLOCKS */
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.bc{border-radius:18px;overflow:hidden;border:1.5px solid var(--border);background:rgba(17,25,39,.6);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;}
.bc:hover:not(.bc-lk){border-color:rgba(242,190,98,.32);transform:translateY(-2px);}
.bc.bc-lk{opacity:.4;cursor:not-allowed;}
.bc.bc-dn{border-color:rgba(127,168,134,.28);}
.bc-top{padding:16px 12px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;}
.bc-ico{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:22px;font-variation-settings:'FILL' 1;}
.bc-num{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.bc-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--text);text-align:center;}
.bc-desc{font-size:13px;color:var(--dim);text-align:center;line-height:1.4;}
.bc-bot{padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.bc-st{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
/* DIALOGUE */
.dscene{border-radius:18px;overflow:hidden;background:rgba(6,14,27,.8);border:1px solid var(--border);}
.dsc-hdr{padding:11px 16px;background:rgba(17,25,39,.6);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;}
.dsc-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);}
.dlines{padding:16px;display:flex;flex-direction:column;gap:12px;}
.dl{display:flex;flex-direction:column;gap:4px;}
.dl.left{align-items:flex-end;}
.dl.right{align-items:flex-start;}
.dl-spk{font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--gold2);padding:0 4px;margin-bottom:6px;display:block;}
.dl-bub{max-width:87%;padding:10px 13px;border-radius:14px;position:relative;}
.dl.left .dl-bub{background:rgba(212,163,74,.09);border:1px solid rgba(212,163,74,.2);border-bottom-right-radius:3px;}
.dl.right .dl-bub{background:var(--faint);border:1px solid var(--border);border-bottom-left-radius:3px;}
.dl-ar{font-family:'Amiri',serif;font-size:28px;color:var(--text);line-height:1.6;text-align:right;direction:rtl;margin-bottom:8px;}
.dl-roman{font-size:13px;color:var(--dim);font-style:italic;margin-top:2px;}
.dl-en{font-size:13px;color:var(--dim);margin-top:6px;line-height:1.5;font-style:italic;}
.dl-play{position:absolute;bottom:-9px;width:24px;height:24px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:13px;font-variation-settings:'FILL' 1;}
.dl.left .dl-play{right:9px;background:var(--gold);color:var(--on-gold);}
.dl.right .dl-play{left:9px;background:var(--s4);color:var(--text);}
.kw-bar{background:rgba(212,163,74,.06);border:1px solid rgba(212,163,74,.13);border-radius:11px;padding:9px 13px;margin:0 16px 16px;}
.kw-title{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.kw-words{display:flex;flex-wrap:wrap;gap:6px;}
.kw-word{background:var(--faint);border:1px solid var(--border);border-radius:8px;padding:3px 9px;font-family:'Amiri',serif;font-size:17px;color:var(--text);cursor:pointer;}
.kw-word:hover{border-color:var(--gold);}
/* VOCAB */
.vpc-row{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--dim);font-weight:600;}
.vpc-bar{flex:1;height:5px;border-radius:999px;background:var(--faint);overflow:hidden;}
.vpc-fill{height:100%;border-radius:999px;background:var(--gold);transition:width .4s;}
.fc{width:100%;height:220px;perspective:900px;cursor:pointer;position:relative;}
.fci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1);}
.fci.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:18px;}
.fc-front{background:rgba(6,14,27,.85);border:1.5px solid rgba(212,163,74,.2);}
.fc-back{background:rgba(6,14,27,.85);border:1.5px solid rgba(127,168,134,.25);transform:rotateY(180deg);}
.fc-ar{font-family:'Amiri',serif;font-size:58px;color:var(--gold);line-height:1;filter:drop-shadow(0 0 13px rgba(242,190,98,.28));}
.fc-cat{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.fc-hint{font-size:13px;color:var(--dim);font-style:italic;}
.fc-en{font-family:'Cinzel',serif;font-size:19px;font-weight:700;color:var(--green);}
.fc-roman{font-size:13px;color:var(--dim);font-style:italic;}
.fc-gr{display:flex;gap:14px;align-items:center;}
.fc-gr-lbl{font-size:13px;color:var(--dim);font-weight:700;letter-spacing:.07em;text-transform:uppercase;}
.fc-masc{font-family:'Amiri',serif;font-size:24px;color:var(--blue);}
.fc-fem{font-family:'Amiri',serif;font-size:24px;color:var(--purple);}
.thumb-row{display:flex;gap:9px;width:100%;}
.thumb-btn{flex:1;padding:10px;border-radius:13px;border:1.5px solid;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;}
.thumb-btn .ms{font-family:'Material Symbols Outlined';font-size:20px;font-variation-settings:'FILL' 1;}
.thumb-no{border-color:rgba(224,112,112,.3);color:var(--red);background:rgba(224,112,112,.07);}
.thumb-yes{border-color:rgba(127,168,134,.3);color:var(--green);background:rgba(127,168,134,.07);}
.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.mini-card{border-radius:11px;border:1px solid var(--border);background:var(--faint);padding:8px 5px;text-align:center;cursor:pointer;transition:all .15s;}
.mini-card:hover{border-color:var(--gold);}
.mini-ar{font-family:'Amiri',serif;font-size:22px;color:var(--text);line-height:1;}
.mini-en{font-size:13px;color:var(--dim);margin-top:2px;font-weight:600;}
.mini-card.known{border-color:rgba(127,168,134,.3);background:rgba(127,168,134,.05);}
.mini-card.known .mini-ar{color:var(--green);}
/* GRAMMAR */
.gh{border-radius:20px;overflow:hidden;background:rgba(6,14,27,.8);border:1px solid rgba(212,163,74,.16);}
.gh-top{padding:24px 16px 16px;display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(6,14,27,.5);position:relative;overflow:hidden;}
.gh-glow{position:absolute;inset:0;background:radial-gradient(circle at 50% 60%,rgba(212,163,74,.1) 0%,transparent 68%);pointer-events:none;}
.gh-ar{font-family:'Amiri',serif;font-size:44px;color:var(--gold);line-height:1;position:relative;z-index:1;}
.gh-title{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--gold);}
.gh-div{height:1px;background:rgba(212,163,74,.16);}
.gh-bot{padding:10px 16px;font-size:13px;color:var(--dim);}
.gt{width:100%;border-radius:12px;overflow:hidden;border:1px solid var(--border);}
.gt-hdr{display:grid;padding:8px 12px;background:var(--s3);font-size:13px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);}
.gt-row{display:grid;padding:10px 12px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
.gt-row:hover{background:var(--faint);}
.gt-row.hl{background:rgba(212,163,74,.07);border-color:rgba(212,163,74,.16);}
.gt-ar{font-family:'Amiri',serif;font-size:21px;color:var(--gold);line-height:1;}
.gt-roman{font-size:13px;color:var(--dim);font-style:italic;}
.gt-en{font-size:13px;color:var(--text);font-weight:500;}
.ge-grid{display:flex;flex-direction:column;gap:8px;}
.ge{border-radius:12px;border:1px solid var(--border);background:var(--faint);padding:11px 13px;cursor:pointer;}
.ge-ar{font-family:'Amiri',serif;font-size:22px;color:var(--text);line-height:1.4;text-align:right;direction:rtl;margin-bottom:4px;}
.ge-en{font-size:13px;color:var(--gold);}
.ge-roman{font-size:13px;color:var(--dim);font-style:italic;margin-top:1px;}
/* CLUTTER */
.score-row{display:flex;align-items:center;justify-content:center;gap:16px;border-radius:13px;padding:11px;background:var(--faint);border:1px solid var(--border);}
.sc-item{text-align:center;}
.sc-val{font-family:'Cinzel',serif;font-size:19px;font-weight:700;}
.sc-lbl{font-size:13px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);margin-top:1px;}
.cpr-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--dim);font-weight:600;}
.c-bar{flex:1;height:5px;border-radius:999px;background:var(--faint);overflow:hidden;}
.c-fill{height:100%;border-radius:999px;background:var(--gold);transition:width .4s;}
.en-prompt{border-radius:13px;background:rgba(212,163,74,.07);border:1px solid rgba(212,163,74,.16);padding:12px 14px;font-size:13px;color:var(--text);line-height:1.6;text-align:center;}
.en-prompt .lbl{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:4px;}
.az{min-height:64px;border-radius:13px;border:2px dashed rgba(255,255,255,.1);background:rgba(6,14,27,.5);padding:9px 12px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;justify-content:center;direction:rtl;transition:border-color .2s;}
.az.cz{border-color:var(--green);background:rgba(127,168,134,.05);}
.az.wz{border-color:var(--red);background:rgba(224,112,112,.04);}
.token{font-family:'Amiri',serif;font-size:18px;padding:6px 11px;border-radius:8px;cursor:pointer;transition:all .15s;border:1.5px solid;user-select:none;}
.t-bank{background:var(--s4);border-color:var(--border2);color:var(--text);}
.t-bank:hover{border-color:var(--gold);background:var(--s3);}
.t-ans{background:rgba(212,163,74,.04);border-color:rgba(212,163,74,.3);color:var(--gold);}
.t-ans:hover{background:rgba(212,163,74,.04);}
.word-bank{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;direction:rtl;}
.cf{border-radius:11px;padding:9px 13px;font-size:12px;line-height:1.6;text-align:center;}
.cf-ok{background:rgba(127,168,134,.09);border:1px solid rgba(127,168,134,.26);color:var(--green);}
.cf-no{background:rgba(224,112,112,.07);border:1px solid rgba(224,112,112,.2);color:var(--red);}
/* COMPLETE */
.cw{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;padding:8px 0;}
.ci-wrap{position:relative;display:flex;align-items:center;justify-content:center;margin:8px 0 2px;}
.ci-glow{position:absolute;width:120px;height:120px;border-radius:50%;filter:blur(36px);}
.ci{width:100px;height:100px;border-radius:50%;background:rgba(17,25,39,.8);border:3px solid;display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:46px;font-variation-settings:'FILL' 1;position:relative;z-index:1;}
.ci-star{position:absolute;top:-5px;right:-5px;width:32px;height:32px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Material Symbols Outlined';font-size:15px;color:var(--on-gold);font-variation-settings:'FILL' 1;box-shadow:0 0 12px rgba(212,163,74,.5);z-index:2;}
.c-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;background:linear-gradient(135deg,#f2e0b0,#f2be62);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.c-sub{font-size:12px;color:var(--dim);line-height:1.6;max-width:280px;}
.xp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;}
.xp-card{background:var(--faint);border:1px solid var(--border);border-radius:15px;padding:14px;display:flex;flex-direction:column;align-items:center;gap:4px;}
.xp-icon{font-family:'Material Symbols Outlined';font-size:24px;font-variation-settings:'FILL' 1;}
.xp-lbl{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);}
.xp-val{font-family:'Cinzel',serif;font-size:20px;font-weight:700;}
.pb{width:100%;height:6px;border-radius:999px;background:var(--faint);overflow:hidden;}
.pb-fill{height:100%;border-radius:999px;background:var(--green);box-shadow:0 0 8px rgba(167,209,166,.4);}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.fb-ov{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.fb-c{width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;animation:pop .2s cubic-bezier(.34,1.56,.64,1);}
.fb-ok{background:rgba(127,168,127,.18);border:2px solid var(--green);color:var(--green);}
.fb-no{background:rgba(224,112,112,.18);border:2px solid var(--red);color:var(--red);}

/* ══ ISLAMIC GEOMETRIC STYLE — applied from Lisaany Home ══ */
/* ══ DEEP REDESIGN ══ */
:root{
  --bg:#060e1b;--s1:#0a1628;--s2:#0d1e36;--s3:#1c1c1c;
  --gold:#d4a347;--gold-lt:#f2d080;--gold-dk:#8a6420;
  --green:#a7d1a6;--blue:#7a9cc8;--purple:#9c7ab8;
  --text:#e8dcc8;--dim:#9a8e78;--faint:rgba(212,163,71,.07);--border:rgba(212,163,71,.14);
}
html,body{background:#060e1b!important;}

/* Animated geometric bg */
.geo-bg-anim{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.geo-bg-anim svg{
  position:absolute;top:-10%;left:-10%;width:120%;height:120%;
  opacity:.02;
  animation:geo-drift 40s linear infinite;
}
@keyframes geo-drift{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* HERO BANNER — full redesign */
.geo-header{
  position:relative;overflow:hidden;
  background:linear-gradient(180deg,#0d0b06 0%,#111008 60%,#060e1b 100%);
  margin:0 -20px;padding:0 20px;
}
/* Top gold border */
.geo-header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--gold-dk) 15%,var(--gold-lt) 40%,var(--gold) 50%,var(--gold-lt) 60%,var(--gold-dk) 85%,transparent 100%);
  z-index:3;
}
/* Bottom border */
.geo-header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(212,163,74,.5) 50%,transparent);
  z-index:3;
}
/* Pattern tiles */
.geo-pattern{
  position:absolute;inset:0;z-index:0;pointer-events:none;

  background-size:100px 100px;
  opacity:.15;
}
/* Side gradient fade */
.geo-pattern-sides{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,#0d0b06 0%,transparent 20%,transparent 80%,#0d0b06 100%);
}
.geo-inner{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  padding:56px 0 50px;text-align:center;
}
/* Corner SVG ornaments */
.geo-corner{position:absolute;z-index:2;pointer-events:none;}
.geo-corner-tl{top:0;left:0;}
.geo-corner-tr{top:0;right:0;transform:scaleX(-1);}
.geo-corner-bl{bottom:0;left:0;transform:scaleY(-1);}
.geo-corner-br{bottom:0;right:0;transform:scale(-1,-1);}

.geo-hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  font-size:13px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--gold);background:rgba(212,163,74,.04);
  border:1px solid rgba(212,163,74,.3);padding:7px 20px;border-radius:999px;
  margin-bottom:22px;
}
.geo-hero-ar{
  font-family:'Amiri',serif;font-size:90px;line-height:1;
  background:linear-gradient(160deg,#fff8e8 0%,var(--gold-lt) 30%,var(--gold) 55%,var(--gold-dk) 80%,#6b4c10 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 40px rgba(212,163,74,.55));
  margin-bottom:16px;animation:float 5s ease-in-out infinite;
}
.gold-divider{display:flex;align-items:center;gap:10px;margin:0 auto 24px;width:240px;}
.gold-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold));}
.gold-divider-line.r{background:linear-gradient(90deg,var(--gold),transparent);}
.gold-divider-star{
  font-size:14px;color:var(--gold);
  font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 1;
  filter:drop-shadow(0 0 6px rgba(212,163,74,.6));
}
.geo-hero-title{
  font-family:'Cinzel',serif;font-size:30px;font-weight:700;line-height:1.2;
  color:#fff;margin-bottom:12px;
  text-shadow:0 2px 30px rgba(0,0,0,.8);
}
.geo-hero-sub{
  font-size:14px;color:rgba(200,190,168,.75);line-height:1.7;
  max-width:290px;margin:0 auto;
}

/* ── ORNAMENTAL SECTION DIVIDER ── */
.ornament-divider{
  display:flex;align-items:center;gap:12px;
  margin:36px 0 18px;
}
.od-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(212,163,74,.3));}
.od-line.r{background:linear-gradient(90deg,rgba(212,163,74,.3),transparent);}
.od-center{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.od-diamond{width:6px;height:6px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 8px rgba(212,163,74,.5);}
.od-label{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);}
