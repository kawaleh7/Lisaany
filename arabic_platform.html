      ${isActive?'box-shadow:0 0 24px rgba(212,163,74,.25);':''}
      transition:all .3s;
    `;

    // ── Arabic line: word-by-word tappable ──
    const arDiv = el('div',{style:{
      fontFamily:"'Amiri',serif",fontSize:'24px',color:'var(--text)',
      direction:'rtl',lineHeight:'1.7',marginBottom:'6px',textAlign:'right'
    }});
    // Split by spaces, keep word + space sequence
    line.ar.split(/(\s+)/).forEach((token, ti)=>{
      if(/^\s+$/.test(token)){
        arDiv.appendChild(document.createTextNode(token));
        return;
      }
      if(!token) return;
      const key = normalizeAr(token);
      const en = wordIdx[key];
      const isActiveWord = S.dlActiveWord && S.dlActiveWord.lineIdx===idx && S.dlActiveWord.tokenIdx===ti;
      const wSpan = el('span',{
        style:{
          position:'relative',cursor:'pointer',padding:'1px 2px',borderRadius:'4px',
          background: isActiveWord ? 'rgba(212,163,74,.22)' : 'transparent',
          transition:'background .15s'
        },
        onclick:(e)=>{
          e.stopPropagation();
          if(isActiveWord){
            S.dlActiveWord = null;
          } else {
            S.dlActiveWord = { lineIdx: idx, tokenIdx: ti, ar: token, en: en || null };
            // Play the word audio (TTS fallback for individual words)
            try{
              const u = new SpeechSynthesisUtterance(token);
              u.lang='ar-SA'; u.rate=0.8;
              window.speechSynthesis.cancel();
              window.speechSynthesis.speak(u);
            }catch(_){}
          }
          render();
        }
      }, token);
      // Popover above active word
      if(isActiveWord){
        const pop = div('');
        pop.style.cssText = `
          position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
          margin-bottom:6px;
          background:linear-gradient(180deg,#f5ecd6,#e8d9b0);
          color:#0a1024;border-radius:10px;padding:8px 12px;
          font-family:'Inter',sans-serif;font-style:normal;font-size:13px;line-height:1.4;
          white-space:nowrap;direction:ltr;text-align:center;
          box-shadow:0 6px 20px rgba(0,0,0,.5);
          z-index:50;
        `;
        if(en){
          pop.appendChild(el('div',{style:{fontWeight:'700',fontSize:'12px'}}, en));
        } else {
          pop.appendChild(el('div',{style:{fontWeight:'600',fontStyle:'italic',color:'#7a6b48'}}, '— not in this lesson —'));
        }
        // Pointer
        const pointer = div('');
        pointer.style.cssText = 'position:absolute;top:100%;left:50%;transform:translateX(-50%);width:0;height:0;border-left:6px solid transparent;border-right:6px solid transparent;border-top:6px solid #e8d9b0;';
        pop.appendChild(pointer);
        wSpan.appendChild(pop);
      }
      arDiv.appendChild(wSpan);
    });
    bub.appendChild(arDiv);

    // English italic — toggled via View Settings
    if(line.en && S.dlShowEn){
      bub.appendChild(el('div',{style:{
        fontSize:'12px',color:'rgba(154,142,120,.75)',fontStyle:'italic',lineHeight:'1.5'
      }},line.en));
    }

    // Audio button row
    const audioRow = div('');
    audioRow.style.cssText = `display:flex;justify-content:${isRight?'flex-start':'flex-end'};margin-top:8px;`;
    const playBtn = el('button',{style:{
      width:'30px',height:'30px',borderRadius:'50%',border:'1px solid rgba(212,163,74,.35)',
      background:'rgba(212,163,74,.1)',cursor:'pointer',
      display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'
    }});
    const playIc = el('span',{style:{fontFamily:"'Material Symbols Outlined'",fontSize:'16px',color:'var(--gold)',fontVariationSettings:"'FILL' 1"}},'volume_up');
    playBtn.appendChild(playIc);
    playBtn.addEventListener('click',(e)=>{ e.stopPropagation(); speak(line.ar); });
    audioRow.appendChild(playBtn);
    bub.appendChild(audioRow);

    bubWrap.appendChild(bub);
    if(isRight){ rightSide.appendChild(bubWrap); } else { leftSide.appendChild(bubWrap); }
    row.appendChild(leftSide);
    row.appendChild(badge);
    row.appendChild(rightSide);
    timeline.appendChild(row);
  });

  // End dot — only shown when not in play mode or play is done
  if(!S.dlPlayMode || S.dlPlayDone){
    const endDot = div('');
    endDot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:var(--gold);margin:0 auto;position:relative;z-index:1;opacity:.5;';
    timeline.appendChild(endDot);
  }
  w.appendChild(timeline);

  // ── Play mode footer cues ──
  if(S.dlPlayMode){
    if(S.dlPlayDone){
      // End-of-dialogue panel
      const endPanel = div('');
      endPanel.style.cssText = 'background:rgba(212,163,74,.08);border:1.5px solid var(--gold);border-radius:16px;padding:18px 16px;text-align:center;margin:16px 0;';
      endPanel.appendChild(el('div',{style:{fontFamily:"'Cinzel',serif",fontSize:'15px',fontWeight:'700',color:'var(--gold)',marginBottom:'12px'}},'Dialogue Complete'));
      const btnRow = div('');
      btnRow.style.cssText = 'display:flex;gap:10px;justify-content:center;';
      btnRow.appendChild(el('button',{
        style:{padding:'10px 18px',borderRadius:'10px',border:'1.5px solid var(--gold)',background:'transparent',color:'var(--gold)',fontWeight:'700',fontSize:'12px',letterSpacing:'.04em',cursor:'pointer'},
        onclick: async ()=>{
          S.dlPlayIdx = 0; S.dlPlayDone = false; S.dlAwaitingTap = false;
          render();
          await playLineAtIdx();
        }
      },'↻ Replay'));
      btnRow.appendChild(el('button',{
        style:{padding:'10px 18px',borderRadius:'10px',border:'none',background:'var(--gold)',color:'#0a1024',fontWeight:'700',fontSize:'12px',letterSpacing:'.04em',cursor:'pointer'},
        onclick: ()=>exitPlayMode()
      },'Done →'));
      endPanel.appendChild(btnRow);
      w.appendChild(endPanel);
    } else if(S.dlAwaitingTap){
      // "Tap to continue" cue
      const tapCue = el('button',{
        style:{
          width:'100%',padding:'14px',borderRadius:'12px',
          border:'1.5px dashed rgba(212,163,74,.5)',
          background:'rgba(212,163,74,.05)',color:'var(--gold)',
          fontSize:'13px',fontWeight:'700',letterSpacing:'.08em',
          cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:'8px',
          margin:'8px 0 16px',
          animation:'pulse 1.6s infinite'
        },
        onclick: async ()=>{ await advancePlayLine(); }
      });
      tapCue.appendChild(document.createTextNode('TAP TO CONTINUE'));
      tapCue.appendChild(el('span',{style:{fontFamily:"'Material Symbols Outlined'",fontSize:'18px',fontVariationSettings:"'FILL' 1"}},'arrow_downward'));
      w.appendChild(tapCue);
    } else {
      // Audio is playing — show playing indicator
      const playingCue = div('');
      playingCue.style.cssText = 'text-align:center;padding:14px;color:var(--gold);font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.7;';
      playingCue.appendChild(document.createTextNode('● Listening...'));
      w.appendChild(playingCue);
    }
  }

  // Key terms extracted
  if(d.keywords?.length){
    // Split paired keyword entries (e.g. "سُعَال / زُكَام" → "Cough / Cold") into individual rows
    const keywords = d.keywords.flatMap(k=>{
      const arParts = (k.ar || '').split(' / ').map(s=>s.trim()).filter(Boolean);
      const enParts = (k.en || '').split(' / ').map(s=>s.trim()).filter(Boolean);
      if(arParts.length > 1 && arParts.length === enParts.length){
        return arParts.map((ar, i) => ({ ...k, ar, en: enParts[i] }));
      }
      return [k];
    });
    const kw = div('');
    kw.style.cssText = 'background:rgba(10,14,24,.8);border:1px solid rgba(212,163,74,.2);border-radius:16px;padding:16px;margin-top:8px;';
    kw.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',letterSpacing:'2px',color:'var(--gold)',marginBottom:'12px'}},'KEY TERMS EXTRACTED'));
    keywords.forEach(k=>{
      const row2 = div('');
      row2.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.05);';
      const left2 = div('');
      left2.appendChild(el('div',{style:{fontFamily:"'Amiri',serif",fontSize:'22px',color:'var(--text)',direction:'rtl',lineHeight:'1.3'}},k.ar));
      if(k.en) left2.appendChild(el('div',{style:{fontSize:'14px',color:'var(--dim)',marginTop:'2px'}},k.en));
      const audioBtn2 = el('button',{style:{width:'32px',height:'32px',borderRadius:'50%',border:'1px solid rgba(212,163,74,.3)',background:'transparent',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}});
      audioBtn2.appendChild(el('span',{style:{fontFamily:"'Material Symbols Outlined'",fontSize:'16px',color:'var(--gold)',fontVariationSettings:"'FILL' 1"}},'volume_up'));
      audioBtn2.addEventListener('click',()=>speak(k.ar));
      row2.appendChild(left2);
      row2.appendChild(audioBtn2);
      kw.appendChild(row2);
    });
    w.appendChild(kw);
  }
  // Show dialect note if present
  if(d.styleNote){
    const sn = div('dialect-note');
    sn.textContent = d.styleNote;
    w.appendChild(sn);
  }

  const nav=div('action-row');
  nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{S.view='blocks';render();}},'← Back'));
  nav.appendChild(el('button',{className:'btn btn-primary',onclick:()=>finishBlock()},'Complete Dialogue →'));
  w.appendChild(nav); return w;
}

  const back=div('fc-face fc-back');

  // Vocabulary Recycling badge
  if(typeof getMastery === 'function'){
    const mastery = getMastery(cur.ar);
    const freq = getWordFreq(cur.ar);
    if(freq > 0){
      const badge = div('recycle-badge recycle-tier-'+mastery.tier);

    if(cur.fem){ const f=div(''); f.appendChild(el('div',{className:'fc-gr-lbl'},'Fem')); f.appendChild(el('div',{className:'fc-fem'},cur.fem)); gr.appendChild(f); }
    back.appendChild(gr);
  }
  const rep=el('button',{className:'btn btn-ghost btn-sm',style:{marginTop:'8px'},onclick:(e)=>{e.stopPropagation();speak(cur.ar);}}); rep.appendChild(ms('volume_up')); rep.appendChild(document.createTextNode(' Repeat')); back.appendChild(rep);
  fci.appendChild(back); fc.appendChild(fci); w.appendChild(fc);
  if(S.vFlip){

    const yes=el('button',{className:'thumb-btn thumb-yes',onclick:()=>{ S.vKnown.add(S.vIdx); S.vFlip=false; if(S.vKnown.size>=total){finishBlock();return;} S.vIdx=(S.vIdx+1)%total; while(S.vKnown.has(S.vIdx))S.vIdx=(S.vIdx+1)%total; render(); }}); yes.appendChild(ms('thumb_up')); yes.appendChild(el('span',{className:'lbl'},' Got it!')); tr.appendChild(yes);

    w.appendChild(vpg); }
  const nav=div('action-row');
  nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{S.view='blocks';render();}},'← Back'));
  nav.appendChild(el('button',{className:'btn btn-primary btn-block',onclick:()=>finishBlock()},'I Know All Words ✓'));
  w.appendChild(nav); return w;
}

}

function mkClutter(blk){

  const pct=Math.round(S.cScore/total*100); const w=div('stage');

  // ── Resolve English prompt: explicit cur.en first, else lookup from same-unit dialogue ──
  // Many clutter sentences mirror dialogue lines exactly — pull the en from there.
  const norm = s => (s||'').replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'').replace(/\s+/g,' ').trim();
  let enText = cur.en;
  if(!enText){
    const unit = getUnit(S.mId, S.uId);
    const dialogueBlk = unit?.blocks.find(b => b.type === 'dialogue');
    const lines = dialogueBlk?.data?.lines || [];
    const match = lines.find(l => l.ar && norm(l.ar) === norm(cur.ar));
    if(match?.en) enText = match.en;
  }

  // Header — new design
  const hdr = div('lesson-hdr');
  const hdrIcon = div('lesson-hdr-icon');
  hdrIcon.appendChild(ms('extension'));
  hdr.appendChild(hdrIcon);
  const hdrBody = div('lesson-hdr-body');
  hdrBody.appendChild(el('div', {className:'lesson-hdr-eyebrow'}, 'Sentence Builder · ' + (S.cIdx+1) + ' of ' + total));

  hdrBody.appendChild(el('div', {className:'lesson-hdr-arabic'}, 'Tap words in order'));
  hdr.appendChild(hdrBody);
  w.appendChild(hdr);
  const sr=div('score-row');
  [{v:S.cScore,l:'Correct',c:'var(--green)'},{v:S.cWrong,l:'Retries',c:'var(--red)'},{v:pct,l:'Score%',c:'var(--gold)'}].forEach(s=>{ const si=div('sc-item'); si.appendChild(el('div',{className:'sc-val',style:{color:s.c}},String(s.v))); si.appendChild(el('div',{className:'sc-lbl'},s.l)); sr.appendChild(si); });
  w.appendChild(sr);
  const pr=div('cpr-row'); pr.appendChild(document.createTextNode('Q '+(S.cIdx+1)+' / '+total)); const cb=div('c-bar'); const cf=div('c-fill'); cf.style.width=pct+'%'; cb.appendChild(cf); pr.appendChild(cb); pr.appendChild(document.createTextNode(pct+'%')); w.appendChild(pr);

  // English prompt — shown only if we have a real English string (skips undefined entirely)
  if(enText){
    const ep=div('en-prompt');
    ep.appendChild(el('span',{className:'lbl'},'Translate to Arabic:'));
    ep.appendChild(document.createTextNode(enText));
    w.appendChild(ep);
  }
  w.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--dim)'}},'Your Answer:'));
  const az=div('az'+(S.cFb==='correct'?' cz':S.cFb==='wrong'?' wz':''));
  if(S.cAns.length===0){ az.appendChild(el('span',{style:{fontSize:'12px',color:'var(--dim)',fontStyle:'italic'}},'Tap words below to build →')); }
  S.cAns.forEach((wrd,i)=>{ const tok=el('span',{className:'token t-ans',onclick:()=>{ if(S.cLocked)return; S.cAns.splice(i,1); S.cBank.push(wrd); render(); }},wrd); az.appendChild(tok); });
  w.appendChild(az);
  if(S.cFb){ const fb=div('cf '+(S.cFb==='correct'?'cf-ok':'cf-no')); fb.innerHTML=S.cFb==='correct'?'✅ <strong>Correct!</strong> '+cur.ar:'❌ <strong>Try again.</strong> Correct: <span style="font-family:\'Amiri\',serif;font-size:18px">'+cur.ar+'</span>'; w.appendChild(fb); }
  // Failure scaffolding: after threshold wrong attempts on this item, offer a graceful exit
  if(S.cFb==='wrong' && (S.cAttempts||0) >= SCAFFOLD_THRESHOLD){
    w.appendChild(mkScaffoldPanel(cur.ar, ()=>advClutter(d)));
  }
  if(!S.cLocked){
    w.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--dim)',textAlign:'center'}},'Word Bank — Tap to add:'));
    const bank=div('word-bank');
    S.cBank.forEach((wrd,i)=>{ const tok=el('span',{className:'token t-bank',onclick:()=>{ S.cAns.push(wrd); S.cBank.splice(i,1); render(); }},wrd); bank.appendChild(tok); });
    w.appendChild(bank);
  }
  const nav=div('action-row');
  if(!S.cLocked&&!S.cFb){
    nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{ S.cAns=[]; S.cBank=buildBankWithDistractors(cur.words, S.mId, S.uId); render(); }},'Clear'));
    const chk=el('button',{className:'btn btn-primary btn-block',onclick:()=>{
      const ua=S.cAns.join(' '); const ca=cur.ar;
      const uaNoSpace=S.cAns.join('');
      const matchOne=(target)=>ua===target||uaNoSpace===target.replace(/\s/g,'');
      const alts=cur.alts||[];
      const ok=matchOne(ca) || alts.some(matchOne);
      S.cFb=ok?'correct':'wrong'; S.cLocked=true;
      if(!ok){ S.cWrong++; S.cAttempts = (S.cAttempts||0) + 1; }
      else { if(window.Lisaany) Lisaany.celebrate({big:true}); }
      render();
      if(ok) setTimeout(()=>{ S.cScore++; advClutter(d); },1200);
    }},'Check Answer ✓'); nav.appendChild(chk);
  } else if(S.cFb==='wrong' && (S.cAttempts||0) < SCAFFOLD_THRESHOLD){
    nav.appendChild(el('button',{className:'btn btn-primary btn-block',onclick:()=>{ S.cAns=[]; S.cBank=buildBankWithDistractors(cur.words, S.mId, S.uId); S.cFb=null; S.cLocked=false; render(); }},'Try Again →'));
    nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>advClutter(d)},'Skip →'));
  }
  w.appendChild(nav); return w;
}
function advClutter(d){
  S.cFb=null; S.cLocked=false; S.cAttempts=0;
  if(S.cIdx<d.sentences.length-1){ S.cIdx++; S.cAns=[]; S.cBank=buildBankWithDistractors(d.sentences[S.cIdx].words, S.mId, S.uId); render(); }
  else { const pct=Math.round(S.cScore/d.sentences.length*100); if(pct>=d.passing){ finishBlock(); } else { S.cIdx=0; S.cScore=0; S.cWrong=0; S.cAns=[]; S.cBank=buildBankWithDistractors(d.sentences[0].words, S.mId, S.uId); render(); } }
}

// ════════════════════════════════════════════════════════
// BLOCK 5: CLOZE (Listening Dictation — LINC method)
// ════════════════════════════════════════════════════════
function getClozeData(blk){
  // Memoize — without this, blanks AND choices would re-randomize on every render
  if(blk._clzData) return blk._clzData;

  const norm = s => s.replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'');

  let sentencesSrc;
  if(blk.data?.sentences){
    sentencesSrc = blk.data.sentences;
  } else {
    const unit = getUnit(S.mId, S.uId);
    const dialogueBlk = unit.blocks.find(b=>b.type==='dialogue');
    if(!dialogueBlk?.data?.lines){ blk._clzData = { sentences:[], passing:60 }; return blk._clzData; }
    sentencesSrc = dialogueBlk.data.lines.filter(l=>l.ar && l.ar.split(/\s+/).length >= 3).slice(0, 6);
  }

  // Pool of all unique words across all source sentences — used for distractor choices
  const allWords = [...new Set(
    sentencesSrc.flatMap(s=>(s.ar||'').split(/\s+/).filter(w=>w.length>0))
  )];

  const sentences = sentencesSrc.map(ln=>{
    const words = ln.ar.split(/\s+/);
    // Difficulty curve: more blanks as modules get harder
    // Mod 1: 1 blank · Mod 2: 2 · Mod 3-4: 3 · Mod 5-6: 4 · Mod 7-8: 5 · Mod 9-10: 7 · Mod 11+: all
    const cap = words.length - 1; // first word always shown as anchor
    let maxBlanks;
    if(S.mId === 1) maxBlanks = 1;
    else if(S.mId === 2) maxBlanks = 2;
    else if(S.mId <= 4) maxBlanks = 3;
    else if(S.mId <= 6) maxBlanks = 4;
    else if(S.mId <= 8) maxBlanks = 5;
    else if(S.mId <= 10) maxBlanks = 7;
    else maxBlanks = cap; // top tier: full dictation, all words missing
    const blankCount = Math.max(1, Math.min(maxBlanks, cap));
    const blankIdx = [];
    while(blankIdx.length < blankCount && blankIdx.length < words.length-1){
      const pick = 1 + Math.floor(Math.random()*(words.length-1));
      if(!blankIdx.includes(pick)) blankIdx.push(pick);
    }
    blankIdx.sort((a,b)=>a-b);

    // For each blank, build a 4-option pool: correct + 3 distractors, shuffled
    const choicesPerBlank = blankIdx.map(bIdx=>{
      const correct = words[bIdx];
      const correctNorm = norm(correct);
      const pool = allWords.filter(w => norm(w) !== correctNorm);
      const picks = [];
      while(picks.length < 3 && pool.length > 0){
        const i = Math.floor(Math.random()*pool.length);
        picks.push(pool.splice(i,1)[0]);
      }
      return [...picks, correct].sort(()=>Math.random()-0.5);
    });

    return { ar: ln.ar, en: ln.en, words, blankIndices: blankIdx, choicesPerBlank, speaker: ln.spk };
  });

  blk._clzData = { sentences, passing: blk.data?.passing || 60 };
  return blk._clzData;
}

function mkCloze(blk){
  const d = getClozeData(blk);
  if(d.sentences.length === 0){
    const w = div('stage');
    w.appendChild(el('p',{className:'page-sub'},'No content available for this exercise.'));
    return w;
  }
  if(typeof S.clzIdx === 'undefined'){ S.clzIdx=0; S.clzAns=[]; S.clzFb=null; S.clzLocked=false; S.clzScore=0; S.clzWrong=0; }
  const total = d.sentences.length;
  const cur = d.sentences[S.clzIdx];
  const pct = Math.round(S.clzScore/total*100);
  const w = div('stage');

  // ── Back button (top) — returns to the unit's blocks list ──
  const topNav = div('');
  topNav.style.cssText = 'display:flex;justify-content:flex-start;margin-bottom:4px;';
  topNav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{
    S.clzIdx=0; S.clzAns=[]; S.clzFb=null; S.clzLocked=false;
    S.view='blocks'; render();
  }},'← Back'));
  w.appendChild(topNav);

  const ph=div('phase-label'); ph.appendChild(div('phase-dot'));
  ph.appendChild(document.createTextNode(' Listening Dictation · '+(S.clzIdx+1)+'/'+total));
  w.appendChild(ph);
  w.appendChild(el('h2',{className:'page-title'},'Fill in What You Hear'));
  w.appendChild(el('p',{className:'page-sub'},'Tap the audio button to listen, then tap the missing words below.'));

  const sr = div('score-row');
  [{v:S.clzScore,l:'Correct',c:'var(--green)'},{v:S.clzWrong,l:'Misses',c:'var(--red)'},{v:pct,l:'Score%',c:'var(--gold)'}].forEach(s=>{
    const si=div('sc-item');
    si.appendChild(el('div',{className:'sc-val',style:{color:s.c}},String(s.v)));
    si.appendChild(el('div',{className:'sc-lbl'},s.l));
    sr.appendChild(si);
  });
  w.appendChild(sr);

  const audioWrap = div('');
  audioWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:8px;margin:12px 0 18px;';
  const audioBtn = el('button',{
    style:{
      width:'70px',height:'70px',borderRadius:'50%',
      background:'linear-gradient(135deg,#f2be62,#d4a34a)',
      border:'none',cursor:'pointer',
      display:'flex',alignItems:'center',justifyContent:'center',
      boxShadow:'0 4px 20px rgba(212,163,74,.4)',
      transition:'transform .15s ease'
    },
    onclick:()=>speak(cur.ar)
  });
  audioBtn.appendChild(el('span',{style:{fontFamily:"'Material Symbols Outlined'",fontSize:'34px',color:'#1a1000',fontVariationSettings:"'FILL' 1"}},'volume_up'));
  audioWrap.appendChild(audioBtn);
  audioWrap.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',letterSpacing:'.14em',textTransform:'uppercase',color:'var(--gold)'}}, 'Tap to Listen'));
  w.appendChild(audioWrap);

  if(cur.speaker){
    w.appendChild(el('div',{style:{fontSize:'12px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--dim)',textAlign:'center',marginBottom:'6px'}}, cur.speaker+' says…'));
  }

  // ── Sentence box: blank slots show chosen word (or "___" placeholder) ──
  const sentenceBox = div('');
  sentenceBox.style.cssText = `
    background:#0a1024;
    border:1.5px solid ${S.clzFb==='correct'?'var(--green)':S.clzFb==='wrong'?'var(--red)':'rgba(212,163,74,.3)'};
    border-radius:16px;padding:18px 16px;
    direction:rtl;text-align:right;line-height:2.2;
    font-family:'Amiri',serif;font-size:24px;color:var(--text);
  `;
  cur.words.forEach((word, i)=>{
    if(cur.blankIndices.includes(i)){
      const idx = cur.blankIndices.indexOf(i);
      const chosen = S.clzAns[idx];
      let bg, color, border;
      if(S.clzLocked){
        const isRight = chosen === word;
        bg = isRight ? 'rgba(127,168,134,.18)' : 'rgba(224,112,112,.15)';
        color = isRight ? 'var(--green)' : 'var(--red)';
        border = isRight ? 'var(--green)' : 'var(--red)';
      } else {
        bg = chosen ? 'rgba(212,163,74,.18)' : 'rgba(212,163,74,.05)';
        color = chosen ? 'var(--gold)' : 'rgba(212,163,74,.5)';
        border = 'rgba(212,163,74,.4)';
      }
      const span = el('span',{style:{
        display:'inline-block',padding:'2px 14px',margin:'0 4px',
        minWidth:'70px',textAlign:'center',
        borderRadius:'8px',background:bg,color:color,
        border:'1px solid '+border,
        fontFamily:"'Amiri',serif"
      }}, chosen || '___');
      sentenceBox.appendChild(span);
    } else {
      sentenceBox.appendChild(document.createTextNode(' '+word+' '));
    }
  });
  w.appendChild(sentenceBox);

  // ── Word choice rows (one per blank) — only shown while unlocked ──
  if(!S.clzLocked){
    cur.blankIndices.forEach((wIdx, blankIdx)=>{
      const choiceWrap = div('');
      choiceWrap.style.cssText = 'margin-top:14px;';

      if(cur.blankIndices.length > 1){
        choiceWrap.appendChild(el('div',{
          style:{fontSize:'12px',fontWeight:'700',letterSpacing:'.1em',textTransform:'uppercase',color:'var(--dim)',textAlign:'center',marginBottom:'6px'}
        }, 'For blank '+(blankIdx+1)));
      }

      const row = div('');
      row.style.cssText = 'display:flex;flex-wrap:wrap;gap:8px;justify-content:center;';
      cur.choicesPerBlank[blankIdx].forEach(choice=>{
        const isSelected = S.clzAns[blankIdx] === choice;
        const btn = el('button',{
          style:{
            padding:'10px 16px',borderRadius:'12px',
            border:'1.5px solid '+(isSelected?'var(--gold)':'rgba(212,163,74,.25)'),
            background:isSelected?'rgba(212,163,74,.18)':'rgba(10,14,24,.6)',
            color:isSelected?'var(--gold)':'var(--text)',
            fontFamily:"'Amiri',serif",fontSize:'22px',
            direction:'rtl',cursor:'pointer',
            transition:'all .15s'
          },
          onclick:()=>{ S.clzAns[blankIdx] = choice; render(); }
        }, choice);
        row.appendChild(btn);
      });
      choiceWrap.appendChild(row);
      w.appendChild(choiceWrap);
    });
  }

  if(cur.en){
    w.appendChild(el('div',{style:{
      fontSize:'12px',color:'var(--dim)',fontStyle:'italic',
      textAlign:'center',marginTop:'10px'
    }}, '"'+cur.en+'"'));
  }

  if(S.clzFb){
    const fb = div('cf '+(S.clzFb==='correct'?'cf-ok':'cf-no'));
    fb.style.marginTop = '14px';
    if(S.clzFb==='correct'){
      fb.innerHTML = '✅ <strong>Correct!</strong>';
    } else {
      fb.innerHTML = '❌ <strong>Try listening again.</strong>';
    }
    w.appendChild(fb);
  }

  const nav = div('action-row');
  nav.style.marginTop = '14px';
  // Failure scaffolding: after threshold wrong attempts on this item, offer a graceful exit
  if(S.clzFb === 'wrong' && (S.clzAttempts||0) >= SCAFFOLD_THRESHOLD){
    w.appendChild(mkScaffoldPanel(cur.ar || cur.words?.join(' '), ()=>advCloze(d)));
  }
  if(!S.clzLocked){
    nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{
      S.clzAns = cur.blankIndices.map(i=>cur.words[i]);
      S.clzLocked = true;
      S.clzFb = 'wrong';
      S.clzWrong++;
      S.clzAttempts = (S.clzAttempts||0) + 1;
      render();
    }}, 'Show Answer'));

    const allChosen = cur.blankIndices.every((_, ai) => S.clzAns[ai] !== undefined);
    nav.appendChild(el('button',{
      className:'btn btn-primary',
      style: allChosen ? {} : {opacity:'0.5',cursor:'not-allowed',pointerEvents:'none'},
      onclick:()=>{
        if(!allChosen) return;
        const norm = s=>s.replace(/[\u064B-\u065F\u0670\u06D6-\u06ED]/g,'');
        const allCorrect = cur.blankIndices.every((wIdx, ai)=>{
          return norm((S.clzAns[ai]||'').trim()) === norm(cur.words[wIdx].trim());
        });
        S.clzLocked = true;
        S.clzFb = allCorrect ? 'correct' : 'wrong';
        if(allCorrect){ S.clzScore++; if(window.Lisaany) Lisaany.celebrate({big:true}); }
        else { S.clzWrong++; S.clzAttempts = (S.clzAttempts||0) + 1; }
        render();
        if(allCorrect) setTimeout(()=>advCloze(d), 1100);
      }
    }, 'Check ✓'));
  } else if(S.clzFb === 'wrong' && (S.clzAttempts||0) < SCAFFOLD_THRESHOLD){
    nav.appendChild(el('button',{className:'btn btn-primary btn-block',onclick:()=>advCloze(d)}, 'Next →'));
  }
  w.appendChild(nav);

  return w;
}

function advCloze(d){
  S.clzFb = null; S.clzLocked = false; S.clzAns = []; S.clzAttempts = 0;
  if(S.clzIdx < d.sentences.length-1){
    S.clzIdx++;
    render();
  } else {
    const pct = Math.round(S.clzScore/d.sentences.length*100);
    if(pct >= (d.passing||60)){
      S.clzIdx=0; S.clzScore=0; S.clzWrong=0;
      finishBlock();
    } else {
      S.clzIdx=0; S.clzScore=0; S.clzWrong=0;
      render();
    }
  }
}

// PEDAGOGY: END-OF-UNIT REVIEW
// ══════════════════════════════════════════════════════
// 5 vocabulary items, tap-to-reveal flashcards, no scoring.
// Surfaces between completing the last block of a unit and advancing to the next unit.
// Pulls items from the unit's vocab block. If no vocab block exists, gracefully skips.
function _exitReview(){
  S.reviewItems=null; S.reviewIdx=0; S.reviewFlipped=false;
  if(S.reviewCustom){ S.reviewCustom=false; S.view='reviewBuilder'; render(); return; }
  const _u=getUnit(S.mId,S.uId);
  const _allDone=_u && _u.blocks.every(b=>getBlock_(S.mId,S.uId,b.id)==='done');
  S.view=_allDone?'units':'blocks'; render();
}

// Assemble an ephemeral review pool from a chosen lesson + drill types + focus.
// Reads only existing curriculum + mastery data; writes nothing.
function buildReviewPool(mId, uId, drill, focus){
  const mid = (typeof mId==='string' && /^\d+$/.test(mId)) ? parseInt(mId,10) : mId;
  const unit = getUnit(mid, uId);
  const pool=[]; const seen=new Set();
  if(!unit) return pool;
  const add=(ar,en)=>{ ar=(ar||'').trim(); if(ar && !seen.has(ar)){ seen.add(ar); pool.push({ar, en:en||''}); } };
  if(drill.includes('vocab')){
    unit.blocks.filter(b=>b.type==='vocab').forEach(b=>{
      (b.data&&b.data.words||[]).forEach(entry=>{
        const ap=(entry.ar||'').split(' / ').map(s=>s.trim()).filter(Boolean);
        const ep=(entry.en||'').split(' / ').map(s=>s.trim()).filter(Boolean);
        if(ap.length>1 && ap.length===ep.length){ ap.forEach((a,i)=>add(a,ep[i])); }
        else add(entry.ar, entry.en);
      });
    });
  }
  if(drill.includes('dialogue')){
    unit.blocks.filter(b=>b.type==='dialogue').forEach(b=>{
      (b.data&&b.data.keywords||[]).forEach(k=>add(k.ar,k.en));
    });
  }
  if(drill.includes('grammar')){
    unit.blocks.filter(b=>b.type==='grammar').forEach(b=>{
      (b.data&&b.data.examples||[]).forEach(ex=>add(ex.ar,ex.en));
    });
  }
  let out=pool;
  if(focus==='weak')        out=pool.filter(p=>getWordFreq(p.ar)<5);
  else if(focus==='unseen') out=pool.filter(p=>getWordFreq(p.ar)<2);
  return shuffle(out).slice(0,20);
}

function mkReview(){
  const w = div('stage');
  const unit = getUnit(S.mId, S.uId);

  // Initialize review item pool on first entry
  if(!S.reviewItems){
    let pool = [];
    const seen = new Set();  // dedupe by Arabic text
    if(unit){
      // Pull from vocab blocks
      const vocabBlk = unit.blocks.find(b => b.type === 'vocab');
      if(vocabBlk){
        (vocabBlk.data?.words || []).forEach(entry => {
          const arParts = (entry.ar||'').split(' / ').map(s=>s.trim()).filter(Boolean);
          const enParts = (entry.en||'').split(' / ').map(s=>s.trim()).filter(Boolean);
          if(arParts.length > 1 && arParts.length === enParts.length){
            arParts.forEach((ar, i) => {
              if(!seen.has(ar)){ seen.add(ar); pool.push({ar, en: enParts[i]}); }
            });
          } else if(entry.ar && entry.en){
            if(!seen.has(entry.ar)){ seen.add(entry.ar); pool.push({ar: entry.ar, en: entry.en}); }
          }
        });
      }
      // Also pull from dialogue keywords (so connector words like وَ، فَـ، فِي appear in review)
      unit.blocks.filter(b => b.type === 'dialogue').forEach(dlgBlk => {
        (dlgBlk.data?.keywords || []).forEach(entry => {
          if(entry.ar && entry.en && !seen.has(entry.ar)){
            seen.add(entry.ar);
            pool.push({ar: entry.ar, en: entry.en});
          }
        });
      });
    }
    // Bigger pool now — show up to 8 review items instead of 5
    S.reviewItems = shuffle(pool).slice(0, Math.min(8, pool.length));
    S.reviewIdx = 0;
    S.reviewFlipped = false;
  }

  // Graceful exit if no review items available
  if(!S.reviewItems || S.reviewItems.length === 0){
    setTimeout(_exitReview, 0);
    return w;
  }

  const items = S.reviewItems;
  const total = items.length;
  const cur = items[S.reviewIdx];

  // Header
  const ph = div('phase-label');
  ph.appendChild(div('phase-dot'));
  ph.appendChild(document.createTextNode((S.reviewCustom ? ' Custom Review · ' : ' Quick Review · ') + (S.reviewIdx+1) + ' / ' + total));
  w.appendChild(ph);
  w.appendChild(el('h2',{className:'page-title'}, S.reviewCustom ? 'Your review session' : 'Before you move on...'));
  w.appendChild(el('p',{className:'page-sub'},'Tap each card to check your recall. No score, no penalty — just reinforcement.'));

  // Progress bar
  const pb = div('');
  pb.style.cssText = 'height:4px;background:rgba(212,163,74,.12);border-radius:2px;margin:14px 0 24px;overflow:hidden;';
  const pf = div('');
  pf.style.cssText = `height:100%;background:var(--gold);width:${Math.round(((S.reviewIdx + (S.reviewFlipped ? 0.5 : 0))/total)*100)}%;transition:width .3s;`;
  pb.appendChild(pf);
  w.appendChild(pb);

  // Flashcard
  const card = div('');
  card.style.cssText = `
    background:linear-gradient(180deg,rgba(212,163,74,.06),rgba(212,163,74,.02));
    border:1.5px solid rgba(212,163,74,.3);border-radius:18px;
    padding:40px 24px;text-align:center;cursor:pointer;
    min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    transition:all .25s;
  `;
  card.addEventListener('click', () => {
    if(!S.reviewFlipped){
      S.reviewFlipped = true;
      try { speak(cur.ar); } catch(e){}
      render();
    } else {
      if(S.reviewIdx < total - 1){
        S.reviewIdx++;
        S.reviewFlipped = false;
        render();
      } else {
        // Review complete — clear state and route somewhere useful
        _exitReview();
      }
    }
  });

  // Arabic (always shown, large)
  card.appendChild(el('div',{style:{
    fontFamily:"'Amiri',serif",fontSize:'36px',color:'var(--gold)',
    direction:'rtl',lineHeight:'1.4'
  }}, cur.ar));

  if(S.reviewFlipped){
    card.appendChild(el('div',{style:{
      fontSize:'18px',color:'var(--text)',fontStyle:'italic',lineHeight:'1.4'
    }}, cur.en || '—'));
    card.appendChild(el('div',{style:{
      fontSize:'12px',color:'var(--dim)',letterSpacing:'.12em',textTransform:'uppercase',marginTop:'10px',fontWeight:'700'
    }}, S.reviewIdx < total - 1 ? 'Tap for next →' : 'Tap to continue →'));
  } else {
    card.appendChild(el('div',{style:{
      fontSize:'12px',color:'var(--dim)',letterSpacing:'.12em',textTransform:'uppercase',marginTop:'10px',fontWeight:'700'
    }}, '✦ Tap to reveal meaning'));
  }

  w.appendChild(card);

  // Skip link (small, ghost) for users who genuinely don't want it
  const skip = el('button',{
    style:{
      width:'100%',marginTop:'18px',padding:'10px',border:'none',background:'transparent',
      color:'var(--dim)',fontSize:'12px',letterSpacing:'.06em',cursor:'pointer',textDecoration:'underline'
    },
    onclick: ()=>{
      _exitReview();
    }
  },'Skip review');
  w.appendChild(skip);

  return w;
}

function finishBlock(){ setBlock(S.mId,S.uId,S.bId,'done'); XP+=15; STREAK+=1; save(); S.view='complete'; render(); }

// COMPLETE
// ══════════════════════════════════════════════════════
function mkComplete(){
  const blk = getBlk(S.mId, S.uId, S.bId);
  const unit = getUnit(S.mId, S.uId);
  const mod = getMod(S.mId);

  // Unit progress
  const blocksDone = unit.blocks.filter(b => getBlock_(S.mId, S.uId, b.id) === 'done').length;
  const blocksTotal = unit.blocks.length;
  const allDone = blocksDone === blocksTotal;

  const stage = div('stage');
  const wrap = div('complete-wrap');

  // Medal
  const medal = div('complete-medal');
  medal.appendChild(ms(allDone ? 'workspace_premium' : 'stars'));
  wrap.appendChild(medal);

  // Eyebrow
  wrap.appendChild(el('div', {className:'complete-eyebrow'},
    allDone ? ('Unit ' + mod.id + '.' + unit.id + ' Complete') : ('Block ' + S.bId + ' Complete')));

  // Title
  wrap.appendChild(el('h1', {className:'complete-title'},
    allDone ? unit.title : blk.title));

  // Sub
  wrap.appendChild(el('p', {className:'complete-sub'},
    allDone
      ? 'Excellent work! You\'ve mastered all the blocks in this unit. Time for a quick review.'
      : 'Great work on this block. Keep the momentum going.'));

  // Stats
  const stats = div('complete-stats');
  [
    {num: blocksDone + '/' + blocksTotal, label: 'Blocks Done'},
    {num: '+15', label: 'XP Earned'},
    {num: STREAK + 'd', label: 'Streak'}
  ].forEach(s => {
    const card = div('complete-stat');
    card.appendChild(el('div', {className:'complete-stat-num'}, s.num));
    card.appendChild(el('div', {className:'complete-stat-label'}, s.label));
    stats.appendChild(card);
  });
  wrap.appendChild(stats);

  // Nav
  const nav = div('action-row');
  nav.appendChild(el('button', {className:'btn btn-ghost', onclick:() => { S.view='blocks'; render(); }}, '← All Blocks'));
  nav.appendChild(el('button', {className:'btn btn-primary', onclick:() => {
    S.reviewItems = null; S.reviewIdx = 0; S.reviewFlipped = false;
    S.view = 'review'; render();
  }}, 'Quick Review →'));
  wrap.appendChild(nav);

  stage.appendChild(wrap);
  return stage;
}

</style>

<div id="lis-celebrate"></div>

<script>
// ════════ LISAANY REWARDS ENGINE ════════
(function(){
  const KEY = 'lisaany_streak';
  const todayStr = () => new Date().toISOString().slice(0,10);
  const dayDiff = (a,b) => Math.round((new Date(b) - new Date(a)) / 86400000);

  function load(){
    try { return JSON.parse(localStorage.getItem(KEY)) || {count:0,last:null,best:0}; }
    catch { return {count:0,last:null,best:0}; }
  }
  function save(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); }catch{} }

  // Soft pleasant chime via WebAudio (no file needed)
  let audioCtx = null;
  function chime(){
    try{
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const now = audioCtx.currentTime;
      [784, 1047].forEach((freq, i) => {       // G5 then C6 — bright, happy
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = now + i*0.09;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.14, t+0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(t); osc.stop(t+0.45);
      });
    }catch(e){}
  }

  function particles(){
    const layer = document.getElementById('lis-celebrate');
    if(!layer) return;
    const colors = ['#f5d488','#d4a34a','#f2be62','#7fc99c','#e8eef9'];
    const cx = window.innerWidth/2, cy = window.innerHeight*0.42;
    for(let i=0;i<26;i++){
      const p = document.createElement('div');
      p.className = 'lis-particle';
      p.style.background = colors[i % colors.length];
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      layer.appendChild(p);
      const angle = (Math.PI*2) * (i/26) + (Math.random()-0.5);
      const dist = 90 + Math.random()*150;
      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist - 40;  // slight upward bias
      const rot = (Math.random()-0.5)*720;
      p.animate([
        { transform:'translate(0,0) rotate(0deg)', opacity:1 },
        { transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`, opacity:0 }
      ], { duration: 850 + Math.random()*350, easing:'cubic-bezier(.15,.7,.4,1)' })
       .onfinish = () => p.remove();
    }
  }

  function checkmark(){
    const old = document.querySelector('.lis-checkmark');
    if(old) old.remove();
    const cm = document.createElement('div');
    cm.className = 'lis-checkmark';
    cm.innerHTML = '<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
    document.body.appendChild(cm);
    requestAnimationFrame(()=> cm.classList.add('show'));
    setTimeout(()=> cm.remove(), 950);
  }

  function renderBadge(){
    const d = load();
    const countEl = document.getElementById('lis-streak-count');
    const btn = document.getElementById('lis-streak-btn');
    if(!countEl || !btn) return;
    // Reset to 0 visually if streak is stale (missed >1 day)
    let display = d.count;
    if(d.last){
      const gap = dayDiff(d.last, todayStr());
      if(gap > 1) display = 0;
    }
    countEl.textContent = display;
    btn.classList.toggle('active', display > 0);
  }

  function milestoneToast(count){
    const milestones = {3:'Three days strong!',7:'A full week! 🌟',14:'Two weeks!',30:'A whole month! 👑',50:'Fifty days!',100:'Century streak! 🏆'};
    const msg = milestones[count];
    if(!msg) return;
    const t = document.createElement('div');
    t.className = 'lis-streak-toast';
    t.innerHTML = `<span class="flame">🔥</span><div class="txt"><b>${count}-day streak!</b><span>${msg}</span></div>`;
    document.body.appendChild(t);
    requestAnimationFrame(()=> t.classList.add('show'));
    setTimeout(()=> t.remove(), 2900);
  }

  // Bump the streak when the user does an activity today
  function bumpStreak(){
    const d = load();
    const today = todayStr();
    if(d.last === today) return d;          // already counted today
    const gap = d.last ? dayDiff(d.last, today) : 999;
    if(gap === 1) d.count += 1;             // consecutive day
    else d.count = 1;                       // reset / first day
    d.last = today;
    d.best = Math.max(d.best||0, d.count);
    save(d);
    renderBadge();
    const badge = document.getElementById('lis-streak-btn');
    if(badge){ badge.classList.remove('bump'); void badge.offsetWidth; badge.classList.add('bump'); }
    milestoneToast(d.count);
    return d;
  }

  // The big one — call on a correct answer
  let lastCelebrate = 0;
  function celebrate(opts){
    opts = opts || {};
    const now = Date.now();
    if(now - lastCelebrate < 400) return;   // debounce rapid fire
    lastCelebrate = now;
    if(!opts.quiet) chime();
    particles();
    if(opts.big) checkmark();
    bumpStreak();
  }

  // Public API
  window.Lisaany = window.Lisaany || {};
  window.Lisaany.celebrate = celebrate;
  window.Lisaany.bumpStreak = bumpStreak;
  window.Lisaany.getStreak = load;

  // ════════ HERO WORD MODAL ════════
  let heroOverlay = null;
  function buildHero(){
    heroOverlay = document.createElement('div');
    heroOverlay.className = 'lis-hero-overlay';
    heroOverlay.innerHTML = `
      <div class="lis-hero-card">
        <button class="lis-hero-close" aria-label="Close">&times;</button>
        <div class="lis-hero-emoji" id="lis-hero-emoji"></div>
        <div class="lis-hero-ar" id="lis-hero-ar"></div>
        <div class="lis-hero-roman" id="lis-hero-roman"></div>
        <div class="lis-hero-en" id="lis-hero-en"></div>
        <div class="lis-hero-divider"></div>
        <button class="lis-hero-play" id="lis-hero-play" aria-label="Play audio">
          <svg class="lis-hero-play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <span class="lis-hero-wave"><span></span><span></span><span></span><span></span><span></span></span>
        </button>
        <div class="lis-hero-hint">Tap the circle to hear it · tap outside to close</div>
      </div>`;
    document.body.appendChild(heroOverlay);
    // Close handlers
    heroOverlay.addEventListener('click', (e)=>{
      if(e.target === heroOverlay || e.target.closest('.lis-hero-close')) closeHero();
    });
  }

  function closeHero(){
    if(heroOverlay) heroOverlay.classList.remove('show');
  }

  async function playHero(ar){
    const btn = document.getElementById('lis-hero-play');
    if(!btn) return;
    btn.classList.add('playing');
    try{
      if(typeof window.speak === 'function') await window.speak(ar);
      else await new Promise(r=>setTimeout(r,800));
    }catch(e){}
    btn.classList.remove('playing');
  }

  // showHero({ar, roman, en})
  window.Lisaany.showHero = function(data){
    if(!data || !data.ar) return;
    if(!heroOverlay) buildHero();
    document.getElementById('lis-hero-ar').textContent = data.ar;
    const emojiEl = document.getElementById('lis-hero-emoji');
    const emo = (typeof window.emojiFor === 'function') ? window.emojiFor(data.en) : '';
    if(emojiEl){ emojiEl.textContent = emo || ''; emojiEl.style.display = emo ? '' : 'none'; }
    const romanEl = document.getElementById('lis-hero-roman');
    const enEl = document.getElementById('lis-hero-en');
    romanEl.textContent = data.roman || '';
    romanEl.style.display = data.roman ? '' : 'none';
    enEl.textContent = data.en || '';
    enEl.style.display = data.en ? '' : 'none';
    const playBtn = document.getElementById('lis-hero-play');
    playBtn.onclick = ()=> playHero(data.ar);
    requestAnimationFrame(()=> heroOverlay.classList.add('show'));
    // auto-play once on open
    setTimeout(()=> playHero(data.ar), 350);
  };

  // ESC closes hero
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeHero(); });

  // ════════ #4 AUDIO BUTTON PULSE ════════
  // Track the last-clicked audio button (capture phase, before onclick fires)
  let lastAudioBtn = null, lastAudioBtnTime = 0;
  document.addEventListener('click', (e)=>{
    const btn = e.target.closest('button, .kw-word, .token, [role="button"]');
    if(!btn) return;
    // Heuristic: is this an audio trigger? (contains volume_up icon)
    const hasAudioIcon = btn.textContent && btn.textContent.includes('volume_up');
    if(hasAudioIcon || btn.classList.contains('kw-word') || btn.classList.contains('token')){
      lastAudioBtn = btn;
      lastAudioBtnTime = Date.now();
    }
  }, true);
  // speak() calls this at start; returns a stop() function
  window.Lisaany._audioAnimStart = function(){
    let el = null;
    if(lastAudioBtn && (Date.now() - lastAudioBtnTime) < 350){
      el = lastAudioBtn;
      el.classList.add('lis-audio-playing');
    }
    return function stop(){ if(el) el.classList.remove('lis-audio-playing'); };
  };

  // ════════ #6 FIRST-60-SECONDS WELCOME ════════
  function showWelcome(){
    const WKEY = 'lisaany_welcomed';
    try { if(localStorage.getItem(WKEY)) return; } catch(e){ return; }
    const ov = document.createElement('div');
    ov.className = 'lis-welcome-overlay';
    ov.innerHTML = `
      <div class="lis-welcome-card">
        <div class="lis-welcome-eyebrow">Welcome to Lisaany</div>
        <div class="lis-welcome-ar" id="lis-welcome-ar">السَّلامُ عَلَيْكُم</div>
        <div class="lis-welcome-roman">as-salāmu ʿalaykum</div>
        <div class="lis-welcome-en">"Peace be upon you" — the timeless Arabic greeting.</div>
        <button class="lis-welcome-play" id="lis-welcome-play">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Tap to hear it
        </button>
        <button class="lis-welcome-begin" id="lis-welcome-begin">Begin Learning →</button>
      </div>`;
    document.body.appendChild(ov);
    requestAnimationFrame(()=> ov.classList.add('show'));
    const playW = async ()=>{
      const b = document.getElementById('lis-welcome-play');
      if(b) b.classList.add('playing');
      try{ if(typeof window.speak==='function') await window.speak('السَّلامُ عَلَيْكُم'); }catch(e){}
      if(b) b.classList.remove('playing');
    };
    document.getElementById('lis-welcome-play').onclick = playW;
    document.getElementById('lis-welcome-begin').onclick = ()=>{
      try{ localStorage.setItem(WKEY, '1'); }catch(e){}
      ov.classList.remove('show');
      setTimeout(()=> ov.remove(), 400);
    };
    // gentle auto-play after the card settles
    setTimeout(playW, 700);
  }

  // ════════ #7 WARM EMPTY STATE HELPER ════════
  window.Lisaany.emptyState = function(opts){
    opts = opts || {};
    const wrap = document.createElement('div');
    wrap.className = 'lis-empty';
    wrap.innerHTML = `
      <div class="lis-empty-art">${opts.icon || '🌙'}</div>
      <div class="lis-empty-title">${opts.title || 'Nothing here yet'}</div>
      <div class="lis-empty-text">${opts.text || ''}</div>`;
    return wrap;
  };

  // Init on load
  if(document.readyState !== 'loading'){ renderBadge(); }
  else document.addEventListener('DOMContentLoaded', renderBadge);
  // Welcome shows after the app paints
  window.addEventListener('load', ()=> setTimeout(showWelcome, 600));

  // Streak badge click → small info
  document.addEventListener('click', (e)=>{
    if(e.target.closest('#lis-streak-btn')){
      const d = load();
      const display = (d.last && dayDiff(d.last, todayStr())>1) ? 0 : d.count;
      alert(display>0
        ? `🔥 ${display}-day streak!\nBest ever: ${d.best||display} days.\n\nKeep learning daily to grow your flame.`
        : `Start your streak today! 🔥\nComplete a lesson to begin.\n\nBest ever: ${d.best||0} days.`);
    }
  });
})();
</script>
</body>
</html>
