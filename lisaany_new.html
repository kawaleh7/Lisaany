// Rule practice (L4-L8)
function mkRulePractice(){
  const qs=RULE_PRACTICE[S.lesson]||[];
  const total=qs.length;
  const q=qs[S.pracIdx]||qs[0];

  const wrap=pracHeader('Rule Practice',total,S.pracIdx,S.pracScore);

  const tip=div('prac-tip');
  tip.appendChild(el('span',{className:'prac-tip-icon'},'💡'));
  const tp=el('p'); tp.innerHTML='<strong>Tip:</strong> Think about the rule from the intro slides before choosing.'; tip.appendChild(tp);
  wrap.appendChild(tip);

  if(q.type==='word_pick4'){
    // ── 4-box word pick practice ──
    wrap.appendChild(el('div',{className:'rule-q-label'},q.q||q.question||'Which word has Tanween?'));
    const allP4=[...(q.distractors||[])];
    allP4.splice(q.ans,0,q.correct);
    const pIdx4=q.ans;
    const pg4=div('options-grid');
    allP4.forEach((c,i)=>{
      const isCorrect=i===pIdx4,isChosen=i===S.pracChosen;
      let cls='opt';
      if(S.pracLocked){if(isCorrect)cls+=' correct';else if(isChosen&&!isCorrect)cls+=' wrong';}
      if(S.pracLocked)cls+=' locked';
      const o=div(cls);
      o.appendChild(el('div',{className:'opt-ar'},c.ar));
      if(!S.pracLocked){o.addEventListener('click',()=>{
        S.pracChosen=i;S.pracLocked=true;
        const right=i===pIdx4;if(right)S.pracScore++;
        S.feedback=right?'ok':'no';render();
        setTimeout(()=>{S.feedback=null;advancePractice();},right?1100:1400);
      });}
      pg4.appendChild(o);
    });
    wrap.appendChild(pg4);
  } else if(q.type==='word_pick'){
    // ── Word pick practice — 2 Arabic word boxes ──
    wrap.appendChild(el('div',{className:'rule-q-label'},q.q||'Which word has a Sukun?'));
    const wpGrid=div('options-grid');
    const wpChoices = q.ans===0 ? [q.correct,q.distractor] : [q.distractor,q.correct];
    const wpAns = q.ans;
    wpChoices.forEach((c,i)=>{
      const isCorrect=i===wpAns;
      const isChosen=i===S.pracChosen;
      let cls='opt';
      if(S.pracLocked){ if(isCorrect) cls+=' correct'; else if(isChosen&&!isCorrect) cls+=' wrong'; }
      if(S.pracLocked) cls+=' locked';
      const o=div(cls);
      o.appendChild(el('div',{className:'opt-ar'},c.ar));
      if(!S.pracLocked){ o.addEventListener('click',()=>{
        S.pracChosen=i; S.pracLocked=true;
        const right=i===wpAns; if(right)S.pracScore++;
        S.feedback=right?'ok':'no'; render();
        setTimeout(()=>{ S.feedback=null; advancePractice(); },right?1100:1400);
      });}
      wpGrid.appendChild(o);
    });
    wrap.appendChild(wpGrid);
  } else {
    if(q.word) wrap.appendChild(el('div',{className:'rule-q-word'},q.word));
    if(q.focus) wrap.appendChild(el('div',{className:'rule-q-focus'},'Focus: '+q.focus));
    wrap.appendChild(el('div',{className:'rule-q-label'},q.q));
    const rcs=div('rule-choices');
    (q.choices||[]).forEach((c,i)=>{
      const btn=div('rule-choice'+(S.pracLocked?(i===q.ans?' correct':i===S.pracChosen?' wrong':''):'')+(S.pracLocked?' locked':''));
      btn.textContent=(S.pracLocked&&i===q.ans?'✓ ':S.pracLocked&&i===S.pracChosen&&i!==q.ans?'✕ ':'')+c;
      if(!S.pracLocked){ btn.addEventListener('click',()=>{
        S.pracChosen=i; S.pracLocked=true;
        const right=i===q.ans; if(right)S.pracScore++;
        S.feedback=right?'ok':'no'; render();
        setTimeout(()=>{ S.feedback=null; advancePractice(); },right?1100:1400);
      });}
      rcs.appendChild(btn);
    });
    wrap.appendChild(rcs);
  }

  // ── PERSISTENT RULE CARD after every practice answer ──
  // Per-question rule preferred; falls back to lesson-level summary if missing.
  if (S.pracLocked) {
    const lessonFallback = {
      4: "<strong>Sukun (ْ)</strong> means no vowel — the letter is held briefly.",
      5: "<strong>Tanween</strong> marks the end of an indefinite noun — it adds the sound of 'an', 'in', or 'un'.",
      6: "<strong>Shaddah (ّ)</strong> doubles a letter. Hold it twice as long, then continue with the vowel.",
    }[S.lesson];
    const ruleText = q.rule || lessonFallback;
    if (ruleText) {
      const rbox = div('prac-rule');
      rbox.innerHTML = (S.pracChosen === q.ans ? '✅  ' : '❌  ') + ruleText;
      wrap.appendChild(rbox);
    }
  }

  const nav=div('action-row');
  nav.appendChild(el('button',{className:'btn btn-ghost',onclick:()=>{S.phase='lesson';render();}},'← Examples'));
  wrap.appendChild(nav);
  const stage=div('stage'); stage.appendChild(wrap); return stage;
}

function mkAssessment(){
  // Guard: if queue exhausted, go to complete
  if(S.assessIdx >= S.assessQ.length){
    COMPLETED.add(S.lesson); saveCompleted(); S.phase='complete'; render(); return div('');
  }
  const meta=getLessonMeta(S.lesson);
  const qIdx=S.assessQ[S.assessIdx];
  const q=S.assessQs[qIdx];
  if(!q){ COMPLETED.add(S.lesson); saveCompleted(); S.phase='complete'; render(); return div(''); }
  const total=S.assessQs.length;
  const pct=Math.round(S.assessRight/total*100);

  const stage=div('stage');
  const ph=div('phase-label'); ph.appendChild(div('phase-dot')); ph.appendChild(document.createTextNode('Part 3 of 3 · Assessment')); stage.appendChild(ph);

  // Progress
  const pr=div('assess-prog-row');
  pr.appendChild(el('span',{className:'assess-prog-label'},'Lesson '+S.lesson+' · '+meta.title.toUpperCase()));
  pr.appendChild(el('span',{className:'assess-prog-pct'},pct+'% Complete'));
  stage.appendChild(pr);
  const bar=div('assess-bar'); const fill=div('assess-fill'); fill.style.width=pct+'%'; bar.appendChild(fill); stage.appendChild(bar);

  if(q.type==='word_pick4'){
    // ── 4-box word pick (assessment) ──
    stage.appendChild(el('div',{className:'assess-question'},q.question||'Which word has Tanween?'));
    const allA4=[...(q.distractors||[])];
    allA4.splice(q.answer,0,q.correct);
    const cIdx4=q.answer;
    const ag4=div('');
    ag4.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;';
    allA4.forEach((c,i)=>{
      const isCor=i===cIdx4,isChos=i===S.assessChosen;
      let cls='opt';
      if(S.assessLocked){if(isCor)cls+=' correct';else if(isChos&&!isCor)cls+=' wrong';}
      if(S.assessLocked)cls+=' locked';
      const o=div(cls);
      o.style.cssText='display:flex;align-items:center;justify-content:center;padding:20px 10px;min-height:90px;cursor:pointer;';
      o.appendChild(el('div',{style:{fontFamily:"'Amiri',serif",fontSize:'40px',color:'var(--text)',direction:'rtl',lineHeight:'1.2'}},c.ar));
      if(!S.assessLocked){o.addEventListener('click',()=>{
        S.assessChosen=i;S.assessLocked=true;
        const right=i===cIdx4;if(right)S.assessRight++;else S.assessWrong++;
        S.feedback=right?'ok':'no';render();
        setTimeout(()=>{S.feedback=null;advanceAssessment(right);},right?1200:1400);
      });}
      ag4.appendChild(o);
    });
    stage.appendChild(ag4);
  } else if(q.type==='word_pick'){
    // ── Word pick: audio (harakat) or visual (sukun/rule) ──
    const hasAudio = q.correct && q.correct.name && S.lesson===2;
    if(hasAudio){
      const hero=div('assess-hero');
      const ab=el('button',{className:'assess-audio-btn',onclick:()=>{
        if(window._synth) window._synth.cancel();
        speak(q.correct.name);
      }},'volume_up');
      hero.appendChild(ab);
      hero.appendChild(el('div',{className:'assess-audio-label'},'Tap to Listen'));
      stage.appendChild(hero);
      if(!S.assessLocked&&!S.assessAutoPlayed){
        S.assessAutoPlayed=true;
        setTimeout(()=>speak(q.correct.name),350);
      }
    }
    stage.appendChild(el('div',{className:'assess-question'},q.question||'Which word has a Sukun?'));
    // 2-box grid
    const grid=div('');
    grid.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:4px;';
    (q.choices||[]).forEach((c,i)=>{
      const isCorrect = i===q.answer;
      const isChosen  = i===S.assessChosen;
      let cls = 'opt';
      if(S.assessLocked){
        if(isCorrect) cls+=' correct';
        else if(isChosen && !isCorrect) cls+=' wrong';
      }
      if(S.assessLocked) cls+=' locked';
      const o=div(cls);
      o.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:20px 12px;min-height:110px;';
      o.appendChild(el('div',{style:{fontFamily:"'Amiri',serif",fontSize:'42px',color:'var(--gold)',direction:'rtl',lineHeight:'1.2'}},c.ar));
      o.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'700',letterSpacing:'.08em',textTransform:'uppercase',color:'var(--dim)'}},c.name));
      if(!S.assessLocked){ o.addEventListener('click',()=>{
        S.assessChosen=i; S.assessLocked=true;
        const right=i===q.answer;
        if(right) speak(q.correct.name);
        S.feedback=right?'ok':'no'; render();
        setTimeout(()=>{ advanceAssessment(right); },right?1200:1400);
      });}
      grid.appendChild(o);
    });
    stage.appendChild(grid);
  } else if(q.type==='audio'){
    // Hero card — audio only, no letter shown
    const hero=div('assess-hero');
    const ab=el('button',{className:'assess-audio-btn',onclick:()=>playLetter(q.prompt)},'volume_up');
    hero.appendChild(ab);
    hero.appendChild(el('div',{className:'assess-audio-label'},'Tap to Listen'));
    stage.appendChild(hero);
    if(!S.assessLocked&&!S.assessAutoPlayed){ S.assessAutoPlayed=true; setTimeout(()=>playLetter(q.prompt),350); }
    stage.appendChild(el('div',{className:'assess-question'},'Which letter is this?'));
    const grid=div('options-grid');
    q.choices.forEach((c,i)=>{
      const o=div('opt'+(S.assessLocked?(i===q.answer?' correct':(i===S.assessChosen&&i!==q.answer)?' wrong':''):'')+(S.assessLocked?' locked':''));
      o.appendChild(el('div',{className:'opt-ar'},c.ar));
      if(!S.assessLocked){ o.addEventListener('click',()=>{
        S.assessChosen=i; S.assessLocked=true;
        const right=i===q.answer; if(right)playLetter(q.prompt);
        S.feedback=right?'ok':'no'; render();
        setTimeout(()=>{ advanceAssessment(right); },right?1200:1400);
      });}
      grid.appendChild(o);
    });
    stage.appendChild(grid);
    const hint=LETTER_HINTS[q.prompt.ar];
    if(hint){ const hc=div('hint-card'); hc.appendChild(el('span',{style:{fontSize:'18px'}},'💡')); hc.appendChild(el('p',{style:{fontSize:'12px',color:'var(--dim)',lineHeight:'1.6'}},hint)); stage.appendChild(hc); }
  } else {
    if(q.word) stage.appendChild(el('div',{className:'rule-q-word'},q.word));
    if(q.focus) stage.appendChild(el('div',{className:'rule-q-focus'},'Focus: '+q.focus));
    stage.appendChild(el('div',{className:'rule-q-label'},q.question||q.q||''));
    const rcs=div('rule-choices');
    const ans = q.answer!==undefined ? q.answer : q.ans;
    (q.choices||[]).forEach((c,i)=>{
      const btn=div('rule-choice'+(S.assessLocked?(i===ans?' correct':i===S.assessChosen?' wrong':''):'')+(S.assessLocked?' locked':''));
      btn.textContent=(S.assessLocked&&i===ans?'✓ ':S.assessLocked&&i===S.assessChosen&&i!==ans?'✕ ':'')+c;
      if(!S.assessLocked){ btn.addEventListener('click',()=>{
        S.assessChosen=i; S.assessLocked=true;
        const right=i===ans;
        S.feedback=right?'ok':'no'; render();
        setTimeout(()=>{ advanceAssessment(right); },right?1200:1400);
      });}
      rcs.appendChild(btn);
    });
    stage.appendChild(rcs);
  }

  // ── PERSISTENT RULE CARD after every assessment answer ──
  // Per-question rule preferred; falls back to lesson-level summary if missing.
  if (S.assessLocked) {
    const lessonFallback = {
      4: "<strong>Sukun (ْ)</strong> means no vowel — the letter is held briefly.",
      5: "<strong>Tanween</strong> marks the end of an indefinite noun — it adds the sound of 'an', 'in', or 'un'.",
      6: "<strong>Shaddah (ّ)</strong> doubles a letter. Hold it twice as long, then continue with the vowel.",
    }[S.lesson];
    const ruleText = q.rule || lessonFallback;
    if (ruleText) {
      const rbox = div('prac-rule');
      rbox.innerHTML = (S.assessChosen === q.answer ? '✅  ' : '❌  ') + ruleText;
      stage.appendChild(rbox);
    }
  }

  if(S.feedback){ stage.appendChild(mkFeedback()); }
  return stage;
}

// ═══════════════════════════════════════════════
// COMPLETE
// ═══════════════════════════════════════════════
function mkComplete(){
  const meta = getLessonMeta(S.lesson);
  const next = LESSONS.find(l => l.id === S.lesson + 1);
  const wrap = div('complete-wrap');

  // Medal (single gold disc with award icon)
  const medal = div('complete-medal');
  medal.appendChild(ms('workspace_premium', 1));
  wrap.appendChild(medal);

  // Eyebrow + Title + Sub
  wrap.appendChild(el('div', {className:'complete-eyebrow'}, 'Lesson ' + S.lesson + ' Complete'));
  wrap.appendChild(el('h1', {className:'complete-title'}, meta.title));

  const subText = next
    ? `You've completed ${meta.title}. ${S.assessWrong===0?"Perfect score! ":""}Next up: ${next.title}.`
    : `You've completed ${meta.title}. ${S.assessWrong===0?"Perfect score! ":""}You finished all eight lessons of Quran Norania.`;
  wrap.appendChild(el('p', {className:'complete-sub'}, subText));

  // 3 stat cards
  const stats = div('complete-stats');
  const totalAssess = (S.assessTotal || 5);
  const correctAssess = totalAssess - (S.assessWrong || 0);

  const s1 = div('complete-stat');
  s1.appendChild(el('div', {className:'complete-stat-num'}, correctAssess + '/' + totalAssess));
  s1.appendChild(el('div', {className:'complete-stat-label'}, 'Final Check'));
  stats.appendChild(s1);

  const s2 = div('complete-stat');
  s2.appendChild(el('div', {className:'complete-stat-num'}, '+20'));
  s2.appendChild(el('div', {className:'complete-stat-label'}, 'XP Earned'));
  stats.appendChild(s2);

  const s3 = div('complete-stat');
  s3.appendChild(el('div', {className:'complete-stat-num'}, COMPLETED.size + '/8'));
  s3.appendChild(el('div', {className:'complete-stat-label'}, 'Journey'));
  stats.appendChild(s3);

  wrap.appendChild(stats);

  // Optional: review prompt if missed questions
  if (S.assessWrong > 0) {
    const review = div('complete-review-card');
    review.appendChild(el('p', {className:'complete-review-text'},
      `You missed ${S.assessWrong} question${S.assessWrong>1?'s':''}. Review the introduction slides again to strengthen your grasp.`));
    const replayBtn = el('button', {className:'complete-btn complete-btn-ghost'}, '🔁 Replay Intro Slides');
    replayBtn.style.width = '100%';
    replayBtn.addEventListener('click', () => {
      S.phase = 'intro'; S.slide = 0; render();
    });
    review.appendChild(replayBtn);
    wrap.appendChild(review);
  }

  // Action buttons
  const actions = div('complete-actions');
  const homeBtn = el('button', {className:'complete-btn complete-btn-ghost'}, 'Back to Hub');
  homeBtn.addEventListener('click', () => { S.phase = 'hub'; render(); });
  actions.appendChild(homeBtn);

  if (next) {
    const nextBtn = el('button', {className:'complete-btn complete-btn-primary'});
    nextBtn.appendChild(document.createTextNode('Next: ' + next.title));
    const arr = document.createElement('span');
    arr.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left:6px;"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
    nextBtn.appendChild(arr);
    nextBtn.addEventListener('click', () => {
      S.lesson = next.id;
      S.slide=0; S.harakatIdx=0; S.scStep=0; S.scPlayed=false;
      S.morphIdx=0; S.morphed=false; S._pracPool=null;
      S.vmSecIdx=0; S.vmPage=0; S.maadType=0; S.maadCard=0; S.videoWatched=false;
      S.phase = next.hasIntro ? 'intro' : 'lesson';
      render();
    });
    actions.appendChild(nextBtn);
  }
  wrap.appendChild(actions);

  const stage = div('stage'); stage.appendChild(wrap); return stage;
}

function celebrate() {
  const colors = ['#d4a347','#f2d080','#4a90d9','#a7d9a6','#ffffff'];
  for(let i=0;i<40;i++){
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.borderRadius = Math.random()>0.5?'50%':'2px';
    el.style.animationDelay = Math.random()*1+'s';
    el.style.animationDuration = (1.5+Math.random())+'s';
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3000);
  }
}
