  .brand{font-family:var(--serif);font-size:.82rem;color:var(--gold);letter-spacing:.22em}

const FUTURE_PREFIX = '\u0633\u064E'; // سَ
const HARAKAT = /[\u064B-\u0652\u0670\u0640]/g;
const stripH = s => s.replace(HARAKAT,'');

function formsFor(verb, tense){
  if(tense !== 'future') return verb.forms[tense];
  const pres = verb.forms.present, out = {};
  for(const k in pres) out[k] = FUTURE_PREFIX + pres[k];
  return out;
}
function findVerb(raw){
  let q = (raw||'').trim().toLowerCase(); if(!q) return null;
  // drop a leading english subject / infinitive marker:  "I go", "to leave", "he writes"
  q = q.replace(/^(to|i|you|he|she|it|we|they)\s+/, '').trim();
  // drop a common english verb ending so "talks"/"talking"/"talked" still hit the stem
  const stem = q.replace(/(ing|es|ed|s)$/, '');
  const qBare = stripH(q);
  // 1) Arabic, typed directly
  let v = VERBS.find(o => o.ar === q || stripH(o.ar) === qBare);
  if(v) return v;
  // 2) exact English match — alias or a whole word of the meaning
  v = VERBS.find(o =>
        o.aliases.some(a => { const al=a.toLowerCase(); return al===q || al===stem; }) ||
        o.en.toLowerCase().split(/[^a-z]+/).filter(Boolean).some(w => w===q || w===stem));
  if(v) return v;
  // 3) loose fallback
  return VERBS.find(o =>
        o.en.toLowerCase().includes(q) ||
        o.aliases.some(a => a.toLowerCase().includes(q))) || null;
}

function answerFor(verb, t, showH, keys){

function cell(form, pron, showH){
  if(!showH) form = stripH(form);
  return '<div class="cj-cell"><span class="cp">'+pron+'</span><span class="cf">'+form+'</span></div>';
}

function matrixFor(verb, t, showH){
  const forms = formsFor(verb, t);
  let h = '';
  SECTIONS.forEach(sec => {
    h += '<div class="cj-grouplabel">'+sec.label+'<span class="ar">'+sec.ar+'</span></div>';
    h += '<div class="cj-matrix">';
    // header row: blank | Female | Male  (RTL: blank rightmost)
    h += '<div class="cj-h"></div>'
       + '<div class="cj-h">\u0645\u0624\u0646\u0651\u062B<span>Female</span></div>'
       + '<div class="cj-h">\u0645\u0630\u0643\u0651\u0631<span>Male</span></div>';
    // gender-neutral rows span both gender columns
    sec.common.forEach(c => {
      let f = forms[c.key] || '\u2014'; if(!showH) f = stripH(f);
      h += '<div class="cj-rlabel">'+c.en+'</div>'
         + '<div class="cj-cell" style="grid-column:span 2"><span class="cp">'+c.ar+'</span><span class="cf">'+f+'</span></div>';
    });
    // gendered pairs: label | female | male
    sec.pairs.forEach(p => {
      h += '<div class="cj-rlabel">'+p.en+'</div>';
      h += cell(forms[p.female.key] || '\u2014', p.female.ar, showH);
      h += cell(forms[p.male.key]   || '\u2014', p.male.ar,   showH);
    });
    h += '</div>';
  });
  return h;
}

  enEl.textContent = verb.en;
  const m = ql.match(/^(i|you|he|she|it|we|they)\s+\S/);
  const keys = m ? SUBJECTS[m[1]] : null;
  body.innerHTML = keys ? answerFor(verb, t, showH, keys) : matrixFor(verb, t, showH);
}

input.addEventListener('input', render);
tense.addEventListener('change', render);
harakatBox.addEventListener('change', render);
</script>
