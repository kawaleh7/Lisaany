<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lisaany — Teacher dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#1b2154;--indigo-deep:#141a44;--indigo-soft:#2a3270;--gold:#c19a4b;--gold-br:#f2be62;--gold-deep:#9c7a31;--paper:#f5f6fb;--card:#fff;--border:#e7e9f5;--dim:#5b6092;--green:#1d5234;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:620px;margin:0 auto;padding:26px 16px 70px;}
  .bar{background:linear-gradient(135deg,var(--navy),var(--indigo-soft));border-radius:18px;padding:18px 22px;display:flex;align-items:center;gap:13px;margin-bottom:22px;box-shadow:0 18px 40px -24px rgba(27,33,84,.6);position:relative;overflow:hidden;}
  .bar>*{position:relative;z-index:1;}
  .bar::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.16;background-image:url("data:image/svg+xml,%3Csvg width='28' height='49' viewBox='0 0 28 49' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill-rule='evenodd'%3E%3Cg fill='%23f2be62'%3E%3Cpath d='M13.99 9.25l13 7.5v15l-13 7.5L1 31.75v-15l12.99-7.5zM3 17.9v12.7l11 6.34 11-6.35V17.9l-11-6.34L3 17.9zM0 15l12.98-7.5V0h-2v6.35L0 12.69v2.3zm0 18.5L12.98 41v8h-2v-6.85L0 35.81v-2.3zM15 0v7.5L27.99 15H28v-2.31h-.01L17 6.35V0h-2zm0 49v-8l12.99-7.5H28v2.31h-.01L17 42.15V49h-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");background-size:42px 73.5px;-webkit-mask-image:linear-gradient(90deg,transparent 26%,#000 100%);mask-image:linear-gradient(90deg,transparent 26%,#000 100%);}
  .qrlogo{width:42px;height:42px;border-radius:11px;background:rgba(242,190,98,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bar .t1{color:#fff;font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.03em;}
  .bar .t2{color:var(--gold-br);font-size:12px;margin-top:3px;font-weight:500;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:0 14px 36px -26px rgba(27,33,84,.4);}
  h2{font-family:'Cinzel',serif;font-size:17px;margin:0 0 16px;font-weight:600;color:var(--navy);}
  label{display:block;font-size:12.5px;color:var(--dim);margin:14px 0 6px;font-weight:600;letter-spacing:.01em;}
  input{width:100%;padding:12px 13px;border:1px solid var(--border);border-radius:11px;font-size:15px;font-family:inherit;color:var(--navy);background:#fff;transition:border-color .15s,box-shadow .15s;}
  input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,154,75,.15);}
  button.go{margin-top:16px;background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);border:none;font-size:15px;font-weight:700;font-family:inherit;padding:12px 24px;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 10px 22px -12px rgba(193,154,75,.8);}
  button.go:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 14px 26px -12px rgba(193,154,75,.9);}
  button.go:disabled{opacity:.5;box-shadow:none;}
  .msg{font-size:13px;margin-top:13px;font-weight:500;}.msg.err{color:#b3261e;}.msg.ok{color:var(--green);}
  .hide{display:none;}
  .center{text-align:center;}
  .codebox{display:inline-flex;align-items:center;gap:8px;background:#faf6ec;border:1px solid #ecd9ad;border-radius:12px;padding:11px 15px;margin:6px 0;}
  .codebox b{font-family:ui-monospace,Menlo,monospace;font-size:17px;letter-spacing:1px;color:var(--gold-deep);}
  .qrimg{display:block;margin:10px auto;border:1px solid var(--border);border-radius:12px;padding:6px;background:#fff;}
  .seatline{font-size:13px;color:var(--dim);}
  .roster{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:9px;margin-top:8px;}
  .chip{position:relative;padding:11px 8px;background:#fff;border:1px solid var(--border);border-radius:11px;text-align:center;font-size:14px;font-weight:600;color:var(--navy);box-shadow:0 4px 12px -8px rgba(27,33,84,.3);}
  .chip .x{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:#b3261e;color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;display:none;box-shadow:0 2px 6px rgba(179,38,30,.5);}
  .chip:hover .x{display:block;}
  .topright{margin-left:auto;}
  .link{color:var(--gold-deep);font-size:13px;cursor:pointer;background:none;border:none;font-family:inherit;font-weight:600;}
  .bar .link{color:var(--gold-br);}
  a.print{display:inline-block;margin-top:8px;font-size:13px;color:var(--navy);font-weight:600;}
  @media print{.noprint{display:none}.card{border:none;box-shadow:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar noprint">
    <div class="qrlogo"><svg viewBox="0 0 100 130" aria-hidden="true" style="width:64%;height:64%"><path d="M50 10 C45 24 31 42 31 64 C31 79 40 88 50 88 C60 88 69 79 69 64 C69 42 55 24 50 10 Z M48.6 18 L51.4 18 L50.8 54 L49.2 54 Z M44.5 60 A5.5 5.5 0 1 1 55.5 60 A5.5 5.5 0 1 1 44.5 60 Z M41 94 Q41 89 50 89 Q59 89 59 94 L59 99 L41 99 Z M37 103 Q37 101 39 101 L61 101 Q63 101 63 103 L63 113 Q63 115 61 115 L39 115 Q37 115 37 113 Z" fill="#f2be62" fill-rule="evenodd"/></svg></div>
    <div><div class="t1">Teacher dashboard</div><div class="t2">Lisaany</div></div>
    <button id="signout" class="link topright hide">Sign out</button>
  </div>

  <!-- signed out -->
  <div id="signinCard" class="card hide noprint">
    <h2>Sign in</h2>
    <label>Email</label><input id="email" type="email" placeholder="you@email.com">
    <label>Password</label><input id="password" type="password" placeholder="••••••••">
    <button class="go" id="signinBtn">Sign in</button>
    <div id="signinMsg" class="msg"></div>
    <p style="margin-top:16px;font-size:13px;color:var(--dim);">No account yet? <a href="auth.html" style="color:var(--gold-deep);font-weight:600;">Create one</a>, then come back here.</p>
  </div>

  <!-- claim -->
  <div id="claimCard" class="card hide noprint">
    <h2>Claim your class</h2>
    <p style="font-size:13px;color:var(--dim);margin:0 0 6px;">Enter the claim code your administrator gave you. You only do this once.</p>
    <label>Claim code</label><input id="claimCode" placeholder="abcd1234">
    <button class="go" id="claimBtn">Claim class</button>
    <div id="claimMsg" class="msg"></div>
  </div>

  <!-- class -->
  <div id="classCard" class="card hide">
    <div class="center">
      <div style="font-size:19px;font-family:'Cinzel',serif;font-weight:600;" id="cTeacher"></div>
      <div class="seatline" id="cSchool"></div>
      <div class="codebox" style="margin-top:10px;">class code:&nbsp;<b id="cCode"></b></div>
      <img id="qrimg" class="qrimg" width="200" height="200" alt="class QR">
      <div class="seatline">Print this and put it where your class can scan it.</div>
      <div style="margin-top:10px;font-size:13px;color:var(--dim);">Or share this link (for computers):</div>
      <div class="codebox" style="margin-top:6px;"><b id="cLink" style="font-size:13px;"></b></div>
      <div><button class="link" id="copyLink" style="text-decoration:underline;">Copy link</button></div>
      <a class="print noprint" href="#" onclick="window.print();return false;">🖨 Print this page</a>
    </div>
    <div class="noprint" style="margin-top:22px;">
      <label>Add a student (first name only)</label>
      <div style="display:flex;gap:8px;">
        <input id="newName" placeholder="Yusuf">
        <button class="go" id="addBtn" style="margin-top:0;">Add</button>
      </div>
      <div id="addMsg" class="msg"></div>
    </div>
    <div style="margin-top:20px;">
      <div class="seatline" id="cCount"></div>
      <div class="roster" id="roster"></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cfaxrzfqvoalwznkhwnx.supabase.co';
const SUPABASE_KEY='sb_publishable_JzVuIvyj2OEP4o0zbURcQA_NhfBFPaa';
const SB=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let token=null, currentCode='';
const $=id=>document.getElementById(id);
const show=el=>el.classList.remove('hide'), hide=el=>el.classList.add('hide');
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function init(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){ show($('signinCard')); return; }
  token=session.access_token; show($('signout'));
  loadMine();
}
init();

$('signinBtn').onclick=async()=>{
  const m=$('signinMsg'); m.className='msg'; m.textContent='';
  const email=$('email').value.trim(), password=$('password').value;
  if(!email||!password){ m.className='msg err'; m.textContent='Enter your email and password.'; return; }
  const b=$('signinBtn'); b.disabled=true; b.textContent='Signing in…';
  const {data,error}=await SB.auth.signInWithPassword({email,password});
  b.disabled=false; b.textContent='Sign in';
  if(error){ m.className='msg err'; m.textContent=error.message; return; }
  token=data.session.access_token; hide($('signinCard')); show($('signout')); loadMine();
};

$('signout').onclick=async()=>{ await SB.auth.signOut(); location.reload(); };

async function loadMine(){
  try{
    const r=await fetch('/api/my-class',{headers:{'Authorization':'Bearer '+token}});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Failed');
    if(!j.claimed || !j.classes.length){ hide($('classCard')); show($('claimCard')); return; }
    hide($('claimCard')); renderClass(j.classes[0]);
  }catch(e){ show($('claimCard')); $('claimMsg').className='msg err'; $('claimMsg').textContent=e.message; }
}

$('claimBtn').onclick=async()=>{
  const m=$('claimMsg'); m.className='msg'; m.textContent='';
  const claimCode=$('claimCode').value.trim();
  if(!claimCode){ m.className='msg err'; m.textContent='Enter your claim code.'; return; }
  const b=$('claimBtn'); b.disabled=true; b.textContent='Claiming…';
  try{
    const r=await fetch('/api/claim-class',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({claimCode})});
    const j=await r.json(); if(!r.ok) throw new Error(j.error||'Failed');
    hide($('claimCard')); loadMine();
  }catch(e){ m.className='msg err'; m.textContent=e.message; }
  b.disabled=false; b.textContent='Claim class';
};

function renderClass(c){
  currentCode=c.class_code;
  $('cTeacher').textContent=c.teacher;
  $('cSchool').textContent=c.school||'';
  $('cCode').textContent=c.class_code;
  const kidUrl=location.origin+'/class.html?c='+encodeURIComponent(c.class_code);
  $('qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(kidUrl);
  $('cLink').textContent=kidUrl;
  $('copyLink').onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(kidUrl); $('copyLink').textContent='Copied!'; setTimeout(()=>$('copyLink').textContent='Copy link',1500); };
  renderRoster(c.students||[]);
  show($('classCard'));
}

function renderRoster(list){
  $('cCount').textContent=list.length+(list.length===1?' student':' students');
  const box=$('roster'); box.innerHTML='';
  list.forEach(s=>{
    const d=document.createElement('div'); d.className='chip'; d.textContent=s.first_name;
    const x=document.createElement('button'); x.className='x'; x.textContent='×'; x.title='Remove';
    x.onclick=async()=>{
      if(!confirm('Remove '+s.first_name+'? This deletes their progress.')) return;
      try{
        const r=await fetch('/api/remove-student',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({studentId:s.id})});
        const j=await r.json(); if(!r.ok) throw new Error(j.error||'Failed');
        loadMine();
      }catch(e){ alert(e.message); }
    };
    d.appendChild(x); box.appendChild(d);
  });
}

$('addBtn').onclick=async()=>{
  const name=$('newName').value.trim(); const m=$('addMsg'); m.className='msg'; m.textContent='';
  if(!name){ m.className='msg err'; m.textContent='Type a first name.'; return; }
  const b=$('addBtn'); b.disabled=true; b.textContent='Adding…';
  try{
    const r=await fetch('/api/add-student',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({classCode:currentCode,firstName:name})});
    const j=await r.json(); if(!r.ok) throw new Error(j.error||'Failed');
    $('newName').value=''; m.className='msg ok'; m.textContent='Added '+name;
    loadMine();
  }catch(e){ m.className='msg err'; m.textContent=e.message; }
  b.disabled=false; b.textContent='Add';
};
</script>
</body>
</html>
