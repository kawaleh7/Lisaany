<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide Test 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#0e1b32;color:#e8eef9;min-height:100vh;padding:20px}
h1{font-size:18px;margin-bottom:8px}
.report{background:#15233f;border:1px solid #2a3a5a;border-radius:10px;padding:14px;font-size:13px;line-height:1.7;margin-bottom:18px}
.report b{color:#f2be62}
.btn{display:block;width:100%;background:#f2be62;color:#1a1206;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:12px}
.box{height:120px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#1a1206;margin-bottom:10px;font-size:15px}

/* Test A: transition + transform */
#a{background:#7fc99c;transform:translateY(140px);transition:transform .5s ease}
#a.go{transform:translateY(0)}
/* Test B: CSS keyframe */
@keyframes slideB{from{transform:translateY(140px)}to{transform:translateY(0)}}
#b{background:#e0ad52}
#b.go{animation:slideB .5s ease both}
/* Test C: transition on margin (no transform) */
#c{background:#c98f8f;margin-top:140px;transition:margin-top .5s ease}
#c.go{margin-top:0}
</style>
</head>
<body>
  <h1>Animation Diagnostic</h1>
  <div class="report" id="report">reading…</div>
  <button class="btn" onclick="run()">▶ Run all three (watch them move)</button>
  <div style="overflow:hidden">
    <div class="box" id="a">A — transform slide</div>
  </div>
  <div style="overflow:hidden">
    <div class="box" id="b">B — keyframe slide</div>
  </div>
  <div style="overflow:hidden">
    <div class="box" id="c">C — margin slide</div>
  </div>

<script>
// Self-report what the browser says about motion
const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
const r = document.getElementById('report');
r.innerHTML =
  'prefers-reduced-motion: <b>' + (mq.matches ? 'REDUCE (animations off!)' : 'no-preference (ok)') + '</b><br>' +
  'CSS transitions supported: <b>' + ('ontransitionend' in window ? 'yes' : 'unknown') + '</b><br>' +
  'Browser: <b>' + navigator.userAgent.replace(/^Mozilla\/5.0 /,'').slice(0,60) + '…</b>';

function run(){
  ['a','b','c'].forEach(id=>document.getElementById(id).classList.remove('go'));
  // force reflow then add .go on next frame
  void document.body.offsetWidth;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ['a','b','c'].forEach(id=>document.getElementById(id).classList.add('go'));
  }));
}
</script>
</body>
</html>
