<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisaany — Tutor Portal</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600&display=swap">
    
    <style>
        body {
            background-color: #060e1b;
            color: #e8dcc8;
            font-family: 'Inter', sans-serif;
            padding: 50px 20px;
            margin: 0;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        .header { 
            border-bottom: 2px solid #d4a347; 
            padding-bottom: 20px; 
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-family: 'Cinzel', serif; font-size: 28px; color: #d4a347; margin: 0; }
        .status-badge { background: rgba(212, 163, 74, 0.1); color: #d4a347; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; border: 1px solid #d4a347; }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        .main-action {
            background: rgba(13, 27, 50, 0.8);
            border: 1px solid rgba(212, 163, 74, 0.2);
            border-radius: 15px;
            padding: 40px;
            text-align: center;
        }

        .btn-start {
            background-color: #d4a347;
            color: #000;
            padding: 20px 40px;
            border-radius: 10px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 163, 74, 0.2);
        }

        .btn-start:hover { transform: scale(1.05); background-color: #f2d080; }

        .sidebar {
            background: rgba(13, 27, 50, 0.4);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(154, 142, 120, 0.1);
        }

        .sidebar h3 { font-family: 'Cinzel', serif; font-size: 16px; margin-bottom: 15px; color: #d4a347; }
        .student-item { padding: 10px 0; border-bottom: 1px solid rgba(154, 142, 120, 0.1); font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .dot { width: 8px; height: 8px; background: #9a8e78; border-radius: 50%; }

        /* Video Classroom Layer */
        #tutor-classroom {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TUTOR <span style="color:#fff">DASHBOARD</span></h1>
        <div class="status-badge">MODERATOR ACCESS</div>
    </div>

    <div class="dashboard-grid">
        <div class="main-action">
            <h2 style="font-family: Cinzel; margin-bottom: 15px;">Today's Session</h2>
            <p style="color: #9a8e78; margin-bottom: 30px;">TAJWEED & QURAN READING<br>Scheduled for: 7:00 PM</p>
            <button class="btn-start" onclick="startClass()">START LIVE CLASS</button>
        </div>

        <div class="sidebar">
            <h3>Registered Students</h3>
            <div class="student-item"><div class="dot"></div> Student A</div>
            <div class="student-item"><div class="dot"></div> Student B</div>
            <div class="student-item"><div class="dot"></div> Student C</div>
            <p style="font-size: 11px; color: #9a8e78; margin-top: 20px;">* Live roster will update inside the classroom.</p>
        </div>
    </div>
</div>

<div id="tutor-classroom">
    <div style="padding: 15px; background: #0a0e18; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #d4a347;">
        <span style="color:#d4a347; font-family:Cinzel; font-weight:bold;">TUTOR VIEW: LIVE SESSION</span>
        <button onclick="endClass()" style="background:#ff5252; color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; font-weight:bold;">END CLASS FOR ALL</button>
    </div>
    <div id="jitsi-tutor-area" style="flex: 1;"></div>
</div>

<script src="https://meet.jit.si/external_api.js"></script>

<script>
    function startClass() {
        document.getElementById('tutor-classroom').style.display = 'flex';
        
        if (window.JitsiMeetExternalAPI) {
            const domain = "meet.jit.si";
            const options = {
                roomName: "Lisaany_Live_Session_Ahmad", // MUST BE SAME AS STUDENT
                parentNode: document.getElementById('jitsi-tutor-area'),
                width: "100%",
                height: "100%",
                userInfo: {
                    displayName: 'Sheikh Ahmad (Tutor)'
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false
                },
                interfaceConfigOverwrite: {
                    // This gives the tutor the specific buttons they need
                    TOOLBAR_BUTTONS: [
                        'microphone', 'camera', 'closedcaptions', 'desktop', 'embedmeeting', 'fullscreen',
                        'fodeviceselection', 'hangup', 'profile', 'chat', 'recording',
                        'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand',
                        'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts',
                        'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone',
                        'security'
                    ],
                }
            };
            const api = new JitsiMeetExternalAPI(domain, options);
        } else {
            window.open("https://meet.jit.si/Lisaany_Live_Session_Ahmad", "_blank");
        }
    }

    function endClass() {
        if(confirm("Are you sure you want to exit the classroom?")) {
            document.getElementById('tutor-classroom').style.display = 'none';
            document.getElementById('jitsi-tutor-area').innerHTML = '';
        }
    }
</script>

</body>
</html>
