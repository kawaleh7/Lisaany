<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisaany — Live Sessions</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1">
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        :root {
            --bg: #060e1b;
            --card: rgba(13, 27, 50, 0.8);
            --gold: #d4a347;
            --text: #e8dcc8;
            --dim: #9a8e78;
            --red: #ff5252;
            --border: rgba(212, 163, 74, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 60px 20px;
        }

        .container { max-width: 900px; margin: 0 auto; min-height: 500px; }

        .hdr { margin-bottom: 50px; }
        .hdr-title { font-family: 'Cinzel', serif; font-size: 36px; margin-bottom: 12px; font-weight: 700; letter-spacing: 2px; }
        .hdr-desc { color: var(--dim); font-size: 18px; }

        .schedule-list { display: flex; flex-direction: column; gap: 20px; min-height: 100px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .date-box {
            text-align: center;
            min-width: 85px;
            border-right: 1px solid var(--border);
            padding-right: 24px;
        }

        .day-num { font-size: 32px; font-weight: 700; color: var(--gold); display: block; line-height: 1; }
        .day-name { font-size: 14px; text-transform: uppercase; color: var(--dim); margin-top: 4px; display: block;}

        .info { flex-grow: 1; }
        .topic { font-family: 'Cinzel', serif; font-size: 20px; margin-bottom: 8px; color: #fff; }
        .meta { font-size: 14px; color: var(--dim); display: flex; gap: 20px; }

        .btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            min-width: 130px;
        }

        #jitsi-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }

        .ms { font-family: 'Material Symbols Outlined'; vertical-align: middle; font-size: 20px; margin-right: 4px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="hdr">
        <h1 class="hdr-title">LEARN <span style="color:var(--red)">LIVE</span></h1>
        <p class="hdr-desc">Join our weekly interactive sessions with Sheikh Ahmad.</p>
    </div>

    <div class="schedule-list" id="schedule-output">
        </div>
</div>

<div id="jitsi-modal">
    <div style="padding:15px 25px; background:#0a0e18; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold);">
        <span style="color:var(--gold); font-family:Cinzel; font-weight:bold;">LISAANY LIVE CLASSROOM</span>
        <button class="btn" style="background:var(--red); color:white;" onclick="closeClass()">LEAVE SESSION</button>
    </div>
    <div id="jitsi-container" style="flex:1;"></div>
</div>

<script>
    // Configuration
    const CLASSES = [
        { day: 6, time: '7:00 PM', topic: 'TAJWEED & QURAN READING', dayLabel: 'SAT' },
        { day: 4, time: '7:00 PM', topic: 'ARABIC CONVERSATION', dayLabel: 'THU' },
        { day: 0, time: '11:00 AM', topic: 'GRAMMAR DEEP DIVE', dayLabel: 'SUN' }
    ];

    function render() {
        const container = document.getElementById('schedule-output');
        const today = new Date().getDay();

        // Clear it first
        container.innerHTML = '';

        CLASSES.forEach(item => {
            const isToday = (item.day === today);
            const card = document.createElement('div');
            card.className = 'card';
            
            const bStyle = isToday ? 'background-color: #ff5252; color: white;' : '';
            const bText = isToday ? 'JOIN NOW' : 'REMIND';

            card.innerHTML = `
                <div class="date-box">
                    <span class="day-num">${new Date().getDate()}</span>
                    <span class="day-name">${item.dayLabel}</span>
                </div>
                <div class="info">
                    <div class="topic">${item.topic}</div>
                    <div class="meta">
                        <span><span class="ms">person</span>Sheikh Ahmad</span>
                        <span><span class="ms">schedule</span>${item.time}</span>
                    </div>
                </div>
                <button class="btn" style="${bStyle}" onclick="isToday ? joinClass() : alert('Reminder set!')">
                    ${bText}
                </button>
            `;
            container.appendChild(card);
        });
    }

    function joinClass() {
        document.getElementById('jitsi-modal').style.display = 'flex';
        // Basic check to see if Jitsi loaded
        if (window.JitsiMeetExternalAPI) {
            new JitsiMeetExternalAPI("meet.jit.si", {
                roomName: "LisaanyLiveClassRoom_SheikhAhmad",
                parentNode: document.getElementById('jitsi-container'),
                width: "100%", height: "100%"
            });
        } else {
            alert("Video classroom is loading, please try again in a second.");
        }
    }

    function closeClass() {
        document.getElementById('jitsi-modal').style.display = 'none';
        document.getElementById('jitsi-container').innerHTML = '';
    }

    // Run the render function immediately
    window.onload = render;
</script>

</body>
</html>
