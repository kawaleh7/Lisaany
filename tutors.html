<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisaany — Live Sessions</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1">
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        :root {
            --bg: #060e1b;
            --card: #0d1b32;
            --gold: #d4a347;
            --text: #e8dcc8;
            --dim: #9a8e78;
            --red: #ff5252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg) !important; /* Forces background to be dark */
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            display: block !important; /* Prevents hidden body */
        }

        .container { max-width: 800px; margin: 0 auto; }

        .hdr { margin-bottom: 40px; }
        .hdr-title { font-family: 'Cinzel', serif; font-size: 28px; margin-bottom: 8px; }
        .hdr-desc { color: var(--dim); }

        /* Banner */
        .live-banner {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid var(--red);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            display: none; /* Hidden by default, shown via JS */
            justify-content: space-between;
            align-items: center;
        }

        /* Schedule */
        .schedule-list { display: flex; flex-direction: column; gap: 15px; }
        
        .card {
            background: var(--card);
            border: 1px solid rgba(212, 163, 71, 0.2);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .date-box {
            text-align: center;
            min-width: 60px;
            border-right: 1px solid rgba(212, 163, 71, 0.2);
            padding-right: 20px;
        }

        .day-num { font-size: 24px; font-weight: 700; color: var(--gold); display: block; }
        .day-name { font-size: 12px; text-transform: uppercase; color: var(--dim); }

        .info { flex-grow: 1; }
        .topic { font-family: 'Cinzel', serif; font-size: 18px; margin-bottom: 4px; }
        .meta { font-size: 13px; color: var(--dim); display: flex; gap: 15px; }

        .btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 12px;
        }

        .ms { font-family: 'Material Symbols Outlined'; vertical-align: middle; font-size: 18px; }

        /* Modal */
        #jitsi-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hdr">
        <h1 class="hdr-title">Learn <span style="color:var(--red)">Live</span></h1>
        <p class="hdr-desc">Join our weekly interactive sessions.</p>
    </div>

    <div id="live-banner" class="live-banner">
        <div>
            <div style="color:var(--red); font-weight:bold; font-size:12px;">● LIVE NOW</div>
            <div id="banner-topic" class="topic"></div>
        </div>
        <button class="btn" style="background:var(--red); color:#fff;" onclick="joinClass()">JOIN CLASS</button>
    </div>

    <div class="schedule-list" id="schedule-output"></div>
</div>

<div id="jitsi-modal">
    <div style="padding:10px; background:#111; display:flex; justify-content:space-between; align-items:center;">
        <span style="color:var(--gold); font-family:Cinzel;">Lisaany Live</span>
        <button class="btn" style="background:var(--red); color:white;" onclick="closeClass()">LEAVE</button>
    </div>
    <div id="jitsi-container" style="flex:1;"></div>
</div>

<script>
    const CLASSES = [
        { day: 'Tuesday', time: '7:00 PM', topic: 'Tajweed & Quran Reading' },
        { day: 'Thursday', time: '7:00 PM', topic: 'Arabic Conversation' },
        { day: 'Sunday', time: '11:00 AM', topic: 'Grammar Deep Dive' }
    ];

    function render() {
        const container = document.getElementById('schedule-output');
        const now = new Date();
        const currentDay = now.toLocaleDateString('en-US', { weekday: 'long' });

        CLASSES.forEach(item => {
            const isToday = item.day === currentDay;
            
            // Show banner if it's today (for demo purposes)
            if (isToday) {
                document.getElementById('live-banner').style.display = 'flex';
                document.getElementById('banner-topic').innerText = item.topic;
            }

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="date-box">
                    <span class="day-num">${now.getDate()}</span>
                    <span class="day-name">${item.day.slice(0,3)}</span>
                </div>
                <div class="info">
                    <div class="topic">${item.topic}</div>
                    <div class="meta">
                        <span><span class="ms">person</span> Sheikh Ahmad</span>
                        <span><span class="ms">schedule</span> ${item.time}</span>
                    </div>
                </div>
                <button class="btn" onclick="${isToday ? 'joinClass()' : 'alert(\'Reminder set!\')'}">
                    ${isToday ? 'JOIN' : 'REMIND'}
                </button>
            `;
            container.appendChild(card);
        });
    }

    function joinClass() {
        document.getElementById('jitsi-modal').style.display = 'flex';
        new JitsiMeetExternalAPI("meet.jit.si", {
            roomName: "LisaanyLiveSession",
            parentNode: document.getElementById('jitsi-container'),
            width: "100%", height: "100%"
        });
    }

    function closeClass() {
        document.getElementById('jitsi-modal').style.display = 'none';
        document.getElementById('jitsi-container').innerHTML = '';
    }

    render();
</script>

</body>
</html>
