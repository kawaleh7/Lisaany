<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lisaany — Live Sessions</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1">
    
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        :root {
            --bg: #060e1b;
            --card: rgba(13, 27, 50, 0.5);
            --gold: #d4a347;
            --text: #e8dcc8;
            --dim: #9a8e78;
            --red: #ff5252;
            --border: rgba(212, 163, 74, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            padding: 60px 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* Header Styling */
        .hdr { margin-bottom: 50px; }
        .hdr-title { font-family: 'Cinzel', serif; font-size: 36px; margin-bottom: 12px; font-weight: 700; letter-spacing: 2px; }
        .hdr-desc { color: var(--dim); font-size: 18px; }

        /* Session Cards */
        .schedule-list { display: flex; flex-direction: column; gap: 20px; }
        
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            transition: all 0.3s ease;
        }

        .card:hover { border-color: var(--gold); background: rgba(13, 27, 50, 0.8); }

        .date-box {
            text-align: center;
            min-width: 85px;
            border-right: 1px solid var(--border);
            padding-right: 24px;
        }

        .day-num { font-size: 32px; font-weight: 700; color: var(--gold); display: block; line-height: 1; }
        .day-name { font-size: 14px; text-transform: uppercase; color: var(--dim); letter-spacing: 1px; margin-top: 4px; display: block;}

        .info { flex-grow: 1; }
        .topic { font-family: 'Cinzel', serif; font-size: 20px; margin-bottom: 8px; letter-spacing: 0.5px; color: #fff; }
        .meta { font-size: 14px; color: var(--dim); display: flex; gap: 20px; }

        /* Button Styling */
        .btn {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cinzel', serif;
            font-size: 13px;
            transition: 0.3s;
            min-width: 130px;
        }

        .btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Classroom Modal */
        #jitsi-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            flex-direction: column;
        }

        .ms { font-family: 'Material Symbols Outlined'; vertical-align: middle; font-size: 20px; margin-right: 4px; color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <div class="hdr">
        <h1 class="hdr-title">LEARN <span style="color:var(--red)">LIVE</span></h1>
        <p class="hdr-desc">Join our weekly interactive sessions with Sheikh Ahmad.</p>
    </div>

    <div class="schedule-list" id="schedule-output"></div>
</div>

<div id="jitsi-modal">
    <div style="padding:15px 25px; background:#0a0e18; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--gold);">
        <span style="color:var(--gold); font-family:Cinzel; font-weight:bold;">LISAANY LIVE CLASSROOM</span>
        <button class="btn" style="background:var(--red); color:white;" onclick="closeClass()">LEAVE SESSION</button>
    </div>
    <div id="jitsi-container" style="flex:1;"></div>
</div>
