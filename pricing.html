<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="google" content="notranslate">
<title>Lisaany — Pricing</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Cinzel:wght@700&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
<style>
  :root {
    --bg: #0A122A;
    --card-bg: #0F172E;
    --gold: #C4A462;
    --gold-dim: rgba(196, 164, 98, 0.5);
    --text-white: #FFFFFF;
    --text-muted: rgba(255, 255, 255, 0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Plus Jakarta Sans', sans-serif; 
    background: var(--bg); 
    color: var(--text-white);
    display: flex; justify-content: center; align-items: center; min-height: 100vh;
    padding: 40px 20px 140px;
  }

  .ms { font-family: 'Material Symbols Rounded'; font-variation-settings: 'FILL' 1; }

  .wrapper { width: 100%; max-width: 800px; text-align: center; }
  
  h1 { font-family: 'Cinzel', serif; font-size: 2.2rem; margin-bottom: 30px; color: var(--gold); }

  .toggle-container { margin-bottom: 40px; display: flex; justify-content: center; align-items: center; gap: 15px; font-weight: 600; font-size: 14px; color: var(--text-muted); }
  .active-label { color: var(--gold); }
  .save-tag { color: var(--gold); font-weight: 700; }
  .toggle { width: 44px; height: 24px; background: rgba(255,255,255,0.1); border-radius: 20px; position: relative; cursor: pointer; border: 1px solid var(--gold-dim); }
  .toggle::after { content: ''; position: absolute; width: 16px; height: 16px; background: var(--gold); border-radius: 50%; top: 3px; left: 3px; transition: 0.3s; }
  input:checked + .toggle::after { left: 23px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; transition: max-width 0.3s ease; }
  .grid.solo { grid-template-columns: 1fr; max-width: 400px; margin: 0 auto; }

  .card {
    background: var(--card-bg);
    padding: 40px 30px;
    border-radius: 20px;
    border: 1px solid var(--gold-dim);
    text-align: left;
    transition: 0.3s ease;
    display: flex; flex-direction: column;
    position: relative;
  }
  .card:hover { border-color: var(--gold); transform: translateY(-5px); }

  .tier { font-family: 'Cinzel', serif; font-size: 14px; color: var(--gold); letter-spacing: 2px; }
  .price-box { margin: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 20px; }
  .price { font-size: 42px; font-weight: 700; color: var(--text-white); }
  .period { color: var(--text-muted); font-size: 14px; }
  .price-sub { color: var(--gold); font-size: 12px; margin-top: 6px; font-weight: 600; min-height: 16px; }

  .list { list-style: none; margin-bottom: 30px; flex-grow: 1; }
  .list li { margin-bottom: 15px; font-size: 14px; color: var(--text-muted); display: flex; align-items: center; }
  .list li::before { content: '→'; color: var(--gold); margin-right: 12px; font-weight: bold; }

  .btn {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    padding: 16px;
    border-radius: 12px;
    font-weight: 700;
    font-family: 'Plus Jakarta Sans';
    cursor: pointer;
    width: 100%;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  
  .featured-btn { 
    background: var(--gold); 
    color: var(--bg); 
  }
  
  .btn:hover { background: var(--gold); color: var(--bg); }

  /* Bottom Navigation */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-around;
    padding: 14px 20px 24px;
    background: rgba(10, 18, 42, 0.96);
    backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
    border-top: 1px solid var(--gold-dim);
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none;
    color: rgba(255, 255, 255, 0.4);
    font-size: 10px; font-weight: 700; letter-spacing: 0.7px; text-transform: uppercase;
    text-decoration: none; transition: all .25s; cursor: pointer;
    padding: 6px 10px; border-radius: 12px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .nav-btn.active { color: var(--gold); }
  .nav-btn:hover { color: var(--gold); background: rgba(196, 164, 98, 0.06); }
  .nav-btn .ms { font-size: 24px; transition: all .25s; font-variation-settings: 'FILL' 0; }
  .nav-btn.active .ms { font-variation-settings: 'FILL' 1; }

  @media (max-width: 600px) { 
    .grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.8rem; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <h1>Pricing</h1>

  <div class="toggle-container">
    <span id="mo-label" class="active-label">Monthly</span>
    <label>
      <input type="checkbox" id="bill-toggle" hidden onchange="update()">
      <div class="toggle"></div>
    </label>
    <span id="ann-label">Annual <span class="save-tag">(Save 59%)</span></span>
  </div>

  <div class="grid" id="grid">
    <div class="card" id="basic-card">
      <span class="tier">Basic</span>
      <div class="price-box">
        <span class="price">$<span id="p1">12</span></span>
        <span class="period" id="period1">/mo</span>
        <div class="price-sub" id="sub1">&nbsp;</div>
      </div>
      <ul class="list">
        <li>All 8 Tajweed lessons</li>
        <li>Full Arabic platform</li>
        <li>Progress tracking</li>
      </ul>
      <button class="btn" onclick="selectPlan('basic')">Begin</button>
    </div>

    <div class="card" id="pro-card" style="box-shadow: 0 15px 35px rgba(0,0,0,0.3);">
      <span class="tier">Pro</span>
      <div class="price-box">
        <span class="price">$<span id="p2">20</span></span>
        <span class="period" id="period2">/mo</span>
        <div class="price-sub" id="sub2">&nbsp;</div>
      </div>
      <ul class="list">
        <li>Everything in Basic</li>
        <li>Live Tutor sessions</li>
        <li>Recorded library</li>
      </ul>
      <button class="btn featured-btn" onclick="selectPlan('pro')">Go Pro</button>
    </div>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="index.html" class="nav-btn">
    <span class="ms">home</span>
    Home
  </a>
  <a href="lisaany_new.html" class="nav-btn">
    <span class="ms">menu_book</span>
    Read
  </a>
  <a href="arabic_platform.html" class="nav-btn">
    <span class="ms">mic</span>
    Speak
  </a>
  <a href="tutors.html" class="nav-btn">
    <span class="ms">groups</span>
    Tutors
  </a>
  <a href="auth.html" class="nav-btn">
    <span class="ms">person</span>
    Profile
  </a>
</div>

<script>
  let isAnnual = false;

  function update() {
    isAnnual = document.getElementById('bill-toggle').checked;
    const basicCard = document.getElementById('basic-card');
    const grid = document.getElementById('grid');
    const p2 = document.getElementById('p2');
    const period2 = document.getElementById('period2');
    const sub2 = document.getElementById('sub2');

    if (isAnnual) {
      basicCard.style.display = 'none';
      grid.classList.add('solo');
      p2.innerText = '99';
      period2.innerText = '/year';
      sub2.innerText = 'just $8.25/mo';
    } else {
      basicCard.style.display = '';
      grid.classList.remove('solo');
      document.getElementById('p1').innerText = '12';
      p2.innerText = '20';
      document.getElementById('period1').innerText = '/mo';
      period2.innerText = '/mo';
      sub2.innerHTML = '&nbsp;';
    }

    document.getElementById('mo-label').classList.toggle('active-label', !isAnnual);
    document.getElementById('ann-label').classList.toggle('active-label', isAnnual);
  }

  function selectPlan(plan) {
    const name = plan === 'pro' ? 'Pro' : 'Basic';
    const billing = isAnnual ? 'annual' : 'monthly';
    alert(`${name} selected (${billing}) — Stripe integration coming soon!`);
  }
</script>

</body>
</html>
