<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lisaany — School setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--navy:#1b2154;--indigo-deep:#141a44;--indigo-soft:#2a3270;--gold:#c19a4b;--gold-br:#f2be62;--gold-deep:#9c7a31;--paper:#f5f6fb;--card:#fff;--border:#e7e9f5;--dim:#5b6092;--green:#1d5234;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--navy);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:660px;margin:0 auto;padding:26px 16px 70px;}
  .bar{background:linear-gradient(135deg,var(--navy),var(--indigo-soft));border-radius:18px;padding:18px 22px;display:flex;align-items:center;gap:13px;margin-bottom:22px;box-shadow:0 18px 40px -24px rgba(27,33,84,.6);position:relative;overflow:hidden;}
  .bar>*{position:relative;z-index:1;}
  .bar::after{content:'';position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.16;background-image:url("data:image/svg+xml,%3Csvg width='28' height='49' viewBox='0 0 28 49' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill-rule='evenodd'%3E%3Cg fill='%23f2be62'%3E%3Cpath d='M13.99 9.25l13 7.5v15l-13 7.5L1 31.75v-15l12.99-7.5zM3 17.9v12.7l11 6.34 11-6.35V17.9l-11-6.34L3 17.9zM0 15l12.98-7.5V0h-2v6.35L0 12.69v2.3zm0 18.5L12.98 41v8h-2v-6.85L0 35.81v-2.3zM15 0v7.5L27.99 15H28v-2.31h-.01L17 6.35V0h-2zm0 49v-8l12.99-7.5H28v2.31h-.01L17 42.15V49h-2z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");background-size:42px 73.5px;-webkit-mask-image:linear-gradient(90deg,transparent 26%,#000 100%);mask-image:linear-gradient(90deg,transparent 26%,#000 100%);}
  .qrlogo{width:42px;height:42px;border-radius:11px;background:rgba(242,190,98,.14);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .bar .t1{color:#fff;font-family:'Cinzel',serif;font-size:18px;font-weight:600;letter-spacing:.03em;}
  .bar .t2{color:var(--gold-br);font-size:12px;margin-top:3px;font-weight:500;letter-spacing:.02em;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:18px;box-shadow:0 14px 36px -26px rgba(27,33,84,.4);}
  h2{font-family:'Cinzel',serif;font-size:17px;margin:0 0 16px;font-weight:600;color:var(--navy);}
  label{display:block;font-size:12.5px;color:var(--dim);margin:14px 0 6px;font-weight:600;letter-spacing:.01em;}
  input,select{width:100%;padding:12px 13px;border:1px solid var(--border);border-radius:11px;font-size:15px;font-family:inherit;color:var(--navy);background:#fff;transition:border-color .15s,box-shadow .15s;}
  input:focus,select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(193,154,75,.15);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  button.go{margin-top:18px;background:linear-gradient(135deg,var(--gold-br),var(--gold));color:var(--navy);border:none;font-size:15px;font-weight:700;font-family:inherit;padding:12px 24px;border-radius:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 10px 22px -12px rgba(193,154,75,.8);}
  button.go:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 14px 26px -12px rgba(193,154,75,.9);}
  button.go:disabled{opacity:.5;cursor:default;box-shadow:none;}
  .msg{font-size:13px;margin-top:13px;font-weight:500;}
  .msg.err{color:#b3261e;}.msg.ok{color:var(--green);}
  .hide{display:none;}
  .codebox{display:flex;align-items:center;gap:10px;background:#faf6ec;border:1px solid #ecd9ad;border-radius:12px;padding:13px 15px;margin:6px 0 14px;}
  .codebox b{font-family:ui-monospace,Menlo,monospace;font-size:18px;letter-spacing:1px;color:var(--gold-deep);}
  .qrimg{display:block;margin:10px auto;border:1px solid var(--border);border-radius:12px;padding:6px;background:#fff;}
  .center{text-align:center;}
  .roster{display:grid;grid-template-columns:repeat(auto-fit,minmax(92px,1fr));gap:9px;margin-top:8px;}
  .chip{position:relative;padding:11px 8px;background:#fff;border:1px solid var(--border);border-radius:11px;text-align:center;font-size:14px;font-weight:600;color:var(--navy);box-shadow:0 4px 12px -8px rgba(27,33,84,.3);}
  .chip .x{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;background:#b3261e;color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;display:none;box-shadow:0 2px 6px rgba(179,38,30,.5);}
  .chip:hover .x{display:block;}
  .seatline{font-size:13px;color:var(--dim);margin-top:5px;}
  .link{color:var(--gold-deep);font-size:13px;cursor:pointer;text-decoration:underline;background:none;border:none;padding:0;font-family:inherit;font-weight:600;}
  a.print{display:inline-block;margin-top:8px;font-size:13px;color:var(--navy);font-weight:600;}
  @media print{.noprint{display:none}.card{border:none;box-shadow:none}}
  .srow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 0;border-top:1px solid var(--border);}
  .srow:first-child{border-top:none;}
  .srow .nm{font-size:15px;font-weight:600;}
  .srow .sub{font-size:12px;color:var(--dim);margin-top:3px;}
  .srow .acts{display:flex;gap:8px;flex-shrink:0;}
  .btn-sm{font-size:13px;font-weight:600;font-family:inherit;padding:8px 13px;border-radius:10px;border:1px solid var(--border);background:#fff;color:var(--navy);cursor:pointer;transition:.12s;}
  .btn-sm:hover{border-color:var(--gold);}
  .btn-del{border-color:#e9c9c4;color:#b3261e;}
  .btn-del:hover{border-color:#b3261e;}
</style>
</head>
<body>
<div class="wrap">
  <div class="bar noprint"><div class="qrlogo"><svg viewBox="0 0 100 130" aria-hidden="true" style="width:64%;height:64%"><path d="M50 10 C45 24 31 42 31 64 C31 79 40 88 50 88 C60 88 69 79 69 64 C69 42 55 24 50 10 Z M48.6 18 L51.4 18 L50.8 54 L49.2 54 Z M44.5 60 A5.5 5.5 0 1 1 55.5 60 A5.5 5.5 0 1 1 44.5 60 Z M41 94 Q41 89 50 89 Q59 89 59 94 L59 99 L41 99 Z M37 103 Q37 101 39 101 L61 101 Q63 101 63 103 L63 113 Q63 115 61 115 L39 115 Q37 115 37 113 Z" fill="#f2be62" fill-rule="evenodd"/></svg></div><div><div class="t1">School setup</div><div class="t2">Lisaany · admin only</div></div><button id="signout" class="link" style="margin-left:auto;color:var(--gold-br);background:none;border:none;cursor:pointer;font-size:13px;">Sign out</button></div>

  <!-- gate -->
  <div id="gate" class="card center"><p id="gateMsg">Checking…</p></div>

  <!-- schools list -->
  <div id="schoolsCard" class="card hide noprint">
    <h2>Your schools</h2>
    <div id="schoolsList"></div>
    <div id="schoolsMsg" class="msg"></div>
  </div>

  <!-- create -->
  <div id="createCard" class="card hide noprint">
    <h2>Create a class</h2>
    <label>School name</label>
    <input id="schoolName" placeholder="Madrasah an-Noor">
    <div class="row2">
      <div><label>Seats (how many kids)</label><input id="seats" type="number" min="1" value="30"></div>
      <div><label>Term ends (optional)</label><input id="expiresAt" type="date"></div>
    </div>
    <label>Teacher name (shown to kids)</label>
    <input id="teacherName" placeholder="Ustadh Wasel">
    <label>Course this class uses</label>
    <select id="course">
      <option value="arabic">Arabic lessons</option>
      <option value="norania">Norania (Quran)</option>
    </select>
    <button class="go" id="createBtn">Create class</button>
    <div id="createMsg" class="msg"></div>
    <p style="margin-top:16px;"><button class="link" id="toManage">or manage an existing class →</button></p>
  </div>

  <!-- manage -->
  <div id="manageCard" class="card hide">
    <div class="noprint" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <h2 style="margin:0;">Class</h2>
      <button class="link" id="backToSchools">← Back / new school</button>
    </div>
    <div class="noprint">
      <label>Class code</label>
      <div style="display:flex;gap:8px;">
        <input id="classCode" placeholder="wasel-7k2p">
        <button class="go" id="loadBtn" style="margin-top:0;">Load</button>
      </div>
      <div id="manageMsg" class="msg"></div>
    </div>

    <div id="classView" class="hide">
      <div class="center" style="margin-top:16px;">
        <div style="font-size:19px;font-family:'Cinzel',serif;font-weight:600;" id="cvTeacher"></div>
        <div class="seatline" id="cvSchool"></div>
        <div class="codebox" style="justify-content:center;margin-top:12px;">code:&nbsp;<b id="cvCode"></b></div>
        <div id="cvClaimWrap" class="codebox hide" style="justify-content:center;background:#eef3ff;border-color:#cdd9f2;">teacher claim code:&nbsp;<b id="cvClaim" style="color:#2a3270;"></b></div>
        <img id="qrimg" class="qrimg" width="200" height="200" alt="class QR">
        <div class="seatline">Print this and put it where the class can scan it.</div>
        <div style="margin-top:8px;font-size:13px;color:var(--dim);">Or share this link (for computers):</div>
        <div class="codebox" style="justify-content:center;margin-top:6px;"><b id="cvLink" style="font-size:12px;"></b></div>
        <div><button class="link" id="cvCopy">Copy link</button></div>
        <a class="print noprint" href="#" onclick="window.print();return false;">🖨 Print this page</a>
      </div>

      <div class="noprint" style="margin-top:22px;">
        <label>Add a student (first name only)</label>
        <div style="display:flex;gap:8px;">
          <input id="newName" placeholder="Yusuf">
          <button class="go" id="addBtn" style="margin-top:0;">Add</button>
        </div>
        <div id="addMsg" class="msg"></div>
      </div>

      <div style="margin-top:20px;">
        <div class="seatline" id="cvCount"></div>
        <div class="roster" id="roster"></div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://cfaxrzfqvoalwznkhwnx.supabase.co';
const SUPABASE_KEY='sb_publishable_JzVuIvyj2OEP4o0zbURcQA_NhfBFPaa';
const SB=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
let token=null, currentCode='';
const claimByCode={};

const $=id=>document.getElementById(id);
function show(el){el.classList.remove('hide')} function hide(el){el.classList.add('hide')}

async function init(){
  const {data:{session}}=await SB.auth.getSession();
  if(!session){ $('gateMsg').innerHTML='Please <a href="auth.html">sign in</a> as admin to set up classes.'; return; }
  const u=session.user||{};
  const email=(u.email||'').toLowerCase();
  const role=u.app_metadata&&u.app_metadata.role;
  const OWNERS=['ahmedstart163@gmail.com','admin@lisaany.com'];
  if(role!=='admin' && OWNERS.indexOf(email)===-1){
    $('gateMsg').innerHTML='This page is for the admin account only.<br><span style="font-size:12px;color:#7b869c">Signed in as: '+(u.email||'unknown')+'</span>';
    return;
  }
  token=session.access_token;
  hide($('gate')); show($('schoolsCard')); show($('createCard'));
  loadSchools();
}
init();

document.getElementById('signout').onclick=async()=>{ await SB.auth.signOut(); location.href='index.html'; };

async function loadSchools(){
  const m=$('schoolsMsg'); m.className='msg'; m.textContent='';
  try{
    const r=await fetch('/api/list-schools',{headers:{'Authorization':'Bearer '+token}});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Failed');
    const box=$('schoolsList'); box.innerHTML='';
    if(!j.schools.length){ box.innerHTML='<div class="sub">No schools yet. Create one below.</div>'; return; }
    j.schools.forEach(s=>{
      s.classes.forEach(c=>{ if(c.claim_code) claimByCode[c.class_code]=c.claim_code; });
      const codes=s.classes.map(c=>c.class_code).join(', ')||'no class yet';
      const row=document.createElement('div'); row.className='srow';
      const left=document.createElement('div');
      left.innerHTML='<div class="nm">'+esc(s.name)+'</div><div class="sub">'+s.student_count+' / '+s.seats+' seats · '+s.teacher_count+' class'+(s.teacher_count===1?'':'es')+' · '+esc(codes)+'</div>';
      const acts=document.createElement('div'); acts.className='acts';
      const mBtn=document.createElement('button'); mBtn.className='btn-sm'; mBtn.textContent='Manage';
      mBtn.onclick=()=>{ const c=s.classes[0]; if(!c){ alert('This school has no class yet.'); return; } hide($('createCard')); show($('manageCard')); $('classCode').value=c.class_code; loadClass(c.class_code); window.scrollTo(0,0); };
      const dBtn=document.createElement('button'); dBtn.className='btn-sm btn-del'; dBtn.textContent='Delete';
      dBtn.onclick=async()=>{
        if(!confirm('Delete "'+s.name+'" and all '+s.student_count+' of its students? This removes their accounts and progress permanently.')) return;
        dBtn.disabled=true; dBtn.textContent='Deleting…';
        try{
          const rr=await fetch('/api/delete-school',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({schoolId:s.id})});
          const jj=await rr.json(); if(!rr.ok) throw new Error(jj.error||'Failed');
          loadSchools();
        }catch(e){ m.className='msg err'; m.textContent=e.message; dBtn.disabled=false; dBtn.textContent='Delete'; }
      };
      acts.appendChild(mBtn); acts.appendChild(dBtn);
      row.appendChild(left); row.appendChild(acts); box.appendChild(row);
    });
  }catch(e){ m.className='msg err'; m.textContent=e.message; }
}

function esc(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

$('toManage').onclick=()=>{ hide($('createCard')); show($('manageCard')); };
$('backToSchools').onclick=()=>{ hide($('manageCard')); show($('schoolsCard')); show($('createCard')); loadSchools(); window.scrollTo(0,0); };

$('createBtn').onclick=async()=>{
  const b=$('createBtn'); const m=$('createMsg'); m.className='msg'; m.textContent='';
  const schoolName=$('schoolName').value.trim(), teacherName=$('teacherName').value.trim();
  const seats=$('seats').value, expiresAt=$('expiresAt').value||null;
  const course=$('course').value;
  if(!schoolName||!teacherName){ m.className='msg err'; m.textContent='School and teacher name are required.'; return; }
  b.disabled=true; b.textContent='Creating…';
  try{
    const r=await fetch('/api/create-class',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({schoolName,seats,expiresAt,teacherName,course})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Failed');
    hide($('createCard')); show($('manageCard'));
    $('classCode').value=j.class_code;
    if(j.claim_code) claimByCode[j.class_code]=j.claim_code;
    loadClass(j.class_code);
    loadSchools();
  }catch(e){ m.className='msg err'; m.textContent=e.message; }
  b.disabled=false; b.textContent='Create class';
};

$('loadBtn').onclick=()=>{ const c=$('classCode').value.trim(); if(c) loadClass(c); };

async function loadClass(code){
  const m=$('manageMsg'); m.className='msg'; m.textContent='Loading…';
  try{
    const r=await fetch('/api/class-roster?code='+encodeURIComponent(code));
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Not found');
    currentCode=code; m.textContent='';
    $('cvTeacher').textContent=j.teacher;
    $('cvSchool').textContent=j.school||'';
    $('cvCode').textContent=code;
    if(claimByCode[code]){ $('cvClaim').textContent=claimByCode[code]; show($('cvClaimWrap')); } else { hide($('cvClaimWrap')); }
    const kidUrl=location.origin+'/class.html?c='+encodeURIComponent(code);
    $('qrimg').src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data='+encodeURIComponent(kidUrl);
    $('cvLink').textContent=kidUrl;
    $('cvCopy').onclick=()=>{ navigator.clipboard&&navigator.clipboard.writeText(kidUrl); $('cvCopy').textContent='Copied!'; setTimeout(()=>$('cvCopy').textContent='Copy link',1500); };
    renderRoster(j.students||[]);
    show($('classView'));
  }catch(e){ m.className='msg err'; m.textContent=e.message; hide($('classView')); }
}

function renderRoster(list){
  $('cvCount').textContent=list.length+(list.length===1?' student':' students');
  const box=$('roster'); box.innerHTML='';
  list.forEach(s=>{
    const d=document.createElement('div'); d.className='chip'; d.textContent=s.first_name;
    const x=document.createElement('button'); x.className='x'; x.textContent='×'; x.title='Remove';
    x.onclick=async()=>{
      if(!confirm('Remove '+s.first_name+'? This deletes their account and progress.')) return;
      try{
        const r=await fetch('/api/remove-student',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({studentId:s.id})});
        const j=await r.json(); if(!r.ok) throw new Error(j.error||'Failed');
        loadClass(currentCode); loadSchools();
      }catch(e){ alert(e.message); }
    };
    d.appendChild(x); box.appendChild(d);
  });
}

$('addBtn').onclick=async()=>{
  const name=$('newName').value.trim(); const m=$('addMsg'); m.className='msg'; m.textContent='';
  if(!name){ m.className='msg err'; m.textContent='Type a first name.'; return; }
  const b=$('addBtn'); b.disabled=true; b.textContent='Adding…';
  try{
    const r=await fetch('/api/add-student',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},
      body:JSON.stringify({classCode:currentCode,firstName:name})});
    const j=await r.json();
    if(!r.ok) throw new Error(j.error||'Failed');
    $('newName').value=''; m.className='msg ok'; m.textContent='Added '+name;
    loadClass(currentCode);
  }catch(e){ m.className='msg err'; m.textContent=e.message; }
  b.disabled=false; b.textContent='Add';
};
</script>
</body>
</html>
